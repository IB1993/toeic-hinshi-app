<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TOEIC 品詞問題</title>
<style>
:root {
  --blue:#2563eb; --blue-d:#1d4ed8; --blue-l:#eff6ff;
  --green:#16a34a; --green-l:#dcfce7;
  --red:#dc2626;   --red-l:#fee2e2;
  --amber:#d97706; --amber-l:#fef9c3;
  --gray:#6b7280;  --gray-l:#f3f4f6;
  --border:#e5e7eb; --text:#111827; --text2:#6b7280;
  --radius:14px; --hdr:54px; --nav:64px;
  --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;background:#f1f5f9;color:var(--text);}

#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--blue);color:white;display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#hdr-back{background:none;border:none;color:white;font-size:1.3rem;padding:6px 8px;cursor:pointer;display:none;}
#hdr-title{font-size:1rem;font-weight:700;flex:1;}

#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));background:white;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding-bottom:var(--safe);font-size:.65rem;color:var(--text2);padding-top:8px;}
.nav-btn .ico{font-size:1.4rem;line-height:1;}
.nav-btn.active{color:var(--blue);}

#screens{position:fixed;top:var(--hdr);bottom:calc(var(--nav) + var(--safe));left:0;right:0;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.screen.active{display:block;}

/* HOME */
#home-screen{background:#f1f5f9;}
.hero{background:var(--blue);color:white;padding:18px 16px 22px;}
.hero h2{font-size:1rem;margin-bottom:12px;opacity:.9;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.hs{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 6px;text-align:center;}
.hs-num{font-size:1.5rem;font-weight:800;}
.hs-lbl{font-size:.62rem;opacity:.85;margin-top:2px;}
.home-sec{padding:14px 14px 4px;}
.home-sec h3{font-size:.75rem;color:var(--text2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.quick-list{display:flex;flex-direction:column;gap:8px;}
.quick-btn{display:flex;align-items:center;gap:12px;background:white;border:none;border-radius:var(--radius);padding:13px 14px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);width:100%;text-align:left;font-family:inherit;}
.quick-btn:active{opacity:.8;}
.qb-ico{font-size:1.3rem;}
.qb-title{font-size:.9rem;font-weight:700;display:block;}
.qb-sub{font-size:.72rem;color:var(--text2);}
.qb-arrow{margin-left:auto;color:#d1d5db;}
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gc{background:white;border-radius:var(--radius);padding:13px 12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.gc:active{opacity:.8;}
.gc-icon{font-size:1.5rem;margin-bottom:5px;}
.gc-name{font-size:.85rem;font-weight:700;margin-bottom:3px;}
.gc-count{font-size:.72rem;color:var(--text2);margin-bottom:7px;}
.gc-bar{background:var(--gray-l);border-radius:99px;height:5px;overflow:hidden;margin-bottom:3px;}
.gc-fill{height:100%;border-radius:99px;}
.gc-rate{font-size:.68rem;color:var(--text2);}

/* CATEGORY DETAIL */
#cat-detail{background:#f1f5f9;}
.dh{background:white;padding:13px 16px;border-bottom:1px solid var(--border);}
.dh-name{font-size:1.05rem;font-weight:700;margin-bottom:3px;}
.dh-stats{font-size:.75rem;color:var(--text2);}
.detail-start{margin:12px 14px 4px;background:var(--blue);color:white;border:none;border-radius:12px;padding:14px;font-size:.95rem;font-weight:700;width:calc(100% - 28px);cursor:pointer;font-family:inherit;}
.sub-list{padding:8px 14px 16px;display:flex;flex-direction:column;gap:8px;}
.sub-item{background:white;border-radius:10px;padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sub-item:active{opacity:.8;}
.si-info{flex:1;}
.si-name{font-size:.87rem;font-weight:600;margin-bottom:2px;}
.si-count{font-size:.72rem;color:var(--text2);}
.si-badge{padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;}

/* QUIZ */
#quiz-screen{background:#f1f5f9;}
.qz-top{padding:10px 14px 6px;display:flex;align-items:center;gap:10px;}
.qz-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.qz-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .3s;}
.qz-txt{font-size:.75rem;color:var(--text2);white-space:nowrap;}
.qz-badge{font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700;white-space:nowrap;}

.q-card{margin:0 12px 10px;background:white;border-radius:var(--radius);padding:16px 16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative;}
.q-star{position:absolute;top:11px;right:11px;font-size:1.25rem;cursor:pointer;line-height:1;color:#d1d5db;background:none;border:none;padding:4px;transition:color .15s,transform .15s;}
.q-star.on{color:var(--amber);}
.q-star:active{transform:scale(1.3);}
.q-tag{display:inline-block;background:var(--blue-l);color:var(--blue);font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:99px;margin-bottom:10px;margin-right:28px;}
.q-text{font-size:1rem;line-height:1.85;color:var(--text);padding-right:4px;}
.q-blank{display:inline-block;border-bottom:2.5px solid var(--blue);min-width:80px;text-align:center;color:var(--blue);font-weight:700;padding:0 4px;}

/* Hint */
.hint-wrap{margin:0 12px 8px;}
.hint-btn{width:100%;padding:10px 14px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:11px;
  font-size:.86rem;font-weight:700;color:#0369a1;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:8px;}
.hint-btn:active{background:#e0f2fe;}
.hint-box{display:none;margin-top:7px;background:#e0f2fe;border-radius:10px;padding:10px 13px;
  font-size:.84rem;line-height:1.7;color:#075985;}

/* Choices */
.choices{padding:0 12px 8px;display:flex;flex-direction:column;gap:8px;}
.c-btn{display:flex;align-items:center;gap:12px;background:white;border:2px solid var(--border);border-radius:12px;padding:14px 15px;cursor:pointer;text-align:left;font-size:.95rem;font-family:inherit;width:100%;transition:border-color .1s,background .1s;}
.c-btn:active:not(:disabled){background:var(--blue-l);border-color:var(--blue);}
.c-key{font-weight:800;font-size:1rem;min-width:22px;color:var(--blue);}
.c-val{flex:1;line-height:1.4;}
.c-btn.ok{border-color:var(--green);background:var(--green-l);}
.c-btn.ng{border-color:var(--red);background:var(--red-l);}
.c-btn.show-ok{border-color:var(--green);background:var(--green-l);}
.c-btn.ok .c-key,.c-btn.show-ok .c-key{color:var(--green);}
.c-btn.ng .c-key{color:var(--red);}
.c-btn.ok::after{content:'✓';margin-left:auto;color:var(--green);font-weight:800;}
.c-btn.ng::after{content:'✗';margin-left:auto;color:var(--red);font-weight:800;}

/* Explanation */
#exp-wrap{margin:0 12px 8px;border-radius:var(--radius);overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease,opacity .25s ease;}
#exp-wrap.show{max-height:800px;opacity:1;}
.exp-result{padding:12px 16px;font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.exp-result.ok{background:var(--green-l);color:var(--green);}
.exp-result.ng{background:var(--red-l);color:var(--red);}
.exp-ans{padding:10px 16px;background:#f0f9ff;font-size:.85rem;display:flex;gap:6px;flex-wrap:wrap;align-items:baseline;border-top:1px solid #bae6fd;}
.exp-ans .al{font-weight:700;color:#0369a1;}
.exp-ans .aw{font-weight:700;color:#0369a1;}
.exp-ans .ao{color:var(--text2);font-size:.75rem;}
.exp-body{padding:13px 16px;background:var(--amber-l);font-size:.85rem;line-height:1.8;color:#451a03;border-top:1px solid #fde68a;}
.exp-lbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--amber);display:block;margin-bottom:5px;}
.exp-body b{color:#92400e;font-weight:800;}
.exp-body .ab{color:#0369a1;font-weight:800;}

#btn-next-wrap{padding:4px 12px 12px;display:none;}
#btn-next{width:100%;padding:15px;background:var(--blue);color:white;border:none;border-radius:13px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}
#btn-next:active{background:var(--blue-d);}
#btn-skip-wrap{padding:2px 12px 10px;}
#btn-skip{width:100%;padding:11px;background:white;color:var(--text2);border:1.5px solid var(--border);border-radius:11px;font-size:.88rem;cursor:pointer;font-family:inherit;}

/* Finish */
#finish-screen{display:none;position:absolute;inset:0;background:white;overflow-y:auto;z-index:10;}
.fin-inner{display:flex;flex-direction:column;align-items:center;padding:48px 24px 32px;}
.fin-emoji{font-size:3.5rem;margin-bottom:10px;}
.fin-title{font-size:1.2rem;font-weight:800;margin-bottom:4px;}
.fin-score{font-size:3rem;font-weight:800;color:var(--blue);margin:14px 0 2px;}
.fin-rate{font-size:1.2rem;font-weight:700;color:var(--blue);margin-bottom:8px;}
.fin-sub{font-size:.82rem;color:var(--text2);margin-bottom:28px;}
.fin-btns{width:100%;display:flex;flex-direction:column;gap:10px;}
.fb{padding:14px;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;}
.fb-blue{background:var(--blue);color:white;}
.fb-red{background:var(--red-l);color:var(--red);}
.fb-gray{background:var(--gray-l);color:var(--text);}

/* LIST */
#list-screen{background:#f1f5f9;}
.list-top{padding:10px 12px;background:white;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.list-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:var(--gray-l);}
.list-search:focus{outline:none;border-color:var(--blue);background:white;}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 13px;border-radius:99px;font-size:.78rem;font-weight:600;border:1.5px solid var(--border);background:white;cursor:pointer;white-space:nowrap;font-family:inherit;}
.chip.on{background:var(--blue);color:white;border-color:var(--blue);}
.list-cnt{padding:7px 14px;font-size:.75rem;color:var(--text2);}
.list-items{padding:0 12px 16px;display:flex;flex-direction:column;gap:8px;}
.li{background:white;border-radius:11px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.li-star{font-size:1.1rem;cursor:pointer;flex-shrink:0;margin-top:1px;border:none;background:none;padding:0;}
.li-body{flex:1;min-width:0;}
.li-meta{display:flex;gap:5px;align-items:center;margin-bottom:3px;flex-wrap:wrap;}
.li-num{font-size:.7rem;color:var(--text2);}
.li-cat{font-size:.68rem;background:var(--blue-l);color:var(--blue);padding:2px 6px;border-radius:99px;font-weight:600;}
.li-q{font-size:.83rem;color:var(--text);line-height:1.4;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-ans{font-size:.76rem;color:var(--green);font-weight:600;}
.lb{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:99px;}
.lb-ok{background:var(--green-l);color:var(--green);}
.lb-ng{background:var(--red-l);color:var(--red);}
.lb-no{background:var(--gray-l);color:var(--text2);}

/* STATS */
#stats-screen{background:#f1f5f9;padding:14px 12px;}
.s-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.s-card{background:white;border-radius:12px;padding:13px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sc-num{font-size:1.7rem;font-weight:800;color:var(--blue);}
.sc-lbl{font-size:.7rem;color:var(--text2);margin-top:2px;}
.s-sec{font-size:.75rem;color:var(--text2);font-weight:700;letter-spacing:.06em;margin-bottom:8px;}
.cs-item{background:white;border-radius:10px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.cs-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cs-name{font-size:.86rem;font-weight:700;}
.cs-nums{font-size:.72rem;color:var(--text2);}
.cs-track{height:6px;background:var(--gray-l);border-radius:99px;overflow:hidden;}
.cs-fill{height:100%;border-radius:99px;}
.stats-reset{width:100%;margin-top:14px;padding:12px;background:var(--red-l);color:var(--red);border:none;border-radius:11px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<div id="hdr">
  <button id="hdr-back" onclick="goBack()">&#8592;</button>
  <span id="hdr-title">TOEIC 品詞問題</span>
</div>

<div id="screens">

  <!-- HOME -->
  <div class="screen active" id="home-screen">
    <div class="hero">
      <h2>&#128218; 今日も練習しよう！</h2>
      <div class="hero-stats">
        <div class="hs"><div class="hs-num" id="hs-ans">0</div><div class="hs-lbl">回答済み</div></div>
        <div class="hs"><div class="hs-num" id="hs-rate">-%</div><div class="hs-lbl">正解率</div></div>
        <div class="hs"><div class="hs-num" id="hs-star">0</div><div class="hs-lbl">&#11088; チェック</div></div>
      </div>
    </div>
    <div class="home-sec">
      <h3>クイックスタート</h3>
      <div class="quick-list">
        <button class="quick-btn" onclick="quickStart('smart')">
          <span class="qb-ico">&#127381;</span>
          <span><span class="qb-title">おすすめ順で出題</span><span class="qb-sub">未学習 → 不正解 → 正解の順</span></span>
          <span class="qb-arrow">&#8250;</span>
        </button>
        <button class="quick-btn" onclick="quickStart('wrong')">
          <span class="qb-ico">&#128260;</span>
          <span><span class="qb-title">不正解を復習</span><span class="qb-sub" id="qb-wrong">0問</span></span>
          <span class="qb-arrow">&#8250;</span>
        </button>
        <button class="quick-btn" onclick="quickStart('starred')">
          <span class="qb-ico">&#11088;</span>
          <span><span class="qb-title">★チェック問題</span><span class="qb-sub" id="qb-star">0問</span></span>
          <span class="qb-arrow">&#8250;</span>
        </button>
      </div>
    </div>
    <div class="home-sec">
      <h3>カテゴリから選ぶ</h3>
      <div class="group-grid" id="group-grid"></div>
    </div>
    <div style="height:16px"></div>
  </div>

  <!-- CATEGORY DETAIL -->
  <div class="screen" id="cat-detail">
    <div class="dh">
      <div class="dh-name" id="detail-name"></div>
      <div class="dh-stats" id="detail-stats"></div>
    </div>
    <button class="detail-start" onclick="startFromDetail()">このカテゴリをすべて出題（おすすめ順）</button>
    <div class="sub-list" id="sub-list"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quiz-screen">
    <div class="qz-top">
      <div class="qz-track"><div class="qz-fill" id="qz-fill" style="width:0%"></div></div>
      <span class="qz-txt" id="qz-txt">0/0</span>
      <span class="qz-badge" id="qz-badge"></span>
    </div>
    <div class="q-card">
      <button class="q-star" id="q-star" onclick="toggleStar()">&#9734;</button>
      <div class="q-tag" id="q-tag"></div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="hint-wrap" id="hint-wrap">
      <button class="hint-btn" id="hint-btn" onclick="showHint()">&#128161; ヒントを見る</button>
      <div class="hint-box" id="hint-box"></div>
    </div>
    <div id="exp-wrap"></div>
    <div id="btn-next-wrap"><button id="btn-next" onclick="nextQ()">次の問題 &#8594;</button></div>
    <div id="btn-skip-wrap"><button id="btn-skip" onclick="skipQ()">スキップ</button></div>
    <div style="height:8px"></div>
    <div id="finish-screen">
      <div class="fin-inner">
        <div class="fin-emoji" id="fin-e">&#127881;</div>
        <div class="fin-title">セット終了！</div>
        <div class="fin-score" id="fin-sc"></div>
        <div class="fin-rate"  id="fin-rt"></div>
        <div class="fin-sub"   id="fin-sb"></div>
        <div class="fin-btns">
          <button class="fb fb-blue" onclick="restartSet()">&#128257; もう一度</button>
          <button class="fb fb-red"  onclick="quickStart('wrong')">&#128260; 不正解を復習</button>
          <button class="fb fb-gray" onclick="switchScreen('home')">&#127968; ホームへ戻る</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="screen" id="list-screen">
    <div class="list-top">
      <input class="list-search" id="list-search" type="text" placeholder="&#128269; 問題文・答えで検索..." oninput="renderList()">
      <div class="chips">
        <button class="chip on" onclick="setChip(this,'all')">すべて</button>
        <button class="chip"    onclick="setChip(this,'wrong')">&#10007; 不正解</button>
        <button class="chip"    onclick="setChip(this,'starred')">&#11088; チェック</button>
        <button class="chip"    onclick="setChip(this,'unanswered')">未回答</button>
        <button class="chip"    onclick="setChip(this,'correct')">&#10003; 正解</button>
      </div>
    </div>
    <div class="list-cnt" id="list-cnt"></div>
    <div class="list-items" id="list-items"></div>
  </div>

  <!-- STATS -->
  <div class="screen" id="stats-screen">
    <div class="s-cards" id="s-cards"></div>
    <div class="s-sec">カテゴリ別成績</div>
    <div id="cs-list"></div>
    <button class="stats-reset" onclick="resetAll()">&#128465; 進捗をリセット</button>
  </div>

</div>

<div id="nav">
  <button class="nav-btn active" id="nav-home"  onclick="switchScreen('home')"><span class="ico">&#127968;</span>ホーム</button>
  <button class="nav-btn"        id="nav-list"  onclick="switchScreen('list')"><span class="ico">&#128203;</span>一覧</button>
  <button class="nav-btn"        id="nav-stats" onclick="switchScreen('stats')"><span class="ico">&#128200;</span>成績</button>
</div>

<script>
const QUESTIONS = [{"id":1,"category":"品詞問題・トレーニング","qnum":1,"question":"The weather in Merizo is very ______ year-round, though there are showers almost daily from December through March.","A":"agreeable","B":"agree","C":"agreement","D":"agreeably","answer":"A","answer_word":"agreeable","explanation":"空所に入るのは補語になる形容詞。 選択肢が知らない単語でも、 形容詞の語尾 -able の付いた (A) agreeable(快適な)が正解と判断できる。 名詞の (C)「合意」 も補語になるが、文意と合わず、 副詞 very に修飾されない。(B) 「合意する」 は動詞、(D) 「気 持ちよく」は副詞で共に補語にならない。空所後の year-round (1 年中) はここでは副詞。 訳：12 月から 3 月にかけてほぼ毎日夕立があるが、Merizo の天候は、1 年中とても快適だ。"},{"id":2,"category":"品詞問題・トレーニング","qnum":2,"question":"______ for the competition should be submitted by November 28 at the latest.","A":"Enter","B":"Entered","C":"Entering","D":"Entries","answer":"D","answer_word":"Entries","explanation":"空所には文の主語が必要。主語になるの は名詞なので、「エントリー作品」を意味する名詞 (D) Entries が正解。(A) 「入る」 は動詞、(B) はその過去形・過去分詞で、いずれも主語にならない。(C) を「エントリーすること」 という 動名詞と考えると、「エントリーすることが提出されるべきだ」となり、文意が通じない。 訳：コンテストへのエントリー作品は、遅くとも 11 月 28 日までに提出すること。"},{"id":3,"category":"品詞問題・トレーニング","qnum":3,"question":"Creek County approved ______ to create a transportation council, which will coordinate the planning of new roads and tunnels.","A":"legislation","B":"legislate","C":"legislated","D":"legislates","answer":"A","answer_word":"legislation","explanation":"この文の主語は Creek County で、述語動詞が approved。空所には目的語となる名詞が必要なので、名詞の語尾 -tion の付いた (A) legislation(法律)が正解。approve legislation で「法律を可決する、制定する」の意味。(B) は動詞、(C) は過去形・過去分詞、(D) は三人称単数現在形で、いずれも目的語にならない。訳：Creek 郡は、新しい道路とトンネルの計画を調整する、運輸審議会創設の条例を承認した。"},{"id":4,"category":"品詞問題・トレーニング","qnum":4,"question":"The award ceremony ______ with a speech by the Chief Executive Officer, Harry Robinson.","A":"opening","B":"to open","C":"opener","D":"opened","answer":"D","answer_word":"opened","explanation":"主語が The award ceremony(授賞式)なので、open の過去形 (D) opened を空所に補えば、「授賞式がスピーチで幕を開けた」という正しい文が完成する。(A) は job opening(仕事の空き)や opening speech(開会の辞)のように名詞・形容詞で使われる。(B) は不定詞、(C) は「開けるもの」を表す名詞。訳：授賞式は、最高経営責任者である Harry Robinson のスピーチで始まった。"},{"id":5,"category":"品詞問題・トレーニング","qnum":5,"question":"The ensemble’s performance was ______ impressive because they decided to enter the contest at the last minute.","A":"particular","B":"particularity","C":"particulars","D":"particularly","answer":"D","answer_word":"particularly","explanation":"空所前が was、後ろがその補語の形容詞 impressive (印象的な) で、文の要素 SVC がすで にそろっている。つまり、空所に入るのは修飾語。空所後の形容詞を修飾するのは副詞の (D) particularly (特に)。《be 動詞 ______ 形容詞) は、品詞問題で副詞が正解になる頻出パターンの 1 つ。(A) は形容詞「特定の」か、名詞「詳細」。(B) は名詞「特殊性」。(C) は名詞の複数形。 訳：その合奏団の演奏が特に印象に残った。"},{"id":6,"category":"品詞問題・トレーニング","qnum":6,"question":"Ogawara Electronics is going to relocate its corporate headquarters to a larger facility in order to accommodate the ______ of a legal department.","A":"additive","B":"addition","C":"added","D":"add","answer":"B","answer_word":"addition","explanation":"空所には名詞が入るので、名詞の語尾 -tion の付いた (B) addition (追加) が正解。この (冠詞 ______ 前置詞) の問の空所は、品詞問題で名詞が正解になる 頻出パターンの 1 つ。(A) は 「添加物」 を意味する名詞だが、文意に合わない。(D) は動詞 「…を加える」で、(C) はその過去形・過去分詞。 訳：Ogawara Electronics は、追加される法務部を収容するために、より広い施設へと本社を移転する。"},{"id":7,"category":"品詞問題・トレーニング","qnum":7,"question":"The shareholders meeting will begin ______ at 2 P.M. so all presenters should be well prepared by that time.","A":"prompt","B":"prompted","C":"promptly","D":"promptness","answer":"C","answer_word":"promptly","explanation":"空所後の at 2 PM. という時刻を修飾し、「ちょうど 2 時に」 の意味を表すのが副詞の (C) promptly. (A) は 「迅速な」 という形容詞や、「うながす」 という動詞として頻出。(B) は動詞 の過去形・過去分詞。名詞の (D) 「迅速さ」 を begin の目的語と考えると文意が通らない。 訳：株主総会は午後 2 時ちょうどに始まるので、発表者は全員それまでによく準備しておくこと。"},{"id":8,"category":"品詞問題・トレーニング","qnum":8,"question":"During yesterday’s press conference, Mr. Shimura ______ denied that the company would acquire Seattle-based White Corporation.","A":"emphasized","B":"emphatic","C":"emphatically","D":"emphasis","answer":"C","answer_word":"emphatically","explanation":"空所に入るのは修 飾語。直後の動詞 denied (を否定した) を修飾するのは副詞の (C) emphatically (きっぱ りと)。(A) は動詞 emphasize (強調する) の過去形・過去分詞。(B) 「きっぱりした」 は形容詞。 (D) 「強調」は名詞。SV の間の空所は、品詞問題で副詞が正解になる頻出パターンの 1 つ。 訳：昨日の記者会見中 Shimura さんは、シアトルを拠点とする White 社を買収することをきっぱりと否定した。"},{"id":9,"category":"品詞問題・トレーニング","qnum":9,"question":"A proposal to upgrade the data security software will be considered at the next ______ scheduled meeting.","A":"regulating","B":"regularly","C":"regulate","D":"regulation","answer":"B","answer_word":"regularly","explanation":"空所後の形容詞 scheduled を修飾するのは副詞の (B) regularly (定期的に)。「定 期的に予定されている会議」となり、文意も通る。(A) は、動詞 (C) regulate (〜を規制する) の現在分詞・動名詞。(D) 「規制」 は名詞。〈______ 形容詞+ 名詞〉 の空所には形容詞が入る場 合もあるので、選択肢に両方あれば文意を考えよう。 訳：データ保護ソフトをアップグレードするという提案は、次の定例会議で検討される。"},{"id":10,"category":"品詞問題・トレーニング","qnum":10,"question":"Job ______ will be posted on the college Web site and normally remain open for one to two weeks depending on the position.","A":"open","B":"opens","C":"opened","D":"openings","answer":"D","answer_word":"openings","explanation":"空所には文の主語が必要なので、名詞の (D) openings が正解。job openings(仕事の空き、求人)は TOEIC L&R 頻出語。(A) は動詞「〜を開ける」または形容詞「開いた」、(B) は三人称単数現在形、(C) は過去形・過去分詞。Job のように、可算名詞の単数形が冠詞なしで名詞の前に置かれると、後ろの名詞を修飾する形容詞のように働き、複合名詞になることがある。訳：求人は、大学のウェブサイトに掲載され、職種によるが、通常 1〜2 週間は空きがあるだろう。"},{"id":11,"category":"品詞問題・トレーニング","qnum":11,"question":"During the company banquet, David Thomas was presented with L a watch in ______ of his thirty years of service.","A":"appreciate","B":"appreciated","C":"appreciating","D":"appreciation","answer":"D","answer_word":"appreciation","explanation":"空所には前置詞 in の目的語となる名詞が必要なので、(D) appreciation (感謝) が正解。in appreciation of X (X に感謝して) は重要表現。(A) 「〜を感謝する」は動詞。(B) はその過去形・過去分詞。 (C) は現在分詞・動名詞。 (前置詞 ______ 前置詞) は、品詞問題で名詞が正解になる頻出パター ジXの) 2 訳：会社のパーティーで、David Thomas は、勤続 30 年への感謝のとして腕時計を授与された。"},{"id":12,"category":"品詞問題・トレーニング","qnum":12,"question":"Shipping costs will be calculated ______ at the sales counter based on the product weight, size, and destination.","A":"automatic","B":"automatically","C":"automation","D":"automated","answer":"B","answer_word":"automatically","explanation":"空所に 入るのは修飾語。完全文にそえて動詞部分 will be calculated を修飾するのは副詞の (B) automatically (自動的に)。(A) は形容詞 「自動的な」か、名詞「オートマチック車」。(C) は名 詞「自動化」。 (D) は形容詞 「自動化された」。 受動態の直後も副詞が入る基本位置。 訳：配送料は、商品の重さ・サイズ・届け先に応じて、販売カウンターで自動的に計算される。"},{"id":13,"category":"品詞問題・トレーニング","qnum":13,"question":"Passengers on Air Atlanta may cancel their ______ for a nominal fee, if the requests are filed one week in advance.","A":"book","B":"booked","C":"bookings","D":"bookable","answer":"C","answer_word":"bookings","explanation":"空所にはその所有物となる名詞が必要。「乗客はをキャ ンセルできる」 という文意に合う名詞は (C) bookings (予約)。名詞の (A) \"A, は文意と合わ ない。 (B) は動詞 book(〜を予約する) の過去形・過去分詞。 (D)「予約可能な」は形容詞。 なお、 their online bookings のように所有格と名詞の間に形容詞が入る場合もあるので、空所後 も確認しよう。 訳：アトランタ航空の乗客は、1 週間前に申請すれば、わずかな手数料で予約をキャンセルできる。"},{"id":14,"category":"品詞問題・トレーニング","qnum":14,"question":"Ms. Kelly was able to solve the issues with the new software L ______ after consulting Mr. Lee in the technical support department.","A":"easily","B":"easy","C":"eased","D":"ease","answer":"A","answer_word":"easily","explanation":"述語動詞を修飾するのは副詞なので、(A) easily (簡単に) が。完全文の文末は品詞問題で副詞が正解になる頻出パターンの 1 つ。(B) 「簡単な」は形 容詞。(C) は動詞 ease (やわらげる) の過去形・過去分詞。(D) は動詞または名詞「簡単さ」。 訳：Kelly さんは、技術サポート部の Lee さんに相談して、新しいソフトの問題を簡単に解決できた。"},{"id":15,"category":"品詞問題・トレーニング","qnum":15,"question":"Mr. Garcia’s ______ for updating the current inventory control system will be reviewed at the next board meeting.","A":"recommend","B":"recommending","C":"recommendation","D":"recommendable","answer":"C","answer_word":"recommendation","explanation":") 文頭の Mr. Garcia’s D's, は所有格 (〜の) を表し、空所には所有物となる名詞が必要。 よって、(〇) recommendation (推薦、 提案) が正解。ここでは文の主語として機能している。 (A) 「〜を薦める」 は動詞。(B) はその現在分詞・動名詞。動名詞の場合、Thank youfor 1 recommending the book. のように目的語を伴う。(D) 「推薦可能な」は形容詞。 意 訳：現行の在庫管理システムをアップデートするという Garcia さんの提案は、次の取締役会で検討される。"},{"id":16,"category":"品詞問題・トレーニング","qnum":16,"question":"Department managers are required to ensure all the staff L members they supervise have a ______ understanding of the company mission.","A":"clear","B":"clearly","C":"clarity","D":"clears","answer":"A","answer_word":"clear","explanation":"空所に入る のは名詞を修飾する形容詞 (A) clear(明確な)。(B)「明確に」は副詞。(C)「明確さ」は名詞。(D) は動詞 clear (〜を片付ける) の三人称単数現在形。語尾が -ing の understanding を、動 名詞や現在分詞と考え副詞を選ばないよう、文構造の見極めがポイント。 訳：部門長は、監督下のスタッフ全員の企業使命の明確な理解を確実にするよう求められている。"},{"id":17,"category":"品詞問題・トレーニング","qnum":17,"question":"Yearly utility costs for the new energy efficient headquarters will be about 50% lower than those of ______ designed buildings.","A":"conventionally","B":"convention","C":"conventions","D":"conventional","answer":"A","answer_word":"conventionally","explanation":"…形。語尾が -ing の understanding を、動 名詞や現在分詞と考え副詞を選ばないよう、文構造の見極めがポイント。 訳：部門長は、監督下のスタッフ全員の企業使命の明確な理解を確実にするよう求められている。"},{"id":18,"category":"品詞問題・トレーニング","qnum":18,"question":"New and transferred employees must become ______ with company policies and procedures in order to perform their jobs safely and efficiently.","A":"familiar","B":"familiarize","C":"familiarizing","D":"familiarization","answer":"A","answer_word":"familiar","explanation":"空所には補語が必要。補語になるのは 形容詞か名詞で、形容詞の (A) familiar を空所に補えば文意が通る。become familiar with X C'X に精通する」 という意味。名詞の (D) 「精通させること」 も補語になるが、主語 の employees とイコールにならず、文意が通らない。 (B) 「よく知らせる」 は動詞。(C) はそ の現在分詞・動名詞。 訳：新入社員と異動してきた社員は、安全かつ効率的に仕事をするために、会社の方針と手順に慣れな ければならない。"},{"id":19,"category":"品詞問題・トレーニング","qnum":19,"question":"Dream Painting Ltd. is a painting contractor with a solid L reputation for ______ completing projects by tight deadlines.","A":"success","B":"successful","C":"successfully","D":"succeed","answer":"C","answer_word":"successfully","explanation":"空所に入るのは修飾語。動名 詞を修飾するのは副詞なので、 (C) successfully (うまく) が正解。(A) 「成功」は名詞。(B) 「成 功している」は形容詞。(D) は動詞。 「動名詞は元々動詞なので修飾するのは副詞」 と覚えておこう。 訳：Dream Painting 社は、厳しい締切で仕事をうまく完了させるとの、確かな評判をもつ塗装業者だ。"},{"id":20,"category":"品詞問題・トレーニング","qnum":20,"question":"ver the past few years as the domestic market has matured, manufacturers in Japan have ______ turned to overseas markets.","A":"increase","B":"increases","C":"increasing","D":"increasingly","answer":"D","answer_word":"increasingly","explanation":"空所を除いても現在完了形の文が成立しているので、空所に入るのは修飾語。前後の動詞部分 have turned を修飾する副詞の (D) increasingly(ますます)が正解。(A) は動詞または名詞、(B) は三人称単数現在形または名詞の複数形、(C) は現在分詞・動名詞。現在完了形の has / have と過去分詞の間にも副詞が入る。訳：国内市場が成熟したここ数年で、日本の製造業は、ますます海外市場に目を向けるようになってきた。"},{"id":21,"category":"品詞問題・トレーニング","qnum":21,"question":"The purpose of the survey is to collect information from our L customers in order to make our operations more efficient and","A":"rely","B":"reliable","C":"reliably","D":"reliance","answer":"B","answer_word":"reliable","explanation":"空所前の等位接続詞 and は、 and and 用の形で、原則として同品詞を並べ てつなぐ (並列構造と呼ばれる形)。ここでは、and の前が efficient WHE) という形容 詞なので、同じ形容詞の (B) reliable (信頼できる) を空所に補えば、make OI CI」 OC (補 語) として機能し、正しい文が完成する。(A) 「頼る」 は動詞。(C) 「確実に」 は副詞。(D) 「依存」 は名詞。 訳：調査の目的は、われわれの事業運営をより効率的で信頼性の高いものにするために、顧客から情報 を収集することだ。"},{"id":22,"category":"品詞問題・トレーニング","qnum":22,"question":"The most recently completed section of the water tunnel is considered to be the largest ______ project ever undertaken in Nagasaki.","A":"construct","B":"constructed","C":"constructs","D":"construction","answer":"D","answer_word":"construction","explanation":"空所直後の名詞 project を修飾する過去分詞 (B) constructed を空所に入れても、\"建設され たプロジェクト」 となり文意が通らない。そこで、名詞の (D) construction (建設) を空所に 補うと、 construction project (建設プロジェクト) という複合名詞が完成し、 文意が通る。 (A) 「〜を建設する」は動詞。(C) は動詞の三人称単数現在形。 訳：この水中トンネルの直近で完成した部分は、これまで長崎で施工された最大の建築計画だと考えら れている。"},{"id":23,"category":"品詞問題・トレーニング","qnum":23,"question":"Some of the ______ for employees at Sky Manufacturing include a company car and company stock options.","A":"benefit","B":"benefits","C":"beneficial","D":"beneficially","answer":"B","answer_word":"benefits","explanation":"冠詞と前置詞の間の空所に入るのは名詞なので、(A) と (B) が正解候補。この文の述語動詞 include に三単現の s が付いていないため、対応する主語は複数形でなければならない。よって複数形の (B) benefits(手当、福利厚生)が正解。「会社から出る諸手当・福利厚生」の意味では通常複数形になる。(A) は単数形なので主述が合わない。(C) は形容詞、(D) は副詞。訳：Sky Manufacturing 社の従業員特典には、社用車と自社株購入権が含まれている。"},{"id":24,"category":"品詞問題・トレーニング","qnum":24,"question":"Francesco Romano opened a new wellness ______ on the first floor of his house after quitting his job as a television repairman.","A":"facilitate","B":"facility","C":"facilitates","D":"facilitation","answer":"D","answer_word":"facilitation","explanation":"空所に補い、wellness facility (健康施設) という複合名詞をれば、正しい文が完成する。 OE 1 名詞の (D) facilitation (促進) は文意に合わず、不可算名詞なので冠詞 が付かない。(A) 「- Ss を促進する」は動詞。(C) はその三人称単数現在形。 訳：Francesco Romano はテレビ修理の仕事を辞めたあと、自宅の 1 階に新しい健康 (維持のための) 施 設を開いた。"},{"id":25,"category":"品詞問題・トレーニング","qnum":25,"question":"According to the event manager, it is important to complete urgent ______ in order of importance.","A":"task","B":"tasked","C":"tasking","D":"tasks","answer":"D","answer_word":"tasks","explanation":"空所には、他動詞 complete (〜を完了する) の目的語で、形容詞 urgent (緊急な) に修飾さ れる名詞が必要。 選択肢中、名詞は単数形の (A) か、複数形の (D)。task (任務、仕事) は可 算名詞で、 冠詞 ( / an / the) 等が付いていない単数・原形では使えないので、複数形の (D) tasks が正解。 (B) は動詞 task(てに任務を与える)の過去形・過去分詞で、(C) はその現在分詞・ 動名詞。 不 イベントマネージャーによれば、重要度順に緊急の仕事を完了させることが大事である。 Ga"},{"id":26,"category":"品詞問題・トレーニング","qnum":26,"question":"Harold’s Ice Cream recently launched a newly ______ Web site that showcases its innovative ice-cream desserts.","A":"design","B":"designs","C":"designed","D":"designing","answer":"C","answer_word":"designed","explanation":"空所後の名詞 Web site と動詞 design の間には、「デザインされる」 と いう受動の関係があるので、過去分詞の (C) designed が正解。現在分詞の (D)) だと、Web site がデザインする側になってしまい、意味が通らない。(A) は名詞または動詞。(B) はその 複数形か三人称単数現在形。 訳：Harold’s Ice Cream 社は最近、斬新なアイスクリームのデザートを紹する、新しくデザインされた ウェブサイトを立ち上げた。"},{"id":27,"category":"品詞問題・トレーニング","qnum":27,"question":"The demand for electric automobiles has increased by ______ 50 percent over the past 10 years in Australia.","A":"nears","B":"nearly","C":"nearing","D":"nearness","answer":"B","answer_word":"nearly","explanation":"空所に副詞の (B) nearly (ほぼ) を補えば、空所後の数詞 50 を修飾し、 nearly 50 percent で「50%近く」 の意味になる。数詞は形容詞の一種なので副詞の修飾を 受けるということを覚えておこう。(A) は動詞 near (てに近づく) の三人称単数現在形。(C) はその現在分詞・動名詞。(D) 「近さ」 は名詞。 オーストラリアにおいて、電気自動車の需要は過去 10 年間で 50%近く増加している。 ie"},{"id":28,"category":"品詞問題・トレーニング","qnum":28,"question":"Half of the board members of Bell Corporation are appointed on L a ______ two-year basis.","A":"rotate","B":"rotates","C":"rotating","D":"rotation","answer":"C","answer_word":"rotating","explanation":"空所に入るのは形容詞か副詞選択肢に副詞がないので、形容 詞として機能する現在分詞の (C) rotating (交代制の) を選ぶ。on rotating basis で「交代制 で」 の意味。(A) 「交代する」 は動詞。(B) はその三人称単数現在形。(D) 「交代制」 は名詞で、形 容詞 two-year (ハイフンの付いた単語は通常形容詞) の前ではなく後ろるに置かれる。 訳：Bell 社の取締役員の半数は 2 年交代で指名される。"},{"id":29,"category":"品詞問題・トレーニング","qnum":29,"question":"Restoration work on the Marysville Museum is ______ much slower than residents had hoped.","A":"regret","B":"regretful","C":"regrettable","D":"regrettably","answer":"D","answer_word":"regrettably","explanation":"空所後の slower は形容詞 slow の比較級で is の補語 (much は強意の副詞)。be 動 詞と形容詞の間で直後の形容詞を修飾するのは副詞なので、(D) regrettably (残念ながら) 1 が正解。(A) は「〜を後悔する」という動詞か、「後悔」という名詞。(B) (C) 「残念な」 は形容詞。 訳：Marysville 博物館の修復工事は、残念ながら住民が期待していたよりはるかに遅い。"},{"id":30,"category":"品詞問題・トレーニング","qnum":30,"question":"n many ______ Ms. Humphrey sketched and painted until after L midnight, when the only sound was the cooing of pigeons on the roof.","A":"occasionally","B":"occasions","C":"occasional","D":"occasion","answer":"B","answer_word":"occasions","explanation":"空所には (B) occasions が入る。(A) は副詞、(C) は形容詞、(D) は名詞だが単数形なので many と数が合わない。occasion（時、出来事、機会）は TOEIC L&R 頻出語で、on many occasions は「何度も、たびたび」の意味。類似表現の on several occasions（何度か）も押さえておきたい。訳：Humphrey さんはたびたび、屋根からのハトの鳴き声しか聞こえない真夜中過ぎまで、スケッチや絵を描いた。"},{"id":31,"category":"品詞問題・トレーニング","qnum":31,"question":"Word-of-mouth ______ is considered highly effective, but remains a rarely studied phenomenon.","A":"advertise","B":"advertised","C":"advertising","D":"advertisements","answer":"C","answer_word":"advertising","explanation":"空所には、文頭の形容詞 Word-of-mouth(クチコミの)の修飾を受けつつ文の主語になる名詞が必要。直後の述語動詞が is なので、単数扱いの不可算名詞 (C) advertising(宣伝、広告、広告業)が正解。advertising は advertise の現在分詞・動名詞としても頻出。(D) advertisements は意味的には近いが複数形なので、述語動詞 is と数が合わない。(B) は過去形・過去分詞。訳：クチコミによる宣伝は、非常に効果的と考えられているが、依然として、ほとんど検証されていない現象だ。"},{"id":32,"category":"品詞問題・トレーニング","qnum":32,"question":"t is the job of flight attendants to make passengers feel as ______ as possible during the flight.","A":"comfortable","B":"comfortably","C":"comfort","D":"comforting","answer":"A","answer_word":"comfortable","explanation":")(B)(D) が正解候補。空 所前の副詞 as を取った... make passengers feel ______ が元の形だが、動詞 feel は SVC の形を取り、補語を伴う。よって、形容詞の (A)(D) が残り、文意から (A) comfortable (快 WAR) を選ぶ。(D)「慰めになる」は文意に合わない。(B)「快適に」は副詞。(C)「快適さ」は名詞。 飛行中、 乗客にできるだけ快適に感じさせることが、客室乗務員の役目である。"},{"id":33,"category":"品詞問題・実戦問題 基本編","qnum":1,"question":"Mr. Tomiyasu returned the ______ merchandise to the manufacturer at his own expense.","A":"defect","B":"defective","C":"defectively","D":"defection","answer":"B","answer_word":"defective","explanation":"直後の名詞を修飾する形容詞の (B) defective (欠陥のある)。(A) 「欠陥」 は名詞。(C) 「不完全に」 は副詞。(D) 「亡命」は名詞。 意味がわからなくとも、語尾が-ly の単語 (ここでは defectively) は、副詞と判断で 11 きる。そして、その単語から -ly を取ったものは形容詞になる (defective). (NF クニックを使えば、 選択肢に並ぶ語句を知らなくても、 正解できるケースがあるので、 覚えておこう。 訳：Tomiyasu さんは、欠陥商品を自費でメーカーに返品した。"},{"id":34,"category":"品詞問題・実戦問題 基本編","qnum":2,"question":"Mr. Santos, who joined Wood Eco Institute just three months ago, has already proved himself to be a ______ employee.","A":"value","B":"valuable","C":"valuing","D":"valuation","answer":"B","answer_word":"valuable","explanation":"空所に入るのは、直後の名詞 employee (従業員) を修飾する形容詞 の (B) valuable (価値ある)。(A) は 「価値」 という名詞か、「〜をありがたく思う」 という動詞。 (C) は動詞の現在分詞・動名詞で、現在分詞として空所に入れても意味が通らない。(D)「査定」 は名詞。 訳：Santos さんは、わずか3カ月前に Wood Eco 研究所に加わったばかりだが、すでに有能な所員で あることを自ら示している。"},{"id":35,"category":"品詞問題・実戦問題 基本編","qnum":3,"question":"Acustomer placing an order through our Web site should receive a ______ within 24 hours.","A":"response","B":"respond","C":"responded","D":"responding","answer":"A","answer_word":"response","explanation":"空所に必要なので、(A) response (返事) が。(B) は「応じる」 という動詞。(C) はその過去形・過去分詞。(D) は現在分詞・動名詞。 なお、 行為を示す動名詞は数えられないため、通常、冠詞 が付かない。こうした問題で 選ばないよう注意しよう。 訳：弊社ウェブサイトを通して注文した顧客は、24 時間以内に連絡を受け取るだろう。"},{"id":36,"category":"品詞問題・実戦問題 基本編","qnum":4,"question":"After 30 years of ______ to Johnson City, Donna Stover stepped down as mayor and council secretary.","A":"serve","B":"served","C":"serves","D":"service","answer":"D","answer_word":"service","explanation":"空所に必要なので、(D) service (勤務) が正解。こ の(前置詞 ______ 前置詞) の間の空所は、品詞問題で名詞が正解になる頻出パターンの 1 つ。 (A 「食事を出す、く」は動詞。(B) は過去形・過去分詞。(C) は動詞の三人称単数現在形。 訳：Johnson 市への 30 年間の勤務ののち、Donna Stover は、市長と市議会議長としての職を辞した。"},{"id":37,"category":"品詞問題・実戦問題 基本編","qnum":5,"question":"Mr. Sanders won this quarter’s Best Employee award for his ______ service to clients and early achievement of his yearly sales target.","A":"except","B":"exceptional","C":"exceptionally","D":"exceptions","answer":"B","answer_word":"exceptional","explanation":"空所に入るのは、直後の名詞 service を修飾する形容詞の (B) exceptional (並外れた)。(A) は 「〜を除いて」 という前置詞か、「を除く」 という動詞。(C) 「非常に」 は副詞。(D) 「例外」 は名詞の複数形。空所前の所有格だけを見て名詞の (D) を選ん ではいけない。 訳：Sanders さんは、顧客への並外れた尽力と、年間売上目標の早期達成により、本中半期の最優秀社 員賞を受賞した。"},{"id":38,"category":"品詞問題・実戦問題 基本編","qnum":6,"question":"The appearance of the CEO at the Beijing Motor Show was a U ______ that his company is eager to expand into China.","A":"reminder","B":"remind","C":"reminded","D":"reminding","answer":"A","answer_word":"reminder","explanation":"空所前に a があるので、補語になる名詞の (A) reminder(再確認、思い出させるもの)が正解。(B) は動詞、(C) は過去形・過去分詞、(D) は現在分詞・動名詞。分詞は be 動詞の直後に置けるが、ここでは冠詞 a があるので不適切。訳：北京モーターショーでの CEO の登場は、彼の会社が中国進出を切望していることを再認識させた。"},{"id":39,"category":"品詞問題・実戦問題 基本編","qnum":7,"question":"Public health inspectors monitor pools ______ to ensure that they L meet specific guidelines and local laws.","A":"regular","B":"regulate","C":"regularly","D":"regularity","answer":"C","answer_word":"regularly","explanation":"空所を除いても文が成立しているので、空所に入るのは修飾語。動詞 monitor(〜を監視する)を修飾するのは副詞の (C) regularly(定期的に)が正解。(A) は形容詞、(B) は動詞、(D) は名詞。訳：公共衛生監査官は、特定の基準と地域法を確実に満たすために、プールを定期的に測定している。"},{"id":40,"category":"品詞問題・実戦問題 基本編","qnum":8,"question":"The final chapter is the most ______ part of Amazing Ads, in which the author provides reviews, remarks, and analyses of a number of advertising strategies.","A":"essence","B":"essential","C":"essentially","D":"essentiality","answer":"B","answer_word":"essential","explanation":"空所に入るのはこの名詞を修飾する 形容詞の (B) essential (不可欠な)。the most essential part of X (X の最も大切な部分) は最上級の形。(A) 「本質」 は名詞。(C) 「本質的に」は副詞。(D) 「必要性」は名詞。 訳：いくつかの宣伝戦略について著者が評価、意見、分析を述べる最終章が、『驚きの広告』の核心部だ。"},{"id":41,"category":"品詞問題・実戦問題 基本編","qnum":9,"question":"Achange in the price of ______ is expected by the end of the year.","A":"electrify","B":"electrical","C":"electrically","D":"electricity","answer":"D","answer_word":"electricity","explanation":"空所には、前置詞 of の目的語の名詞が必要なので、(D) electricity (電気)が正解。原則として、 語尾が -ty の単語は名詞。 (A「〜を感動させる」のように語尾 -fy の単語は動詞。 (B)「電気の」 のように語尾 -cal の単語は形容詞。(C) 「電気的に」のように語尾 -ly の単語は副詞。 訳：電気料金の改定が、年末までに予定されている。"},{"id":42,"category":"品詞問題・実戦問題 基本編","qnum":10,"question":"Employees are reminded to record their vacation days ______ on their time sheets.","A":"careful","B":"more careful","C":"carefully","D":"carefulness","answer":"C","answer_word":"carefully","explanation":"空所を除いても文が成立しているので、空所に入るのは修飾語。動詞 record(〜を記録する)を修飾するのは副詞の (C) carefully(慎重に、注意深く)が正解。(A) は形容詞、(B) は比較級、(D) は名詞。訳：従業員は、休暇日をタイムカードに注意深く記録するよう、再度確認してください。"},{"id":43,"category":"品詞問題・実戦問題 基本編","qnum":11,"question":"Sun Watch Corporation offers ______ replacement batteries for all of its products.","A":"free","B":"freely","C":"freeing","D":"freedom","answer":"A","answer_word":"free","explanation":"空所に入るのは、直後の名詞 replacement batteries (交換用電池) を修飾する形容詞の (A) free (無料の)。(B) 「自由に」 は副詞。(C) は 動詞 free (〜を自由にする) の現在分詞・動名詞。現在分詞として空所に入れても、意味が 1 通らない。(D) 「自由」 は名詞。 訳：Sun 時計社は、すべての製品について無料の交換用電池を提供している。"},{"id":44,"category":"品詞問題・実戦問題 基本編","qnum":12,"question":"Mr. Yashima spoke ______ with the vice president about his L decision to step down as CEO.","A":"exclusively","B":"exclusive","C":"exclusivity","D":"exclusiveness","answer":"A","answer_word":"exclusively","explanation":"空所に入るのは修飾語。直前の動詞 spoke を修飾 するのは副詞の (A) exclusively (= only). (B) は形容詞「限定の」か、名詞「独占記事」。 (C)(D) は名詞「独占」。speak には他動詞としての用法もあるが、「(言語)を話す」という意味なので、 (C)(D) を目的語として続けることはできない。 訳：Yashima さんは、最高経営責任者を退任する決断について、副社長にだけ話した。"},{"id":45,"category":"品詞問題・実戦問題 基本編","qnum":13,"question":"Summaries of the ______ among the hiring committee will be distributed to board members by the end of the week.","A":"discuss","B":"discussed","C":"discusses","D":"discussions","answer":"D","answer_word":"discussions","explanation":"空所前の冠詞 the の後ろに名詞が欠けているので、 (D) discussions (議論) を補う。この(《冠 詞 ______ 前置詞) の空所は、品詞問題で名詞が正解になる頻出パターンの 1 つ。(A) 「てに ついて話す、議諭する」 は動詞。(B) はその過去形・過去分詞で、(C) は三人称単数現在形。 訳：雇用委員会での議論の概要は、今週末までに、取締役に配付される。"},{"id":46,"category":"品詞問題・実戦問題 基本編","qnum":14,"question":"The best way to help people reduce their ______ on non-renewable energy sources is to educate consumers about the potential of solar energy.","A":"dependent","B":"dependently","C":"dependable","D":"dependence","answer":"D","answer_word":"dependence","explanation":"空所は、品詞問題で名詞が正解になる頻出パターンの 1 つ。(A) 「てに ついて話す、議諭する」 は動詞。(B) はその過去形・過去分詞で、(C) は三人称単数現在形。 訳：雇用委員会での議論の概要は、今週末までに、取締役に配付される。"},{"id":47,"category":"品詞問題・実戦問題 基本編","qnum":15,"question":"t is important that the materials used for the building be ______ for the climate of the area.","A":"suit","B":"suitable","C":"suitably","D":"suitability","answer":"B","answer_word":"suitable","explanation":"空所に必要。that 節の主語 the materials (素材) とイコール関係になり文意が通るのは形容詞の (B) suitable (適した)。名 詞の (D) 適合性」は文意に合わない。(A) は動詞 「てに合う」か、名詞「スーツ」。(C) 「適切に」 は副詞。 important や necessary のような (重要性や必要性〉 などを表す形容詞に続く that Ne 節内では原形動詞 (ここでは be) を用いる点にも注意を払っておきたい。この点は、 2 《動詞問題》の出題ポイントになる。 訳：建物に使用される材料は、その地域の天候に適したものであることが重要だ。"},{"id":48,"category":"品詞問題・実戦問題 基本編","qnum":16,"question":"There are blankets and pillows in the overhead compartments for the passengers’______ during the flight.","A":"comfortable","B":"comforted","C":"comfortably","D":"comfort","answer":"D","answer_word":"comfort","explanation":"直前の所有格 passengers*(乗客の) の後ろるには名詞が必要なので、(D) comfort (快適さ) が正解。 前置詞 for の目的語として機能している。(A) 「快適な」 は形容詞 (-ble)。(B) は動詞 comfort (〜を慰める) の過去形・過去分詞 (-ed). (C) 「快適に」 は副詞 (-Iy)。 1 訳：飛行中の乗客の快適性のために、毛布と枕が頭上の荷物入れにある。"},{"id":49,"category":"品詞問題・実戦問題 基本編","qnum":17,"question":"Please view the written ______ of the product online before L contacting a company representative with a question.","A":"describe","B":"describes","C":"described","D":"description","answer":"D","answer_word":"description","explanation":"空所前の述語動詞 view (〜を見る) の後ろに、the written (書かれた一) とあるだけで目的 語が欠けている。 目的語になるのは名詞なので、語尾 -tion が付いた (D) description (説明) を選ぶ。(A) 「〜を説明する」 は動詞。(B) はその三人称単数現在形。(C) は過去形・過去分詞。 会社担当者に質問のご連絡をいただく前に、オンライン上の文書による商品説明をご覧ください。"},{"id":50,"category":"品詞問題・実戦問題 基本編","qnum":18,"question":"Lucky Corporation often receives interest from the most promising applicants because of the ______ package it offers to its staff.","A":"attract","B":"attractive","C":"attractively","D":"attraction","answer":"B","answer_word":"attractive","explanation":"空所に入るのは名詞を修飾する形容詞なので、(B) attractive (魅力的 な) が正解。直後の名詞 package は、「給与や医療保険等、会社から社員に与えられるモノ ー式」を指す。(A) 「〜を引き付ける」は動詞。(C) 「魅力的に」 は副詞。(D) 「名所」 は名詞。 訳：Lucky 社は、社員に提供する魅力的な福利厚生のおかげで、前途有望な応募者の関心をしばしば引 き付ける。"},{"id":51,"category":"品詞問題・実戦問題 基本編","qnum":19,"question":"The Westchester Philharmonic received a ______ award for its education program three years ago.","A":"nation","B":"national","C":"nationality","D":"nationally","answer":"B","answer_word":"national","explanation":"空所に入るのは、直後の名詞 award (賞) を修飾する形容詞の (B) national (全国的な)。 national award (全国的な賞) が動詞 received (〜を受け取った) の目的語として機能している。(A) 「国」 は名詞。(C) 「国籍」は名詞。(D) 「全国的に」 は副詞。 i Westchester 管弦楽団は、3 年前、その教育プログラムに対して、国内の賞を受賞した。"},{"id":52,"category":"品詞問題・実戦問題 基本編","qnum":20,"question":"City employees ______ endorsed the new benefits plan proposed L by the city’s Department of Health.","A":"enthusiastically","B":"enthusiastic","C":"enthusiasm","D":"enthuse","answer":"A","answer_word":"enthusiastically","explanation":"直後の述語動詞を修飾するのは副詞の(A) enthusiastically (熱狂的に)。この SV の間の空所は、品詞問題で副詞が正解になる頻出パ ターンの 1 つ。(B)「熱心な」は形容詞。(C) 「熱意」 は名詞。(D) 熱心に話す」 は動詞。 訳：市職員は、市の保健局が提案した新しい福利制度を熱心に支持した。"},{"id":53,"category":"品詞問題・実戦問題 基本編","qnum":21,"question":"tis estimated that Coyote Oil’s net profit last year was in ______ of 1 billion dollars.","A":"excessive","B":"excess","C":"excessively","D":"exceed","answer":"B","answer_word":"excess","explanation":"空所に入るのは名詞の (B) excess (過剰)。in excess of X T 'X を超えて」という意味。 (A「過剰な」は形容詞。 (C)「過剰に」は副詞。 (D)「-…を超える」は動詞で、 exceed expectations (期待を超える) のように使われる。 訳：昨年の Coyote 石油の純利益は、10 億ドルを超えると推計されている。"},{"id":54,"category":"品詞問題・実戦問題 基本編","qnum":22,"question":"The Department of Transportation has ______ requested L information about Mr. Becker’s updated address.","A":"repeat","B":"repeated","C":"repeatedly","D":"repeats","answer":"C","answer_word":"repeatedly","explanation":"空所に入るのは修飾語。前後の述語動詞を修飾するのは副詞の (C) repeatedly (くり返し て)。(A) 「くり返す」は動詞。(B) はその過去形・過去分詞で、(D) は三人称単数現在形。 訳：運輸部は、Becker さんの更新された住所情報を、くり返し問い合わせている。"},{"id":55,"category":"品詞問題・実戦問題 基本編","qnum":23,"question":"Buy one of our surfboards and get a free ______ to Surfing Life magazine.","A":"subscription","B":"subscribe","C":"subscribed","D":"subscribing","answer":"A","answer_word":"subscription","explanation":"空所部分は〈冠詞+ 形容詞 ______) となっており、動詞 get の目的語が欠けている。 目的語 となるのは名詞なので、(A) subscription (購読) が正解。(B)「購読する」は動詞、(C) は過去形・ 過去分詞、(D) は現在分詞・動名詞。動名詞も目的語になり得るが、 が付かず、regularly subscribing to X のように副詞が修飾するので、空所には不適切。 訳：サーフボードを 1 枚買って、Surfing Life 誌の無料購読権を手に入れよう。"},{"id":56,"category":"品詞問題・実戦問題 基本編","qnum":24,"question":"The supermarket chain has had a very successful year under the O ______ of its new CEO, Aditya Kumar.","A":"direct","B":"direction","C":"directed","D":"directly","answer":"B","answer_word":"direction","explanation":"空所に入るのは名詞なので、(B) direction (指示) が正解。under the direction of (XXの指示の下で) は重要表現。(A) は形容詞 「直接の」 か、動詞 「〜を 向ける」か、副詞 「直接に」。(C) は動詞の過去形・過去分詞。(D) 「直接に」 は副詞。 訳：そのスーパーマーケットチェーンは、新 CEO の Aditya Kumar の指揮のもと、大成功の 1 年を送っ ている。"},{"id":57,"category":"品詞問題・実戦問題 基本編","qnum":25,"question":"No seats for the concert are guaranteed unless you make ______ L and payments in advance.","A":"reserve","B":"reserves","C":"reserved","D":"reservations","answer":"D","answer_word":"reservations","explanation":"空所に必要。目的語になるのは名詞なので、(D) reservations (予約) が正解。(A) は 「〜を予約する」 という動詞か By という名詞で、名 詞は目的語になるが文意に合わない。(B) は動詞の三人称単数現在形か名詞の複数形。(C) は動詞の過去形・過去分詞。 訳：そのコンサートの席は、事前に予約と支払いをしない限り、保証されない。"},{"id":58,"category":"品詞問題・実戦問題 基本編","qnum":26,"question":"The new sales manager has been putting an ______ on attracting new clients rather than just selling higher volumes.","A":"emphasize","B":"emphasized","C":"emphasis","D":"emphasizes","answer":"C","answer_word":"emphasis","explanation":"空所に入るのは名詞なので、(C) emphasis (強調) が正解となる。 put place an emphasis on (XXを重視する、XX に重点を置く) は重要表現。(A) '~S 強調する」は動詞。(B) はその過去形・過去分詞。(D) は動詞の三人称単数現在形。 1 訳：新しい販売部長は、ただ大量に販売することよりも、新規の顧客を引き付けることのほうを重視し ている。"},{"id":59,"category":"品詞問題・実戦問題 基本編","qnum":27,"question":"A reviewer who attended the opening night of Max Cabernet’s L new musical reported that it was exciting and ______.","A":"memory","B":"memorable","C":"memorize","D":"memorably","answer":"B","answer_word":"memorable","explanation":"空所に入るのは形容詞の (B) memorable (記憶に残る)。 (A) 「記憶」は名詞。(C) 「〜を記憶する」 は動詞。(D) 「記憶に残るように」は副詞。 訳：Max Cabernet の新ミュージカルの初演を観覧した批評家は、ワクワクする、忘れられない品だっ たと伝えている。"},{"id":60,"category":"品詞問題・実戦問題 基本編","qnum":28,"question":"The TexPhone was found to be unattractive to consumers due to weaknesses in terms of color, design, and ______ of use.","A":"easy","B":"easily","C":"ease","D":"easier","answer":"C","answer_word":"ease","explanation":"空所に入るのも名詞の (C) ease (簡単さき)。ease は 「〜をやわ らげる」 の意味の動詞でも出る。(A) 「簡単な」 は形容詞。(B) 「簡単に」 は副詞。(D) は形容詞 の比較級。 訳：TexPhone は色、デザイン、使い勝手における貧弱さのせいで、消費者への魅力に欠けたものとなった。"},{"id":61,"category":"品詞問題・実戦問題 基本編","qnum":29,"question":"Experts ______ that new building insulation regulations will reduce the state’s dependency on fossil fuels.","A":"predict","B":"predicting","C":"predictable","D":"prediction","answer":"A","answer_word":"predict","explanation":"空所には文の述 語動詞が必要なので、that 節を目的語に取る他動詞の (A) predict (ごを予想する) が正解。 (B) は現在分詞・動名詞。(C) 「予測可能な」 は形容詞。(D) 「予測」は名詞。 訳：新しい断熱建築基準が、国の化石燃料への依存を減らすだろうと、専門家たちは予測している。"},{"id":62,"category":"品詞問題・実戦問題 基本編","qnum":30,"question":"f the City Council ______ the renovation plan for the airport, L workers will begin construction late this year.","A":"approves","B":"approvable","C":"approval","D":"approvingly","answer":"A","answer_word":"approves","explanation":"主語 the City Council (市議会) に対応する述語動詞が欠けているので、動詞 の (A) approves (を承認する) が正解。(B) 「承認可能な」 は形容詞。(C) 「承認」 は名詞。(D) 「賛成して」は副詞。 DD Ropers (提案) と同じく、語尾が -al だが形容詞ではなく、 訳：市議会が空港改装計画を承認すれば、業員は年内に工事を開始するだろう。"},{"id":63,"category":"品詞問題・実戦問題 基本編","qnum":31,"question":"Dr. Matthews has received a ______ large number of calls in response to her lectures at medical schools nationwide.","A":"surprise","B":"surprised","C":"surprisingly","D":"surprises","answer":"C","answer_word":"surprisingly","explanation":"直後の形容詞 large を修飾する副詞の (C) surprisingly (驚くほど) を空所に補えば、「驚く ほど大きな数字」 となり文意が通る。(B) を形容詞として機能する過去分詞と考え空所に補 うと、「驚いた大きな数」 となり意味が通らない。(A) は名詞「驚き」か、動詞「〜を驚かす」。(D) 1 は名詞の複数形か動詞の三人称単数現在形。 訳：Matthews 博士は、全国の医療学校での講義への反響として、驚くほど多くの電話を受けた。"},{"id":64,"category":"品詞問題・実戦問題 基本編","qnum":32,"question":"BioTech’s corporate structure and financial information are ______ accessible to customers on the Web site at www.biotech.com.","A":"ready","B":"readying","C":"readily","D":"readiness","answer":"C","answer_word":"readily","explanation":"空所に入るのは修飾語。直後の形容詞 accessible を修飾するのは副詞の (C) readily(簡単に、すぐに)が正解。(A) は形容詞「準備ができて」または動詞、(B) は動詞 ready の現在分詞・動名詞、(D) は名詞。訳：BioTech 社の会社組織および財務情報は、ウェブサイト www.biotech.com で、顧客が簡単にアクセスできる。"},{"id":65,"category":"品詞問題・実戦問題 基本編","qnum":33,"question":"There has been speculation that Techsoft’s board is trying to find a ______ for its chief executive by the end of the year.","A":"replace","B":"replaced","C":"replacing","D":"replacement","answer":"D","answer_word":"replacement","explanation":"空所前の他動詞 find の目的語が空所に必要なので、名詞の (D) replacement (後任) が正解 となる。 (A) 「ての後任になる、〜を交換する」 は動詞。(B) はその過去形・過去分詞。(C) は 現在分詞・動名詞。動名詞は、replacing its CEO (その CEO の後任になること) のように 目的語を伴う。 訳：Techsoft 社の取締役会が年末までに社長の後任を探そうとしている、という憶測が流れている。 | speculation : 人憶測、推測"},{"id":66,"category":"品詞問題・実戦問題 基本編","qnum":34,"question":"Our design consultants generate concepts combining visual impact, clear messages, and a high level of ______.","A":"create","B":"creative","C":"creatively","D":"creativity","answer":"D","answer_word":"creativity","explanation":"前置詞 of の目的語が空所に必要なので、名詞の (D) creativity (創造性) が正解。仮にこれ が知らない単語でも、-ty という語尾で名詞と判断できる。(A) 「〜を創造する」 は動詞。(B) は形容詞 「創造的な」か、名詞「クリエイター」で、名詞は目的語になるが文意に合わない。(C) 「創造的に」 は副詞。 訳：われわれのデザインコンサルタントは、見た目のインパクト、明確なメッセージ、そしてハイレベル な創造性を融合したコンセプトを生み出す。 [| generate : 人Wを生み出す、作り出す [|]combine : Wーを組み合わせる、混ぜ合わせる"},{"id":67,"category":"品詞問題・実戦問題 基本編","qnum":35,"question":"Bookmart.com promises to make ______ to the Web site, and there could be an updated version as early as November.","A":"improve","B":"improvements","C":"improves","D":"improving","answer":"B","answer_word":"improvements","explanation":"直前の他動詞 make の目的語が空所に必要なので、名詞の (B) improvements (改善) が正 解。(A) 「〜を改善する」は動詞。(C) は、その三人称単数現在形。(D) は現在分詞・動名詞で、 動名詞の場合、improving the Web site (ウェブを改良すること) のように目的語を伴う。 訳：Bookmart.com はウェブサイトの改善を約束し、早ければ 11 月に更新されるだろう。"},{"id":68,"category":"品詞問題・実戦問題 基本編","qnum":36,"question":"The company will provide an ______ day of paid vacation when an annual leave day falls on a public holiday.","A":"add","B":"additional","C":"additionally","D":"additive","answer":"B","answer_word":"additional","explanation":"空所に入るのは、直後の名詞 day を修飾する形容詞なので、(B) additional（追加の）が正解。(A) add は動詞、(C) additionally は副詞、(D) additive は名詞「添加物」。訳：その会社は、年次休暇が祝日に当たった場合、追加の有給休暇を付与するだろう。"},{"id":69,"category":"品詞問題・実戦問題 基本編","qnum":37,"question":"Travelpal Luggage is the perfect choice for travelers whether they are traveling on business or for ______.","A":"pleased","B":
