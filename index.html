cal residents who had put up with potholes for decades.","A":"with","B":"in","C":"at","D":"through","answer":"A","answer_word":"with","explanation":"meet with X で「Xという反応を受ける」。with enthusiasm「熱烈に歓迎されて」が文意に合う。"},{"id":847,"category":"文法模試セット11","qnum":15,"question":"For preventive maintenance of your car, visit one of our ------- dealers at least once every six months.","A":"authority","B":"authorize","C":"authorized","D":"authorization","answer":"C","answer_word":"authorized","explanation":"後ろの名詞 dealers を修飾する形容詞が必要。authorized dealers「公認販売店」が正解。"},{"id":848,"category":"文法模試セット11","qnum":16,"question":"Before signing an agreement, ------- lease terms, especially in regard to the fees required.","A":"examines","B":"examine","C":"examined","D":"examining","answer":"B","answer_word":"examine","explanation":"主語 you が省略された命令文。動詞の原形 examine が入り、「契約前に賃貸条件を精査しなさい」となる。"},{"id":849,"category":"文法模試セット11","qnum":17,"question":"The Wellington Bus Service operates between City Airport and Central Train Station ------- two hours during the day, seven days a week.","A":"many","B":"every","C":"few","D":"both","answer":"B","answer_word":"every","explanation":"every two hours で「2時間おきに」。時間間隔を表す every が正解。"},{"id":850,"category":"文法模試セット11","qnum":18,"question":"Summerville town officials are currently developing a plan to reduce the ------- number of cars using Route 15.","A":"increase","B":"increases","C":"increasing","D":"increasingly","answer":"C","answer_word":"increasing","explanation":"後ろの名詞 number を修飾する形容詞的な現在分詞が必要。the increasing number of cars「増加する車の数」。"},{"id":851,"category":"文法模試セット11","qnum":19,"question":"To enter the building you must swipe your employee card through the reader firmly, but not so firmly ------- damage the machine.","A":"so that","B":"as to","C":"if only","D":"in case","answer":"B","answer_word":"as to","explanation":"so ... as to do で「〜するほど…」の構文。not so firmly as to damage the machine「機械を壊すほど強くはないように」。"},{"id":852,"category":"文法模試セット11","qnum":20,"question":"Fresh Mart ------- the help of its suppliers to cut down on packaging and its impact on the environment.","A":"was enlisted","B":"enlisting","C":"is enlisting","D":"has been enlisted","answer":"C","answer_word":"is enlisting","explanation":"主語 Fresh Mart に対応する述語動詞が必要。目的語 the help が続くため能動態の is enlisting「協力を求めている」が正解。"},{"id":853,"category":"文法模試セット11","qnum":21,"question":"Tenants are usually required to inform their landlords at least 30 days in ------- if they wish to move out.","A":"advance","B":"advanced","C":"advancement","D":"advancing","answer":"A","answer_word":"advance","explanation":"in advance で「前もって、事前に」という定型表現。"},{"id":854,"category":"文法模試セット11","qnum":22,"question":"Wave Instruments is now under ------- to produce watches that can display apps and notify wearers of incoming messages from social media.","A":"pressure","B":"burden","C":"weight","D":"rule","answer":"A","answer_word":"pressure","explanation":"under pressure で「圧力を受けて、迫られて」の意味。文意に合う不可算名詞 pressure が正解。"},{"id":855,"category":"文法模試セット11","qnum":23,"question":"Despite ------- requests from wholesalers and retailers, Orange Appliance has yet to develop a new refrigerator.","A":"numerous","B":"numerously","C":"numbering","D":"numbered","answer":"A","answer_word":"numerous","explanation":"後ろの名詞 requests を修飾する形容詞が必要。numerous requests「多数の要望」となる。"},{"id":856,"category":"文法模試セット11","qnum":24,"question":"Dr. Mitchell has shown compassion for ------- patients over the past thirty years.","A":"she","B":"her","C":"hers","D":"herself","answer":"B","answer_word":"her","explanation":"前置詞 for の目的語は後ろの patients まで続く名詞句。patients を修飾する所有格 her が正解。"},{"id":857,"category":"文法模試セット11","qnum":25,"question":"Hoffman Corporation’s annual meeting ------- shareholders will be held on Wednesday, December 22 at 1:00 P.M.","A":"into","B":"for","C":"from","D":"throughout","answer":"B","answer_word":"for","explanation":"annual meeting for shareholders で「株主のための年次総会」。対象を示す for が正解。"},{"id":858,"category":"文法模試セット11","qnum":26,"question":"When sending staff members overseas, it is essential that companies take ------- measures to ensure their employees’ health.","A":"prevent","B":"prevents","C":"preventive","D":"prevented","answer":"C","answer_word":"preventive","explanation":"後ろの名詞 measures を修飾する形容詞が必要。preventive measures「予防措置」が正解。"},{"id":859,"category":"文法模試セット11","qnum":27,"question":"The CEO will review the third-quarter sales reports ------- they are submitted to the auditing firm.","A":"upon","B":"before","C":"around","D":"from","answer":"B","answer_word":"before","explanation":"前後に節があるため接続詞が必要。「監査法人に提出される前に」の before が正解。"},{"id":860,"category":"文法模試セット11","qnum":28,"question":"The manufacturer ------- set its prices below cost in an effort to drive out a competitor.","A":"deliberate","B":"deliberated","C":"deliberately","D":"deliberation","answer":"C","answer_word":"deliberately","explanation":"動詞 set を修飾する副詞が必要。deliberately「故意に」が正解。"},{"id":861,"category":"文法模試セット11","qnum":29,"question":"Popular jazz singer Olivia Price will be holding two concerts in Tokyo in April, ------- an announcement on her Web site.","A":"if only","B":"provided that","C":"according to","D":"even though","answer":"C","answer_word":"according to","explanation":"後ろの名詞句 an announcement on her Web site をつなぐ前置詞句が必要。according to「〜によると」が正解。"},{"id":862,"category":"文法模試セット11","qnum":30,"question":"The company ------- that the national advertising campaign had not generated the expected results.","A":"was concluded","B":"have concluded","C":"concluding","D":"concluded","answer":"D","answer_word":"concluded","explanation":"主語 The company に対応する述語動詞が必要。that 節を目的語に取る能動態の concluded が正解。"},{"id":863,"category":"文法模試セット12","qnum":1,"question":"The meeting this afternoon will be held in the conference room on the fourth floor at 3 PM. -------.","A":"precise","B":"most precise","C":"more precisely","D":"precisely","answer":"D","answer_word":"precisely","explanation":"文がいったん完結しており、空所は前の at 3 PM を修飾する副詞が必要。at precisely 3 P.M.「ちょうど3時に」となるため、副詞 precisely が正解。"},{"id":864,"category":"文法模試セット12","qnum":2,"question":"Applicants for the position are expected to be ------- in English, although no certificate is required.","A":"proficient","B":"proficiently","C":"proficiency","D":"more proficiently","answer":"A","answer_word":"proficient","explanation":"be proficient in X で「Xに堪能である」。be 動詞の補語になる形容詞 proficient が正解。"},{"id":865,"category":"文法模試セット12","qnum":3,"question":"We ask that you ------- your mobile phone during the performance as a matter of courtesy to other audience members.","A":"silences","B":"silenced","C":"silence","D":"silencing","answer":"C","answer_word":"silence","explanation":"ask that S V の形で、依頼・要求を表す that 節では動詞の原形が使われる。you の後には原形 silence が入る。"},{"id":866,"category":"文法模試セット12","qnum":4,"question":"The language school boasts that over 80 percent of its students make significant ------- in both listening and speaking after three months of tuition.","A":"progressive","B":"progress","C":"progressively","D":"progressed","answer":"B","answer_word":"progress","explanation":"make progress で「進歩する」。形容詞 significant の後に来る名詞 progress が正解。"},{"id":867,"category":"文法模試セット12","qnum":5,"question":"Marketing department staff members are invited to tour the plant to see ------- the quality control procedures are implemented.","A":"during","B":"how","C":"about","D":"whom","answer":"B","answer_word":"how","explanation":"see の目的語となる名詞節が必要。直後に完全な文が続くため、「どのように」を表す how が正解。"},{"id":868,"category":"文法模試セット12","qnum":6,"question":"Brad Jessen presented an ------- to the City Council for heating and air conditioning at the new convention center.","A":"estimate","B":"estimated","C":"estimating","D":"estimates","answer":"A","answer_word":"estimate","explanation":"冠詞 an と前置詞 to の間には単数名詞が必要。present an estimate「見積もりを提出する」となるため estimate が正解。"},{"id":869,"category":"文法模試セット12","qnum":7,"question":"Through a translator, Ms. Ivanov spoke with ------- by phone from Moscow about her role in the new film.","A":"we","B":"our","C":"us","D":"ourselves","answer":"C","answer_word":"us","explanation":"前置詞 with の目的語になる目的格代名詞が必要。we は主格、our は所有格、ourselves は再帰代名詞なので、us が正解。"},{"id":870,"category":"文法模試セット12","qnum":8,"question":"Baliwood Hotel ------- conducts guest surveys to gather information that will help it find what areas of its services need improvement.","A":"regularize","B":"regularizing","C":"regularity","D":"regularly","answer":"D","answer_word":"regularly","explanation":"主語 Baliwood Hotel と動詞 conducts で文が成立しているため、動詞 conducts を修飾する副詞 regularly が正解。"},{"id":871,"category":"文法模試セット12","qnum":9,"question":"During the conference, a ------- meal will be served from 3:00 P.M. to 3:30 P.M. in the Tower Café located on the fifth floor.","A":"lightness","B":"lightly","C":"light","D":"lightest","answer":"C","answer_word":"light","explanation":"meal を修飾する形容詞が必要。a light meal「軽食」となるため light が正解。"},{"id":872,"category":"文法模試セット12","qnum":10,"question":"The company has expanded suddenly, ------- a move to larger premises with a dedicated parking lot.","A":"necessitate","B":"necessitating","C":"necessitated","D":"necessitates","answer":"B","answer_word":"necessitating","explanation":"前半の内容を受けて「〜を必要とする」という結果を表す分詞構文。目的語 a move が続くため現在分詞 necessitating が正解。"},{"id":873,"category":"文法模試セット12","qnum":11,"question":"Gilbert Public Schools’ technology department already has plans to replace the ------- computers this summer.","A":"outdate","B":"outdated","C":"outdates","D":"outdating","answer":"B","answer_word":"outdated","explanation":"冠詞 the と名詞 computers の間で名詞を修飾する形容詞が必要。outdated computers「旧式のコンピューター」となるため outdated が正解。"},{"id":874,"category":"文法模試セット12","qnum":12,"question":"While traditional manufacturing is still ideal for high-volume production of metallic parts, 3D printing offers the option to ------- produce low-volume mock-ups.","A":"speed","B":"speeded","C":"speedy","D":"speedily","answer":"D","answer_word":"speedily","explanation":"to produce の直前で動詞 produce を修飾する副詞が必要。speedily produce「すばやく製作する」となるため speedily が正解。"},{"id":875,"category":"文法模試セット12","qnum":13,"question":"Aya Hernandez was one of the top five finalists of the piano competition, ------- whom audience members will choose a winner.","A":"around","B":"during","C":"from","D":"above","answer":"C","answer_word":"from","explanation":"関係代名詞 whom の前に置く前置詞が必要。choose a winner from the finalists「決勝進出者の中から勝者を選ぶ」となるため from が正解。"},{"id":876,"category":"文法模試セット12","qnum":14,"question":"------- she has a previous engagement with her client, Louise Simon will not be in attendance at today’s meeting.","A":"Nevertheless","B":"Rather","C":"Because","D":"Whether","answer":"C","answer_word":"Because","explanation":"前後の節を理由でつなぐ接続詞が必要。「顧客との先約があるため、会議に出席しない」という文意なので Because が正解。"},{"id":877,"category":"文法模試セット12","qnum":15,"question":"Next year, Bernier Corporation’s major objective is to establish even ------- ties between its domestic and international divisions.","A":"strong","B":"stronger","C":"strongly","D":"strongest","answer":"B","answer_word":"stronger","explanation":"even は比較級を強める語。ties を修飾し「さらに強いつながり」とするため比較級 stronger が正解。"},{"id":878,"category":"文法模試セット12","qnum":16,"question":"Successful candidates should possess a university degree in marketing or another ------- field.","A":"rely","B":"relying","C":"relevant","D":"relevancy","answer":"C","answer_word":"relevant","explanation":"another と field の間で名詞 field を修飾する形容詞が必要。another relevant field「別の関連分野」となるため relevant が正解。"},{"id":879,"category":"文法模試セット12","qnum":17,"question":"Ms. Kim is considering relocating to Evergreen Town because ------- would be more convenient to her base of clients.","A":"it","B":"she","C":"which","D":"some","answer":"A","answer_word":"it","explanation":"because 節の主語が必要。文意上、前の relocating to Evergreen Town を指す it が正解。"},{"id":880,"category":"文法模試セット12","qnum":18,"question":"Every room of the hotel has an ------- view of Lake Tahoma and Millwood Mountain.","A":"expand","B":"expansive","C":"expansively","D":"expansion","answer":"B","answer_word":"expansive","explanation":"冠詞 an と名詞 view の間には名詞を修飾する形容詞が必要。an expansive view「広大な眺め」となるため expansive が正解。"},{"id":881,"category":"文法模試セット12","qnum":19,"question":"Experts are predicting that the market for mobile phones ------- by over 5 percent over the next five years.","A":"are growing","B":"will grow","C":"have grown","D":"had grown","answer":"B","answer_word":"will grow","explanation":"over the next five years が未来の期間を示すため、未来を表す will grow が正解。主語 the market は単数なので are growing は不可。"},{"id":882,"category":"文法模試セット12","qnum":20,"question":"The main lobby of the Grace Hotel is ------- decorated with ceramic tiles, crystal chandeliers, and a lighted water fountain.","A":"beauty","B":"beautiful","C":"beautifully","D":"beautified","answer":"C","answer_word":"beautifully","explanation":"is decorated with X の受動態で、動詞 decorated を修飾する副詞が必要。beautifully decorated「美しく飾られている」となる。"},{"id":883,"category":"文法模試セット12","qnum":21,"question":"Many of the suppliers have ------- to submit invoices for services received in December.","A":"yet","B":"already","C":"after","D":"until","answer":"A","answer_word":"yet","explanation":"have yet to do で「まだ〜していない」という重要表現。否定文でない形でも未完了を表すため yet が正解。"},{"id":884,"category":"文法模試セット12","qnum":22,"question":"The Voyage Savor jams are made ------- locally grown, organic ingredients from the Drome region.","A":"from","B":"below","C":"to","D":"into","answer":"A","answer_word":"from","explanation":"be made from X で「Xを原料として作られる」。原材料を表すため from が正解。"},{"id":885,"category":"文法模試セット12","qnum":23,"question":"The factory foreman conducts ------- inspections of the facility to ensure that all the machinery is working efficiently.","A":"frequent","B":"frequently","C":"frequency","D":"frequencies","answer":"A","answer_word":"frequent","explanation":"名詞 inspections を修飾する形容詞が必要。frequent inspections「頻繁な検査」となるため frequent が正解。"},{"id":886,"category":"文法模試セット12","qnum":24,"question":"After returning to Florence in 1985, Mr. Moretti produced a number of paintings, ------- of which are housed in Moretti Memorial Museum.","A":"other","B":"several","C":"that","D":"anything","answer":"B","answer_word":"several","explanation":"of which are housed ... に対応する複数扱いの主語が必要。several of which「そのうちのいくつかは」となるため several が正解。"},{"id":887,"category":"文法模試セット12","qnum":25,"question":"------- the annual company banquet, Mr. Garcia and his team volunteered to work in the cloakroom.","A":"When","B":"While","C":"Instead","D":"During","answer":"D","answer_word":"During","explanation":"後ろが名詞句 the annual company banquet なので前置詞が必要。during X「Xの間に」となるため During が正解。"},{"id":888,"category":"文法模試セット12","qnum":26,"question":"Our certified technicians provide a full range of services ------- vehicles such as oil changes, scheduled maintenance, and brake upgrades.","A":"by","B":"for","C":"from","D":"in","answer":"B","answer_word":"for","explanation":"provide X for Y「YにXを提供する」の形。a full range of services for vehicles で「車両向けの一連のサービス」となる。"},{"id":889,"category":"文法模試セット12","qnum":27,"question":"The Real Estate Show will offer an excellent opportunity for home owners to acquaint ------- with the latest trends in home furnishings.","A":"they","B":"their","C":"them","D":"themselves","answer":"D","answer_word":"themselves","explanation":"acquaint oneself with X「Xについてよく知る」の形。主語 home owners と同じ人物を指す再帰代名詞 themselves が正解。"},{"id":890,"category":"文法模試セット12","qnum":28,"question":"The renowned architect Stuart Silk ------- to design nine custom homes near Shanghai with no restrictions on style or budget.","A":"was commissioning","B":"be commissioning","C":"will have commissioned","D":"has been commissioned","answer":"D","answer_word":"has been commissioned","explanation":"目的語を取らない位置で、主語 Stuart Silk は「委託された」側。現在完了の受動態 has been commissioned が正解。"},{"id":891,"category":"文法模試セット12","qnum":29,"question":"Mr. Lyle was asked to contact the human resources department to arrange a follow-up ------- for the accounting position.","A":"interviewed","B":"interview","C":"interviewing","D":"interviews","answer":"B","answer_word":"interview","explanation":"冠詞 a と前置詞 for の間には単数名詞が必要。follow-up interview「再面接、二次面接」となるため interview が正解。"},{"id":892,"category":"文法模試セット12","qnum":30,"question":"The museum announced today that Alan Cooper has been ------- director and chief executive officer.","A":"returned","B":"appointed","C":"regarded","D":"promoted","answer":"B","answer_word":"appointed","explanation":"受動態で空所後に名詞が続くため、SVOC 型を取れる appoint の過去分詞 appointed が正解。be appointed director「理事に任命される」。"},{"id":893,"category":"文法模試セット13","qnum":1,"question":"Common Questions & Answers About Investment is a ------- written book that is easy to use.","A":"thought","B":"thoughtful","C":"thoughtfully","D":"thoughtfulness","answer":"C","answer_word":"thoughtfully","explanation":"空所を除いても SVC の文が成立しているので、過去分詞 written を修飾する副詞が必要。thoughtfully「よく考えて、思慮深く」を入れると「よく考えて書かれた本」となり文意が通る。"},{"id":894,"category":"文法模試セット13","qnum":2,"question":"Amenities at Palm Tree Hotel ------- modern convenience and old-world elegance.","A":"exemplify","B":"exemplifying","C":"exemplifies","D":"exemplification","answer":"A","answer_word":"exemplify","explanation":"主語 Amenities は複数形なので、それに対応する述語動詞が必要。三人称単数形 exemplifies ではなく、複数主語に対応する exemplify が正解。"},{"id":895,"category":"文法模試セット13","qnum":3,"question":"Tickets for the train tour of Fort Worth can be purchased ------- the station or online.","A":"with","B":"upon","C":"between","D":"inside","answer":"D","answer_word":"inside","explanation":"「駅構内もしくはオンラインで購入できる」という場所を示す前置詞が必要。inside the station「駅構内で」とすると文意が自然。"},{"id":896,"category":"文法模試セット13","qnum":4,"question":"Should you wish to terminate the lease, you need to give ------- two months’ notice before leaving the apartment.","A":"we","B":"our","C":"us","D":"ours","answer":"C","answer_word":"us","explanation":"give は give O1 O2「O1にO2を与える」の形を取れる。ここでは「当社に2カ月前の通知をする」となるため、目的格 us が正解。"},{"id":897,"category":"文法模試セット13","qnum":5,"question":"Laptop Stand Pro comes equipped with a flat base and rubber pads to keep your laptop computer ------- on your desk.","A":"stable","B":"stabilization","C":"stabilize","D":"stabilizer","answer":"A","answer_word":"stable","explanation":"keep O C「OをCの状態に保つ」の文型。補語の位置には形容詞 stable「安定した」が入り、keep your laptop computer stable となる。"},{"id":898,"category":"文法模試セット13","qnum":6,"question":"Ms. Brown has been teaching at Skyline University ------- the day it was built 25 years ago.","A":"as soon as","B":"then","C":"until","D":"ever since","answer":"D","answer_word":"ever since","explanation":"the day を it was built ... が修飾しており、空所後は名詞句。時の起点から現在までの継続を表す前置詞句 ever since「〜以来ずっと」が正解。"},{"id":899,"category":"文法模試セット13","qnum":7,"question":"The device conforms to the current safety regulations and is subjected to ------- testing before shipment.","A":"extend","B":"extensive","C":"extensively","D":"extension","answer":"B","answer_word":"extensive","explanation":"be subjected to の to は前置詞で、後ろの testing は名詞。testing を修飾する形容詞 extensive「詳細な、大規模な」が正解。"},{"id":900,"category":"文法模試セット13","qnum":8,"question":"The fund-raising event has always attracted corporate donations, and this year’s organizers have ------- managed to secure funds from local businesses.","A":"enough","B":"likewise","C":"quite","D":"much","answer":"B","answer_word":"likewise","explanation":"直後の動詞 managed を修飾し、「同様に資金を確保した」とする副詞 likewise が正解。enough や much はこの位置で managed を自然に修飾しない。"},{"id":901,"category":"文法模試セット13","qnum":9,"question":"For decades, wristwatches have been endorsed by ------- such as movie stars and professional athletes.","A":"celebration","B":"celebrate","C":"celebrating","D":"celebrities","answer":"D","answer_word":"celebrities","explanation":"by の目的語となり、such as 以下の movie stars and professional athletes と同種の語が必要。名詞 celebrity の複数形 celebrities「有名人」が正解。"},{"id":902,"category":"文法模試セット13","qnum":10,"question":"Ozaki Law Firm in downtown Kyoto has an opening for an administrative assistant ------- April 1.","A":"start","B":"started","C":"starting","D":"starts","answer":"C","answer_word":"starting","explanation":"starting April 1 は「4月1日から」の意味で、勤務開始日を補足する形。starting が前置詞化して日付を導くため正解。"},{"id":903,"category":"文法模試セット13","qnum":11,"question":"In a news release, the mayor announced plans to replace most street lights with ------- ones to improve visibility.","A":"brightly","B":"brighter","C":"brightest","D":"brightness","answer":"B","answer_word":"brighter","explanation":"空所後の ones (= lights) を修飾する形容詞が必要。比較級 brighter「より明るい」を入れると、「これまでより明るい照明」となり文意が通る。"},{"id":904,"category":"文法模試セット13","qnum":12,"question":"All staff members are required to wear the new uniforms that were provided ------- the meeting last week.","A":"with","B":"at","C":"on","D":"of","answer":"B","answer_word":"at","explanation":"the meeting は制服が提供された「場」を表す。地点・場を示す前置詞 at が入り、provided at the meeting「会議で提供された」となる。"},{"id":905,"category":"文法模試セット13","qnum":13,"question":"In addition to high salaries, the real estate agency offers outstanding opportunities for professional -------.","A":"developer","B":"develop","C":"developed","D":"development","answer":"D","answer_word":"development","explanation":"professional の修飾を受け、前置詞 for の目的語となる名詞が必要。不可算名詞 development「成長、能力開発」が正解。"},{"id":906,"category":"文法模試セット13","qnum":14,"question":"With the launch date only weeks away, the advertising director ------- has not decided on a name for the product line.","A":"very","B":"yet","C":"recent","D":"still","answer":"D","answer_word":"still","explanation":"not と共に用いて「まだ〜していない」を表す副詞 still が正解。has still not decided の語順で「まだ決めていない」となる。"},{"id":907,"category":"文法模試セット13","qnum":15,"question":"Before leaving Howell University last year, Mr. Kaufman had ------- to the position of director of physics.","A":"advanced","B":"identified","C":"recommended","D":"promoted","answer":"A","answer_word":"advanced","explanation":"「物理学部長に昇進していた」という文意。advance to the position of ... で「〜の地位へ進む、昇進する」となり、自動詞 advanced が正解。"},{"id":908,"category":"文法模試セット13","qnum":16,"question":"------- promising, the research findings are still tentative and need further investigation.","A":"Despite","B":"Because","C":"Though","D":"Therefore","answer":"C","answer_word":"Though","explanation":"Though they are promising の they are が省略された形。接続詞 Though を用いると「有望ではあるが、まだ仮の結果である」と文意が通る。"},{"id":909,"category":"文法模試セット13","qnum":17,"question":"While standard orders usually ship within two business days, express delivery is available for an additional -------.","A":"charge","B":"pay","C":"money","D":"admission","answer":"A","answer_word":"charge","explanation":"an additional の後ろには可算名詞が必要。「追加料金で利用できる」という意味になる charge「料金」が正解。"},{"id":910,"category":"文法模試セット13","qnum":18,"question":"The interviewers created a set of technical questions to help ------- between candidates for the position.","A":"different","B":"differently","C":"difference","D":"differentiate","answer":"D","answer_word":"differentiate","explanation":"help (to) do の形で、to help の後ろには動詞の原形が必要。differentiate between X で「Xを区別する」となり文意が通る。"},{"id":911,"category":"文法模試セット13","qnum":19,"question":"The one-week summer program is for university students who aspire to become leaders ------- their peers.","A":"during","B":"under","C":"among","D":"from","answer":"C","answer_word":"among","explanation":"leaders と peers をつなぎ、「同輩の中のリーダー」とする前置詞が必要。among「〜の中で」が正解。"},{"id":912,"category":"文法模試セット13","qnum":20,"question":"Ms. Valois has applied for a supervisor position that will allow her to demonstrate her management -------.","A":"expertise","B":"expertly","C":"expertized","D":"expert","answer":"A","answer_word":"expertise","explanation":"her management の後ろには名詞が必要。management expertise「経営・管理の専門知識」という複合名詞になる expertise が正解。"},{"id":913,"category":"文法模試セット13","qnum":21,"question":"The new order-tracking system will highlight outstanding orders that need to be -------.","A":"expedite","B":"expediting","C":"expedited","D":"expedites","answer":"C","answer_word":"expedited","explanation":"orders と expedite「急ぎで送る」の間には受動関係がある。need to be の後ろには過去分詞 expedited が入り、「急いで処理される必要がある」となる。"},{"id":914,"category":"文法模試セット13","qnum":22,"question":"------- starting their own business, Mr. Amano and Mr. Akazaki had been classmates at Kamakura Institute of Technology.","A":"By means of","B":"In order to","C":"Former","D":"Prior to","answer":"D","answer_word":"Prior to","explanation":"starting their own business は動名詞句なので、前置詞句としてつなぐ表現が必要。Prior to「〜の前に」が文意に合う。"},{"id":915,"category":"文法模試セット13","qnum":23,"question":"Over the past 20 years, Vertelli Apparel has developed an ------- reputation as a leader in the fashion industry.","A":"envy","B":"envying","C":"enviable","D":"enviably","answer":"C","answer_word":"enviable","explanation":"冠詞 an と名詞 reputation の間に入り名詞を修飾する形容詞が必要。enviable reputation「うらやましいほどの評判」が正解。"},{"id":916,"category":"文法模試セット13","qnum":24,"question":"Please note that the conference venue may change ------- the registered attendees number more than 100.","A":"despite","B":"if","C":"due to","D":"consequently","answer":"B","answer_word":"if","explanation":"空所前後がそれぞれ節になっているため、2つの節をつなぐ接続詞が必要。「参加者数が100人を超えた場合」の意味になる if が正解。"},{"id":917,"category":"文法模試セット13","qnum":25,"question":"Staff members are advised that any technology developed while in the ------- of Grandocom belongs exclusively to the company.","A":"employ","B":"employed","C":"employing","D":"employer","answer":"A","answer_word":"employ","explanation":"in the employ of X で「Xに雇われて、Xに勤務して」という定型表現。名詞として機能する employ が正解。"},{"id":918,"category":"文法模試セット13","qnum":26,"question":"The Sunnyside Inn offers spacious rooms ------- afford beautiful views of the Still River Valley throughout the seasons.","A":"and","B":"that","C":"then","D":"when","answer":"B","answer_word":"that","explanation":"先行詞 spacious rooms を受け、動詞 afford 以下の説明を補足する主格の関係代名詞が必要。that afford ... とすると正しい文になる。"},{"id":919,"category":"文法模試セット13","qnum":27,"question":"Ken Gupta’s latest novel, Listen to the Song of the Wind, certainly lends ------- to being adapted for film.","A":"them","B":"it","C":"themselves","D":"itself","answer":"D","answer_word":"itself","explanation":"lend oneself to X「Xに適している、ぴったりだ」という定型表現。主語 novel を受ける再帰代名詞 itself が正解。"},{"id":920,"category":"文法模試セット13","qnum":28,"question":"Situated near the city center, Dolphin Hotel is ------- enough to reach on foot from Central Station.","A":"close","B":"closely","C":"closed","D":"closure","answer":"A","answer_word":"close","explanation":"be 動詞の補語になる形容詞が必要。close enough to do「〜するのに十分近い」となり、Dolphin Hotel is close enough to reach ... が正解。"},{"id":921,"category":"文法模試セット13","qnum":29,"question":"Factory workers are required to wear protective clothing ------- that fire, electrical, or chemical hazards exist.","A":"when","B":"because of","C":"anywhere","D":"even if","answer":"C","answer_word":"anywhere","explanation":"空所後には that 節が続き、場所を表す先行詞として機能する語が必要。anywhere that ... で「〜が存在する場所ならどこでも」となる。"},{"id":922,"category":"文法模試セット13","qnum":30,"question":"A few board members expressed concerns about expansion into China, but ------- are looking forward to investing in the area.","A":"most","B":"much","C":"another","D":"other","answer":"A","answer_word":"most","explanation":"but 以降の節の主語が必要。are looking と複数扱いになるため、most「ほとんどの人・役員」が正解。much は不可算名詞用、another は単数扱い。"}];
const PROG_KEY = 'toeic_progress_v2';
const STAR_KEY = 'toeic_stars_v2';

const GROUPS = [
  {id:'hinshi',name:'品詞問題',      icon:'&#128221;',color:'#2563eb',
   cats:['品詞問題・トレーニング','品詞問題・実戦問題 基本編','品詞問題・実戦問題 応用編','品詞問題・実戦問題 発展編']},
  {id:'doshi', name:'動詞問題',      icon:'&#127939;',color:'#16a34a',
   cats:['動詞問題・トレーニング','動詞問題・実戦問題 基本編']},
  {id:'zen',   name:'前置詞・接続詞', icon:'&#128279;',color:'#d97706',
   cats:['前置詞or接続詞問題・トレーニング','前置詞or接続詞問題・実戦問題','前置詞問題・実戦問題']},
  {id:'daim',  name:'代名詞問題',    icon:'&#128100;',color:'#7c3aed',
   cats:['代名詞問題・トレーニング','代名詞問題・実戦問題']},
  {id:'kankei',name:'関係詞問題',    icon:'&#128260;',color:'#db2777',
   cats:['関係詞問題・トレーニング','関係詞問題・実戦問題']},
  {id:'goho',  name:'語法・比較問題', icon:'&#128202;',color:'#0891b2',
   cats:['第7章 ペア表現・語法・数・比較問題（OCR素案）']},
  {id:'moshi', name:'文法模試',      icon:'&#128203;',color:'#dc2626',
   cats:['文法模試 セット1（OCR素案）','文法模試 セット2（OCR素案）','文法模試 セット3（OCR素案）',
         '文法模試 セット4（OCR素案）','文法模試 セット5（OCR素案）','文法模試 セット6（OCR素案）',
         '文法模試 セット7（OCR素案）','文法模試 セット8（OCR素案）','文法模試 続き（OCR素案）',
         '文法模試セット10','文法模試セット11','文法模試セット12','文法模試セット13']},
];
const catToGroup = {};
GROUPS.forEach(g => g.cats.forEach(c => catToGroup[c] = g));

// ── Storage ──────────────────────────────────────────────
let progress = {}, stars = {};
function load() {
  try { progress = JSON.parse(localStorage.getItem(PROG_KEY) || '{}'); } catch(e) { progress = {}; }
  try { stars    = JSON.parse(localStorage.getItem(STAR_KEY) || '{}'); } catch(e) { stars = {}; }
}
function saveProg()  { localStorage.setItem(PROG_KEY, JSON.stringify(progress)); }
function saveStars() { localStorage.setItem(STAR_KEY, JSON.stringify(stars)); }

// ── Helpers ──────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtQ = t => esc(t)
  .replace(/---+/g,'<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>')
  .replace(/______+/g,'<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
const shuffle = a => a.slice().sort(() => Math.random() - .5);
const groupQs = g => QUESTIONS.filter(q => g.cats.includes(q.category));
function statsFor(qs) {
  const cor = qs.filter(q => progress[q.id] === 'correct').length;
  const wrg = qs.filter(q => progress[q.id] === 'wrong').length;
  const ans = cor + wrg;
  return { total: qs.length, ans, cor, wrg, rate: ans > 0 ? Math.round(cor/ans*100) : 0, pct: Math.round(cor/qs.length*100) };
}

// Smart queue: unanswered → wrong → correct
function buildSmartQueue(pool) {
  return [
    ...shuffle(pool.filter(q => !progress[q.id])),
    ...shuffle(pool.filter(q => progress[q.id] === 'wrong')),
    ...shuffle(pool.filter(q => progress[q.id] === 'correct')),
  ];
}

// Format explanation: bold key parts
function formatExp(text, q) {
  let s = esc(text);
  const aw = esc(q.answer_word);
  if (aw) s = s.replace(aw, '<span class="ab">' + aw + '</span>');
  s = s.replace(/\(([ABCD])\)/g, '(<b>$1</b>)');
  s = s.replace(/「([^」]{1,30})」/g, '「<b>$1</b>」');
  s = s.replace(/【([^】]{1,30})】/g, '【<b>$1</b>】');
  return s;
}

// Extract hint: first sentence of explanation
function getHint(exp) {
  if (!exp) return '';
  const dot = exp.indexOf('。');
  return dot > 0 && dot < 130 ? exp.substring(0, dot + 1) : exp.substring(0, 95) + '…';
}

// ── Screen switching ─────────────────────────────────────
let curScreen = 'home';
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id + '-screen').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
  curScreen = id;
  document.getElementById('hdr-back').style.display = 'none';
  const titles = {home:'TOEIC 品詞問題', list:'問題一覧', stats:'成績', quiz:'問題'};
  document.getElementById('hdr-title').textContent = titles[id] || '';
  if (id === 'home')  renderHome();
  if (id === 'list')  renderList();
  if (id === 'stats') renderStats();
  if (id === 'quiz')  document.getElementById('hdr-back').style.display = '';
}
function goBack() {
  if (curScreen === 'quiz' || curScreen === 'cat-detail') switchScreen('home');
}

// ── Home ─────────────────────────────────────────────────
function renderHome() {
  const ans = Object.keys(progress).length;
  const cor = Object.values(progress).filter(v=>v==='correct').length;
  const stc = Object.keys(stars).filter(k=>stars[k]).length;
  const wrg = Object.values(progress).filter(v=>v==='wrong').length;
  document.getElementById('hs-ans').textContent  = ans;
  document.getElementById('hs-rate').textContent = ans > 0 ? Math.round(cor/ans*100)+'%' : '-%';
  document.getElementById('hs-star').textContent = stc;
  document.getElementById('qb-wrong').textContent = wrg + '問';
  document.getElementById('qb-star').textContent  = stc + '問';
  const grid = document.getElementById('group-grid');
  grid.innerHTML = '';
  GROUPS.forEach(g => {
    const st = statsFor(groupQs(g));
    const el = document.createElement('div');
    el.className = 'gc';
    el.style.borderTop = '4px solid ' + g.color;
    el.innerHTML =
      '<div class="gc-icon">' + g.icon + '</div>' +
      '<div class="gc-name">' + g.name + '</div>' +
      '<div class="gc-count">' + st.total + '問・正解 ' + st.cor + '問</div>' +
      '<div class="gc-bar"><div class="gc-fill" style="width:'+st.pct+'%;background:'+g.color+'"></div></div>' +
      '<div class="gc-rate">' + st.rate + '% 正解率</div>';
    el.onclick = () => openDetail(g);
    grid.appendChild(el);
  });
}

// ── Category Detail ──────────────────────────────────────
let curGroup = null;
function openDetail(g) {
  curGroup = g;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('cat-detail').classList.add('active');
  document.getElementById('hdr-title').textContent = g.name;
  document.getElementById('hdr-back').style.display = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  curScreen = 'cat-detail';
  const st = statsFor(groupQs(g));
  document.getElementById('detail-name').textContent = g.name;
  document.getElementById('detail-stats').textContent =
    st.total + '問 ・ 回答済 ' + st.ans + '問 ・ 正解率 ' + st.rate + '%';
  const list = document.getElementById('sub-list');
  list.innerHTML = '';
  g.cats.forEach(cat => {
    const qs = QUESTIONS.filter(q => q.category === cat);
    if (!qs.length) return;
    const s = statsFor(qs);
    const bgC = s.ans===0?'#f1f5f9':s.rate>=80?'#dcfce7':s.rate>=60?'#fef9c3':'#fee2e2';
    const txC = s.ans===0?'#6b7280':s.rate>=80?'#166534':s.rate>=60?'#854d0e':'#991b1b';
    const el = document.createElement('div');
    el.className = 'sub-item';
    el.innerHTML =
      '<div class="si-info"><div class="si-name">'+esc(cat)+'</div>' +
      '<div class="si-count">'+s.total+'問・正解 '+s.cor+'/'+s.ans+'</div></div>' +
      '<span class="si-badge" style="background:'+bgC+';color:'+txC+'">'+(s.ans===0?'未学習':s.rate+'%')+'</span>' +
      '<span style="color:#d1d5db">&#8250;</span>';
    el.onclick = () => launchQuiz(buildSmartQueue(qs));
    list.appendChild(el);
  });
}
function startFromDetail() {
  if (!curGroup) return;
  launchQuiz(buildSmartQueue(groupQs(curGroup)));
}

// ── Quiz ─────────────────────────────────────────────────
let queue = [], qIdx = 0, answered = false;
let sesCor = 0, sesTot = 0, lastPool = [];
let unaBound = 0, wrgBound = 0;

function quickStart(mode) {
  let pool;
  if (mode === 'smart')    pool = QUESTIONS;
  else if (mode === 'wrong')   pool = QUESTIONS.filter(q => progress[q.id] === 'wrong');
  else if (mode === 'starred') pool = QUESTIONS.filter(q => stars[q.id]);
  if (!pool || !pool.length) { alert('該当する問題がありません'); return; }
  launchQuiz(mode === 'smart' ? buildSmartQueue(pool) : shuffle(pool));
}

function launchQuiz(q) {
  queue = q; qIdx = 0; sesCor = 0; sesTot = 0; lastPool = q;
  unaBound = queue.filter(x => !progress[x.id]).length;
  wrgBound = unaBound + queue.filter(x => progress[x.id] === 'wrong').length;
  document.getElementById('finish-screen').style.display = 'none';
  switchScreen('quiz');
  showQ();
}

function showQ() {
  if (qIdx >= queue.length) { showFinish(); return; }
  const q = queue[qIdx];
  answered = false;

  // Reset UI
  const expWrap = document.getElementById('exp-wrap');
  expWrap.classList.remove('show');
  expWrap.innerHTML = '';
  document.getElementById('btn-next-wrap').style.display = 'none';
  document.getElementById('btn-skip-wrap').style.display = 'block';
  document.getElementById('finish-screen').style.display = 'none';

  // Reset hint
  document.getElementById('hint-wrap').style.display = '';
  document.getElementById('hint-btn').style.display = '';
  const hBox = document.getElementById('hint-box');
  hBox.style.display = 'none';
  hBox.textContent = '';

  // Progress
  const pct = Math.round(qIdx / queue.length * 100);
  document.getElementById('qz-fill').style.width = pct + '%';
  document.getElementById('qz-txt').textContent = (qIdx+1) + ' / ' + queue.length;
  const badge = document.getElementById('qz-badge');
  if (qIdx < unaBound)       { badge.textContent='未学習'; badge.style.cssText='font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700;background:var(--blue-l);color:var(--blue)'; }
  else if (qIdx < wrgBound)  { badge.textContent='復習';   badge.style.cssText='font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700;background:var(--red-l);color:var(--red)'; }
  else                       { badge.textContent='確認';   badge.style.cssText='font-size:.68rem;padding:2px 8px;border-radius:99px;font-weight:700;background:var(--green-l);color:var(--green)'; }

  const g = catToGroup[q.category];
  document.getElementById('q-tag').textContent  = g ? g.name : q.category;
  document.getElementById('q-text').innerHTML   = fmtQ(q.question);
  renderStarBtn(q.id);

  const choices = document.getElementById('choices');
  choices.innerHTML = '';
  ['A','B','C','D'].forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.innerHTML = '<span class="c-key">'+key+'</span><span class="c-val">'+esc(q[key])+'</span>';
    btn.onclick = () => checkAnswer(q, key);
    choices.appendChild(btn);
  });

  document.getElementById('quiz-screen').scrollTo({top:0, behavior:'smooth'});
}

function showHint() {
  const q = queue[qIdx];
  if (!q) return;
  document.getElementById('hint-btn').style.display = 'none';
  const box = document.getElementById('hint-box');
  box.textContent = getHint(q.explanation);
  box.style.display = 'block';
}

function checkAnswer(q, sel) {
  if (answered) return;
  answered = true;
  const ok = sel === q.answer;
  progress[q.id] = ok ? 'correct' : 'wrong';
  saveProg();
  sesCor += ok ? 1 : 0;
  sesTot++;

  document.querySelectorAll('.c-btn').forEach((b, i) => {
    const key = ['A','B','C','D'][i];
    b.disabled = true;
    if (key === q.answer) b.classList.add(ok && key === sel ? 'ok' : 'show-ok');
    if (key === sel && !ok) b.classList.add('ng');
  });

  // Hide hint, show explanation
  document.getElementById('hint-wrap').style.display = 'none';

  const expWrap = document.getElementById('exp-wrap');
  expWrap.innerHTML =
    '<div class="exp-result '+(ok?'ok':'ng')+'">'+(ok?'&#9989; 正解！':'&#10060; 不正解')+'</div>' +
    '<div class="exp-ans"><span class="al">正答:</span><span class="aw">('+q.answer+') '+esc(q.answer_word)+'</span>' +
    '<span class="ao">(A)'+esc(q.A)+'&nbsp;(B)'+esc(q.B)+'&nbsp;(C)'+esc(q.C)+'&nbsp;(D)'+esc(q.D)+'</span></div>' +
    '<div class="exp-body"><span class="exp-lbl">&#128218; 解説</span>'+formatExp(q.explanation, q)+'</div>';

  requestAnimationFrame(() => expWrap.classList.add('show'));

  document.getElementById('btn-next-wrap').style.display = 'block';
  document.getElementById('btn-skip-wrap').style.display = 'none';

  setTimeout(() => expWrap.scrollIntoView({behavior:'smooth', block:'nearest'}), 150);
  renderHome();
}

function nextQ() { qIdx++; showQ(); }
function skipQ() { queue.splice(qIdx, 1); showQ(); }

// ── Star ─────────────────────────────────────────────────
function toggleStar() {
  if (qIdx >= queue.length) return;
  const id = queue[qIdx].id;
  stars[id] = !stars[id];
  if (!stars[id]) delete stars[id];
  saveStars();
  renderStarBtn(id);
}
function renderStarBtn(id) {
  const btn = document.getElementById('q-star');
  btn.innerHTML = stars[id] ? '&#9733;' : '&#9734;';
  btn.className = 'q-star' + (stars[id] ? ' on' : '');
}
function toggleListStar(id, el) {
  stars[id] = !stars[id];
  if (!stars[id]) delete stars[id];
  saveStars();
  el.innerHTML = stars[id] ? '&#9733;' : '&#9734;';
  el.style.color = stars[id] ? '#d97706' : '#d1d5db';
}

// ── Finish ───────────────────────────────────────────────
function showFinish() {
  const fin = document.getElementById('finish-screen');
  fin.style.display = '';
  const rate = sesTot > 0 ? Math.round(sesCor/sesTot*100) : 0;
  document.getElementById('fin-e').textContent  = rate>=80?'🎉':rate>=60?'😊':'😟';
  document.getElementById('fin-sc').textContent = sesCor + ' / ' + sesTot;
  document.getElementById('fin-rt').textContent = rate + '%';
  const ta = Object.keys(progress).length;
  const tc = Object.values(progress).filter(v=>v==='correct').length;
  document.getElementById('fin-sb').textContent =
    '累計 '+ta+'問回答 ・ 正解率 '+(ta>0?Math.round(tc/ta*100):0)+'%';
  document.getElementById('btn-next-wrap').style.display = 'none';
  document.getElementById('btn-skip-wrap').style.display = 'none';
  fin.scrollTo(0, 0);
}
function restartSet() {
  document.getElementById('finish-screen').style.display = 'none';
  launchQuiz(buildSmartQueue(lastPool));
}

// ── List ─────────────────────────────────────────────────
let listChip = 'all';
function setChip(el, f) {
  listChip = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  renderList();
}
function renderList() {
  const search = (document.getElementById('list-search').value||'').toLowerCase();
  let qs = QUESTIONS;
  if (listChip==='wrong')          qs = qs.filter(q=>progress[q.id]==='wrong');
  else if (listChip==='starred')   qs = qs.filter(q=>stars[q.id]);
  else if (listChip==='unanswered')qs = qs.filter(q=>!progress[q.id]);
  else if (listChip==='correct')   qs = qs.filter(q=>progress[q.id]==='correct');
  if (search) qs = qs.filter(q=>
    q.question.toLowerCase().includes(search)||q.answer_word.toLowerCase().includes(search)||
    (q.A+q.B+q.C+q.D).toLowerCase().includes(search));
  document.getElementById('list-cnt').textContent = qs.length+'件'+(qs.length>200?' (先頭200件)':'');
  const wrap = document.getElementById('list-items');
  wrap.innerHTML = '';
  qs.slice(0,200).forEach(q => {
    const s = progress[q.id];
    const badge = s==='correct'?'<span class="lb lb-ok">&#10003; 正解</span>':
                  s==='wrong'  ?'<span class="lb lb-ng">&#10007; 不正解</span>':
                                '<span class="lb lb-no">未回答</span>';
    const g = catToGroup[q.category];
    const el = document.createElement('div');
    el.className = 'li';
    el.innerHTML =
      '<button class="li-star" onclick="toggleListStar('+q.id+',this)" style="color:'+(stars[q.id]?'#d97706':'#d1d5db')+'">'+(stars[q.id]?'&#9733;':'&#9734;')+'</button>'+
      '<div class="li-body">'+
        '<div class="li-meta"><span class="li-num">#'+q.id+'</span><span class="li-cat">'+(g?g.name:esc(q.category))+'</span>'+badge+'</div>'+
        '<div class="li-q">'+esc(q.question.substring(0,70))+'&#8230;</div>'+
        '<div class="li-ans">正答: ('+q.answer+') '+esc(q.answer_word)+'</div>'+
      '</div>';
    wrap.appendChild(el);
  });
}

// ── Stats ────────────────────────────────────────────────
function renderStats() {
  const tot = QUESTIONS.length;
  const ans = Object.keys(progress).length;
  const cor = Object.values(progress).filter(v=>v==='correct').length;
  const wrg = Object.values(progress).filter(v=>v==='wrong').length;
  const stc = Object.keys(stars).filter(k=>stars[k]).length;
  const sc = (n,l,c) => '<div class="s-card"><div class="sc-num" style="color:'+c+'">'+n+'</div><div class="sc-lbl">'+l+'</div></div>';
  document.getElementById('s-cards').innerHTML =
    sc(tot,'総問題数','#2563eb')+sc(ans,'回答済み','#2563eb')+
    sc(cor,'正解','#16a34a')+sc(wrg,'不正解','#dc2626')+
    sc((ans>0?Math.round(cor/ans*100):0)+'%','正解率','#2563eb')+
    sc(stc,'★チェック','#d97706')+sc(tot-ans,'未回答','#6b7280');
  const list = document.getElementById('cs-list');
  list.innerHTML = '';
  GROUPS.forEach(g => {
    const st = statsFor(groupQs(g));
    const el = document.createElement('div');
    el.className = 'cs-item';
    el.innerHTML =
      '<div class="cs-hdr"><span class="cs-name">'+g.icon+' '+g.name+'</span><span class="cs-nums">'+st.cor+'/'+st.total+'問 ('+st.rate+'%)</span></div>'+
      '<div class="cs-track"><div class="cs-fill" style="width:'+st.pct+'%;background:'+g.color+'"></div></div>';
    list.appendChild(el);
  });
}

function resetAll() {
  if (confirm('すべての進捗と★チェックをリセットしますか？')) {
    progress={}; stars={};
    saveProg(); saveStars();
    renderStats(); renderHome();
    alert('リセットしました');
  }
}

load();
renderHome();
</script>
