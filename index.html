:"Visitors who do not have access to the Internet from home can ask that documents ______ for them at the circulation desk.","A":"print","B":"printed","C":"be printed","D":"printing","answer":"C","answer_word":"be printed","explanation":"空所前の be 動詞 been と結び付くのは、過去分詞の (C) か、現在分詞の (D). recommend は 「こを薦める」 という意味の他動詞。空所後に名詞がないので、目的語が主語の位置に出 た受動熊と考え、人過去分詞の (C) recommended を選ぶ。《動詞問題) はこうした文法的な 視点を持てば正解率が上がる。 訳：Turner 病院は、職員のプロとしての仕事で名声を確立し、広く薦められている。 reputation: @うわさ、評判 「] conduct : 人@行い、ふるまい"},{"id":420,"category":"動詞問題・実戦問題 基本編","qnum":79,"question":"Many businesses use online documents, which can be ______ from anywhere by employees, who are given usernames and passwords.","A":"access","B":"accessed","C":"accessibly","D":"accessing","answer":"A","answer_word":"access","explanation":"動詞に続く that 節中では述語動詞が原形になる (仮定法現在 。 また、that 節中の主語 documents (書類) は 「印刷される」側なので、受動態が適切。よって、 (©) be printed が正解。documents (should) be printed と考えるとわかりやすい。 訳：自宅でインターネットにアクセスできない利用者は、貸出・返却受付で書類の印刷を依頼できる。 circulation : @ (図書館の) 貸し出し 空所前の関係代名詞 which の先行詞 online documents は、従業員によって 「アクセスさ れる」側なので、受動態を作る過去分詞 (B) accessed が正解。access は「ーにアクセスする」 という意味の他動詞で、現在分詞の (D) は後ろに目的語が必要。(A) を名詞と考え、補語と して空所に補うと意味が通らない。 訳：多くの企業は、ユーザーネームとパスワードを与えられた社員ならどこからでもアクセスできるオン ラインドキュメントを使っている。"},{"id":421,"category":"動詞問題・実戦問題 基本編","qnum":80,"question":"The manager makes a point of testing all food ______ at the restaurant to ensure quality.","A":"serve","B":"serves","C":"serving","D":"served","answer":"A","answer_word":"serve","explanation":"空所前が SVO の完全文で、空所以降は all food に対する修飾語。食べ物はレストランで 「出される」側なので、過去分調 (D) served が正解。all food (that is) served と考えられる。 make a point of doing は「必ずてするよう心がける」の意味。 弁移 マネージャーは品質を確保するため、レストランで出される食べ物はすべて味見するよう心がけて いる。"},{"id":422,"category":"動詞問題・実戦問題 基本編","qnum":81,"question":"Ms. Zhao should ______ that she was required to speak at a training seminar, but only found out on the day.","A":"have informed","B":"being informed","C":"have been informed","D":"was informing","answer":"C","answer_word":"have been informed","explanation":"動詞 should の後ろには原形動詞が続くので、(A)(C) が残る。動詞 inform は (inform + 人+that [S] (V)) の形を取る他動詞。空所直後に that 節が続いているので、目的語の (A) が主語の位置に出た受動態と考え、(C) have been informed を選ぶ。(A) は目的語の 〈人〉 が必要。 訳：Zhao さんは、研修セミナーで話す必要があることを知らされるべきだったが、当日知ることになっ てしまった。"},{"id":423,"category":"動詞問題・実戦問題 基本編","qnum":82,"question":"Steven Holloway’s rendition of Starry Night at the open air concert was stellar, ______ the event organizers and audience members alike.","A":"delighting","B":"delight","C":"delighted","D":"delights","answer":"A","answer_word":"delighting","explanation":"82. 第 文頭からカンマまでが完全文。カンマ以降がカタマリ (副詞句) の分詞構文。空所後に目的 2 語の名詞があるので、能動の意味を表す現在分詞の (A) delighting が正解。delight ath ] Ht 動詞で「…を喜ばせる」 の意味。過去分詞の (C) は目的語を伴わず、 演奏」 は 「喜ばされる」 側ではないので文意も通らない。 訳：野外コンサートでの Steven Holloway による Starry Night の演奏はすばらしく、イベント主催者と BR訳：FIC補足：rendition : 人@演奏、上演 [-] stellar : @Mk< ASICHMSLW"},{"id":424,"category":"動詞問題・実戦問題 基本編","qnum":83,"question":"C83. Employees should use the elevators at the rear entrance while the ones in the lobby ______.","A":"fixes","B":"are fixing","C":"have fixed","D":"are being fixed","answer":"D","answer_word":"are being fixed","explanation":"主語 the ones はthe elevators を指す代名詞で、空所には、そ れに対応する述語動詞が必要。エレベーターは修理される」 側なので、現在進行形の受動 態(D) are being fixed が正解。能動態の (A(B)(C) では文意が通らず、fix は他動詞なので 目的語が必要。 訳：光 ロビーのエレベーターが修理されている間、従業員は衰ロのエレベーターを使ってください。"},{"id":425,"category":"動詞問題・実戦問題 基本編","qnum":84,"question":"An organizing committee was assembled to arrange a farewell party for Bruce Marshal, who is ______ in May.","A":"retired","B":"retiree","C":"retirement","D":"to retire","answer":"A","answer_word":"retired","explanation":"直前の be 動詞 is CMUDE, '~FSFEE) という意味を表すのが、不定詞の (D) to retire. retire は 「退職する」 の意味では自動詞なので、(A) を空所に入れた is retired DE うに受動態にならない。(B) 「退職者」 は可算名詞で冠詞が必要。名詞の (C) 「退職」 では意味 が通じない。 訳：5 月に引退する Bruce Marshal の送別パーティーを手配するため、準備委員が集められた。"},{"id":426,"category":"動詞問題・実戦問題 基本編","qnum":85,"question":"The event organizer announced that those who had bought tickets for the canceled performance would have their money","A":"refunded","B":"refund","C":"refunding","D":"to refund","answer":"A","answer_word":"refunded","explanation":"動詞「-こを払い戻す」という意味。直前の their money との間に「払い戻される」 という受動の関係があるので、過去分詞の (A) refunded AEM. have X done の形で 「X をしてもらう」の意味を表す。能動の関係の場合 have X do [doing] の形になる。 訳：イベント主催者は、キャンセルされた公演のチケットを購入した人には代金を払い戻しすると発表 (bikes ~ 意味から派生して、「(パフォーマンスや業績、作品等が) BC ASICS らしい! の意味を持つようになった。"},{"id":427,"category":"動詞問題・実戦問題 基本編","qnum":86,"question":"Before ______ to the factory, each component is carefully checked for imperfections by quality control staff hired by the supplier.","A":"deliver","B":"being delivered","C":"delivered","D":"having delivered","answer":"A","answer_word":"deliver","explanation":"前置詞 Before の後ろには目的語となる名詞が必要。名詞として機能する動名詞の (B)(D) が 残る。 EHO component (部品) は 「配送される」 側なので、受動態の (B) being delivered が正解。before や after は接続詞の場合、when や while と異なり、過去分詞を直後に伴 う用法がないので (C) は不可。 訳：工場へ配送される前に、それぞれの部品は、供給業者に雇われた品質管理スタッフにより欠陥がな いかを注意深く調べられる。 imperfection : @欠陥、欠点 第"},{"id":428,"category":"動詞問題・実戦問題 基本編","qnum":87,"question":"In celebration of Wonder Words Festival, the library ______ a traveling exhibit of miniature books at the beginning of next month.","A":"hosted","B":"is hosting","C":"will be hosted","D":"had been hosting","answer":"B","answer_word":"is hosting","explanation":"7 2 文未の at the beginning of next month (来月初旬) という未来を表す表現に着目。(B)(C) が侯補となる。空所後に目的語となる名詞 a t veling exhibit があるので能動態が適切。 よって、(B) is hosting が正解。 (bc 動詞 + 現在分詞) の形で確定的な未来-予定を表す用法。 (C) は受動態で目的語を伴わない。 補足： 現在進行形で確定的な未来・予定を表す用法には、「すでに今、 具体的な準備が進んで いる」 というニュアンスを含んでいる。 訳：Wonder Words Festival を記念して、来月初句、図書館で豆 の巡回展が開催される。"},{"id":429,"category":"動詞問題・実戦問題 基本編","qnum":88,"question":"Employees must shut down their computers, printers, and other electronic devices when ______ the office for the day.","A":"leave","B":"leaves","C":"left","D":"leaving","answer":"C","answer_word":"left","explanation":"空所前の接続詞when 以降に主語がない。これはwhen (they are) ------- the office …と(主 語+ be 動詞) が省略された形 (2 つの節の主語が同じ場合に起きる) と考え、(D) leaving を 選ぶ。 接続詞 while や if もこの用法での出題例がある。なお、when には直後に過去分詞 を伴う用法もあるが、(C) を空所に補うと、when (employees are) left the office (従業員 はオフィスを残された) となり意味が通らない。 訳：従業員は仕事を終えてオフィスを退出するときに、コンピュータやプリンタ、そのほかの電子機器 の電源を切らなければならない。"},{"id":430,"category":"動詞問題・実戦問題 基本編","qnum":89,"question":"The opening of the concert hall ______ until a thorough safety inspection has been carried out.","A":"delay","B":"to delay","C":"has been delayed","D":"will be delaying","answer":"A","answer_word":"delay","explanation":"動詞 '~2iB 50S) という意味 (自動詞「ぐずぐずする」 は文意に合わない)。 B 所後に目的語となる名詞がないので、受動態の (C) has been delayed が適切。「オープンが 遅れる」と日 語で考えて (D) を選んではいけない(オープンは点検によって「遅らされる」側)。 訳：そのコンサートホールのオープンは、 徹底的な安全点検が行われるまで延期になった。"},{"id":431,"category":"動詞問題・実戦問題 基本編","qnum":90,"question":"______ about 20 kilometers from the city center is the Benin City Airport.","A":"Situates","B":"Situated","C":"Situating","D":"Situation","answer":"B","answer_word":"Situated","explanation":"場所の便利さを強調するため、主語 (PB) が文未に移動した倒置形。the Benin City Airport... is ------- about 20 kilometers .…の形に戻して考える。 他動詞 situate(~= 1B <) の過去分詞が形容詞化した (B) Situated (-この場所にある) を空所に補えば文意が通る。(C) は目的語が必要。(D) では意味が通らない。 訳：Benin City 空港は中心街から 20 キロほどのところにある。"},{"id":432,"category":"前置詞or接続詞問題・トレーニング","qnum":1,"question":"------- a recent survey, the top characteristics of effective managers include adaptability and sensitivity.","A":"According to","B":"When","C":"In case","D":"Since","answer":"A","answer_word":"According to","explanation":"空所後の a recent survey（最近の調査）という名詞を、カンマ後の節に正しくつなぐには前置詞が必要。選択肢のうち前置詞は According to（〜によると）のみ。訳：最近の調査によると、優れた経営者に多く見られる特徴として、順応性と感受性がある。"},{"id":433,"category":"前置詞or接続詞問題・トレーニング","qnum":2,"question":"------- you finish writing your report, please e-mail it to Ms. Garcia, one of the seminar instructors.","A":"As well as","B":"In addition to","C":"As soon as","D":"In regard to","answer":"C","answer_word":"As soon as","explanation":"文全体は「空所＋S V, S V」の形で、2つの節をつなぐ接続詞が必要。選択肢中、接続詞として自然なのは As soon as（〜したらすぐに）のみ。訳：レポートを書き終えたらすぐに、セミナー講師の1人である Garcia さんにメールで送ってください。"},{"id":434,"category":"前置詞or接続詞問題・トレーニング","qnum":3,"question":"We thank you for your order ------- regret to advise that it cannot be processed because the items are currently out of stock.","A":"or","B":"but","C":"whether","D":"either","answer":"B","answer_word":"but","explanation":"空所前は「注文へのお礼」、空所後は「在庫切れのお知らせ」で、内容の流れが逆転している。逆接の接続詞 but が正解。thank ～ but regret のように、前後が同形になる点も押さえる。訳：ご注文に感謝いたしますが、残念ながら現在品切れのため受注処理できないことをお知らせします。"},{"id":435,"category":"前置詞or接続詞問題・トレーニング","qnum":4,"question":"Customers must show proof of identification ------- opening a new account with the Banana Bank.","A":"when","B":"because","C":"then","D":"so that","answer":"A","answer_word":"when","explanation":"when には、2つの節の主語が同じ場合に、直後の「主語＋be動詞」を省略できる用法がある。この文では when (customers are) opening a new account と考えると自然。訳：Banana 銀行で新しく口座を開設する際、顧客は身分証明書を提示しなければならない。"},{"id":436,"category":"前置詞or接続詞問題・トレーニング","qnum":5,"question":"The Skyway Bridge will be closed for roadwork on Friday, ------- commuters should consider other means of transportation.","A":"when","B":"so","C":"though","D":"unless","answer":"B","answer_word":"so","explanation":"空所前は「Skyway Bridge が金曜日に閉鎖される予定」という知らせ、空所後はそれに伴う提案・指示。結果を表す so（したがって）が文意に合う。訳：Skyway Bridge は金曜日に道路工事で閉鎖されるので、通勤・通学客は別の交通手段を考えなければならない。"},{"id":437,"category":"前置詞or接続詞問題・トレーニング","qnum":6,"question":"------- Dr. Martin expected his patients to take advantage of the extended office hours, but they actually preferred earlier appointments.","A":"Although","B":"In light of","C":"Despite","D":"At first","answer":"D","answer_word":"At first","explanation":"but がすでにあり、空所がなくても文が成立しているため、空所には文全体を修飾する副詞が入る。副詞 At first（最初は）が正解。訳：Martin 医師は、延長した診療時間を患者が活用すると最初は期待していたが、実際には彼らは早い時間帯の診察を望んでいた。"},{"id":438,"category":"前置詞or接続詞問題・トレーニング","qnum":7,"question":"A recent survey indicates ------- 47 percent of travelers do not get enough sleep on business trips.","A":"that","B":"what","C":"which","D":"those","answer":"A","answer_word":"that","explanation":"動詞 indicate は直後に that 節を伴い、indicate that S V（SがVすることを示す）の形になる。訳：最近の調査で、47%の旅行者が出張時に十分な睡眠を取っていないことが示されている。"},{"id":439,"category":"前置詞or接続詞問題・トレーニング","qnum":8,"question":"All city bus passengers should exit through the rear door, ------- passengers with small children and strollers.","A":"even though","B":"furthermore","C":"in spite of","D":"except","answer":"D","answer_word":"except","explanation":"空所後は名詞句 passengers with small children and strollers。前の節に名詞句をつなぐ前置詞が必要で、規則に対する例外を表す except（〜を除いて）が正解。訳：市バスの乗客は、幼児連れやベビーカーを持った乗客を除き、後部ドアから降りなければならない。"},{"id":440,"category":"前置詞or接続詞問題・実戦問題","qnum":1,"question":"Currently, the Tokyo Central Bank has overseas branches in the UK, Hong Kong, ------- China.","A":"and","B":"if","C":"such","D":"but","answer":"A","answer_word":"and","explanation":"in the UK, Hong Kong, and China の形で、3つの名詞を並べる並列構造を作る。等位接続詞 and が正解。訳：現在、東京中央銀行はイギリス、香港、中国に海外支店がある。"},{"id":441,"category":"前置詞or接続詞問題・実戦問題","qnum":2,"question":"Apple Hills residents are encouraged to renew their driver's licenses online ------- they have already expired.","A":"whether","B":"so","C":"unless","D":"due to","answer":"C","answer_word":"unless","explanation":"空所後は節なので、接続詞が必要。文意から「すでに期限が切れていない限り」となる unless が正解。due to は前置詞で、後ろに名詞を伴う。訳：Apple Hills の居住者は、すでに期限が切れていない限り、運転免許証をオンラインで更新するよう勧められている。"},{"id":442,"category":"前置詞or接続詞問題・実戦問題","qnum":3,"question":"Jackets are required for club members in the main dining room ------- casual dress is acceptable in all other areas of the club.","A":"during","B":"what","C":"such","D":"while","answer":"D","answer_word":"while","explanation":"空所の前後にそれぞれ節があるため、節同士をつなぐ接続詞が必要。while（〜である一方）が2つの対照的な内容をつなぐ。訳：クラブのほかの場所では普段着が認められる一方、主食堂ではクラブ会員はジャケットを着用する必要がある。"},{"id":443,"category":"前置詞or接続詞問題・実戦問題","qnum":4,"question":"------- she has already proved herself a versatile actress, Helen Kuroshima continues to study to develop her acting style.","A":"Not only","B":"Although","C":"Despite","D":"Consequently","answer":"B","answer_word":"Although","explanation":"カンマの前後に節があり、2つの節をつなぐ接続詞が必要。Although（〜だけれども）が正解。Despite は同じ意味でも前置詞なので名詞を伴う。訳：すでに多才な女優であることを証明しているが、Helen Kuroshima は演技スタイルを磨くために学び続けている。"},{"id":444,"category":"前置詞or接続詞問題・実戦問題","qnum":5,"question":"With the exception of a few pavilions, all are slated for removal or demolition ------- the trade show closes on October 31.","A":"after","B":"either","C":"due to","D":"during","answer":"A","answer_word":"after","explanation":"空所前後がともに節なので、2つの節をつなぐ接続詞が必要。after（〜したあとで）が正解。due to と during は前置詞で名詞が後ろに続く。訳：展示会が10月31日に終了したあと、いくつかを除いて、すべてのパビリオンは撤去または取り壊しが予定されている。"},{"id":445,"category":"前置詞or接続詞問題・実戦問題","qnum":6,"question":"Smile Cable Television offers a variety of movie channels ------- local news and sports.","A":"always","B":"in case of","C":"in addition to","D":"next","answer":"C","answer_word":"in addition to","explanation":"空所前の節に、空所後の名詞句 local news and sports をつなぐ前置詞が必要。文意から in addition to（〜に加えて）が正解。訳：Smile ケーブルテレビは、地元ニュースとスポーツに加えて、さまざまな映画チャンネルを提供している。"},{"id":446,"category":"前置詞or接続詞問題・実戦問題","qnum":7,"question":"Payroll procedure changed ------- the company merged with Olsson Corporation in July.","A":"when","B":"soon","C":"without","D":"between","answer":"A","answer_word":"when","explanation":"空所の前後がそれぞれ節なので、節同士をつなぐ接続詞が必要。選択肢中、接続詞は when（〜したとき）のみ。訳：7月にその会社が Olsson 社と合併したとき、給与支払いの手続きが変更された。"},{"id":447,"category":"前置詞or接続詞問題・実戦問題","qnum":8,"question":"Swallow Airways Flight 990 arrived at HwangBo International Airport on time ------- the adverse weather conditions.","A":"because","B":"even though","C":"now that","D":"despite","answer":"D","answer_word":"despite","explanation":"空所前は節、後ろは名詞句 the adverse weather conditions なので、名詞句をつなぐ前置詞が必要。despite（〜にもかかわらず）が正解。訳：Swallow 航空990便は、悪天候にもかかわらず、定刻どおり HwangBo 国際空港に到着した。"},{"id":448,"category":"前置詞or接続詞問題・実戦問題","qnum":9,"question":"The workshop is expected to be well attended ------- we recommend that you make reservations in advance.","A":"for","B":"or","C":"so","D":"either","answer":"C","answer_word":"so","explanation":"前半は理由、後半はそれに基づく結論・提案。結果を表す so（だから、したがって）が文意に合う。訳：そのワークショップは参加者が多いことが予想されるので、事前に予約することをお勧めします。"},{"id":449,"category":"前置詞or接続詞問題・実戦問題","qnum":10,"question":"It is a good idea to limit your cover letter to a single page ------- that is not specifically indicated in the job advertisement.","A":"even if","B":"as though","C":"rather than","D":"so that","answer":"A","answer_word":"even if","explanation":"空所の前後の2つの節をつなぐ接続詞が必要。前半「カバーレターを1ページに収めるとよい」と後半「求人広告に具体的に記載されていない」を自然につなぐのは even if（たとえ〜でも）。訳：たとえ求人広告に具体的な記載がなくても、カバーレターを1ページに収めるのはよい考えだ。"},{"id":450,"category":"前置詞or接続詞問題・実戦問題","qnum":11,"question":"------- sales have been rising, Western Chemicals has been struggling to maintain a profit.","A":"If not","B":"Such as","C":"Even though","D":"In case","answer":"C","answer_word":"Even though","explanation":"カンマを挟んだ節と節をつなぐ接続詞が必要。売上は上昇しているが利益維持に苦労している、という逆接の関係なので Even though（〜だけれども）が正解。訳：売上は上昇しているが、Western Chemicals は利益を維持することに苦戦している。"},{"id":451,"category":"前置詞or接続詞問題・実戦問題","qnum":12,"question":"Mr. Ikeda had no time to purchase gifts for coworkers ------- his stay in Tokyo.","A":"when","B":"also","C":"during","D":"while","answer":"C","answer_word":"during","explanation":"空所前は節、後ろは名詞句 his stay in Tokyo なので、名詞句をつなぐ前置詞が必要。during（〜の間）が正解。訳：Ikeda さんは東京滞在中、同僚にお土産を買う時間がなかった。"},{"id":452,"category":"前置詞or接続詞問題・実戦問題","qnum":13,"question":"Eastbound Highway 66 was shut down Monday morning ------- icy road conditions.","A":"while","B":"in order to","C":"now that","D":"due to","answer":"D","answer_word":"due to","explanation":"空所前は節、後ろは名詞句 icy road conditions なので、前置詞が必要。due to（〜のため）が正解。訳：東行きの66号線は月曜の朝、道路凍結のため閉鎖された。"},{"id":453,"category":"前置詞or接続詞問題・実戦問題","qnum":14,"question":"Under the new recycling regulations, manufacturers are required to accept old equipment for disposal ------- a customer is purchasing a new item.","A":"if","B":"likewise","C":"nevertheless","D":"besides","answer":"A","answer_word":"if","explanation":"空所前後は節なので、節同士をつなぐ接続詞が必要。条件を表す if（もし〜ならば）が正解。訳：新しいリサイクル規制では、顧客が新しい商品を購入する場合、製造業者は古い機器を処分のために引き取るよう求められる。"},{"id":454,"category":"前置詞or接続詞問題・実戦問題","qnum":15,"question":"------- a short rainy period from March to May, the climate in Red Desert is mostly hot and dry.","A":"Although","B":"However","C":"Except for","D":"Even if","answer":"C","answer_word":"Except for","explanation":"空所後からカンマまでは名詞句で、カンマ以降が節。名詞句をつなぐ前置詞が必要で、Except for（〜を除いて）が正解。訳：3月から5月までの短い雨期を除いて、Red Desert の気候は主に暑く乾燥している。"},{"id":455,"category":"前置詞or接続詞問題・実戦問題","qnum":16,"question":"------- track work for street railways is taking longer than expected, temporary bus services will be available until the work is complete.","A":"Because","B":"During","C":"Should","D":"Where","answer":"A","answer_word":"Because","explanation":"カンマ前後がどちらも節なので、節同士をつなぐ接続詞が必要。文意が通るのは Because（〜なので）。During は名詞を伴う前置詞、Should は「万が一〜なら」の倒置で使えるが後ろの動詞は原形になる。Where は場所を表すため文意に合わない。訳：路面電車の保線工事が予定より長引いているので、工事が終わるまで臨時バスサービスが利用できる。"},{"id":456,"category":"前置詞or接続詞問題・実戦問題","qnum":17,"question":"------- she can spend more time with her family, Emily Gomez decided to change her job.","A":"Apart from","B":"So that","C":"Because of","D":"Rather than","answer":"B","answer_word":"So that","explanation":"カンマ前後がそれぞれ節なので、節同士をつなぐ接続詞が必要。So that S can do で「Sが〜できるように」という目的を表す。Apart from と Because of は名詞を伴う前置詞、Rather than はこの文では節を伴えない。訳：家族ともっと時間を過ごせるように、Emily Gomez は転職を決めた。"},{"id":457,"category":"前置詞or接続詞問題・実戦問題","qnum":18,"question":"Purchases of over $100 should not be made ------- authorization from department heads.","A":"even","B":"despite","C":"unless","D":"without","answer":"D","answer_word":"without","explanation":"空所後は authorization from department heads という名詞句なので、前の節につなぐ前置詞が必要。without を入れると「部門長の許可なしに」という意味になり文意が通る。despite は「〜にもかかわらず」で文意に合わず、unless は節を伴う接続詞。訳：部門長の許可なしに100ドル以上の購入を行ってはいけない。"},{"id":458,"category":"前置詞or接続詞問題・実戦問題","qnum":19,"question":"In the first quarter, the company managed to expand its market share slightly ------- its closest competitor suffered major drop in sales.","A":"throughout","B":"whereas","C":"that","D":"despite","answer":"B","answer_word":"whereas","explanation":"前後の2つの節をつなぐ接続詞が必要。前半は「市場シェアを拡大した」、後半は「競争相手が売上の大幅減に苦しんだ」で、対照的な内容なので whereas（〜であるのに対して）が正解。throughout と despite は前置詞、that は名詞節を作る接続詞で文意に合わない。訳：第1四半期に、最も近い競争相手が売上の大幅減に苦しんだのに対し、その会社は市場シェアを少し拡大した。"},{"id":459,"category":"前置詞or接続詞問題・実戦問題","qnum":20,"question":"Mr. Morozov will complete the expense report and submit it to the accounting office ------- he returns from Shanghai.","A":"among","B":"beside","C":"after","D":"within","answer":"C","answer_word":"after","explanation":"前後がそれぞれ節なので、節同士をつなぐ接続詞が必要。選択肢中、接続詞として自然に使えるのは after（〜したあとで）。among、beside、within はいずれも前置詞で、後ろには名詞が続く。訳：Morozov さんは上海から戻ったあと、経費報告書を完成させ、会計事務所に提出する。"},{"id":460,"category":"前置詞or接続詞問題・実戦問題","qnum":21,"question":"Highland Road has been closed for a week ------- repairs being made to the bridge over Douglas Creek.","A":"since","B":"even though","C":"while","D":"because of","answer":"D","answer_word":"because of","explanation":"空所後は repairs being made ... という名詞句なので、前の節につなぐ前置詞が必要。道路閉鎖の理由を表すため because of（〜が理由で）が正解。since、even though、while は節を伴う接続詞として使う。訳：Highland 通りは、Douglas 川にかかる橋の補修工事のため、1週間閉鎖されている。"},{"id":461,"category":"前置詞or接続詞問題・実戦問題","qnum":22,"question":"Pearl Online will request information such as name, billing address, and credit card number ------- that we can process and fill your order.","A":"so","B":"even","C":"until","D":"also","answer":"A","answer_word":"so","explanation":"空所後に that 節が続くため、so that S can do（Sが〜できるように）の形を作る so が正解。even と also は副詞、until は接続詞・前置詞として使えるが that と結びつかない。訳：Pearl Online 社は、受注処理ができるように、名前、請求先、クレジットカード番号などの情報を求める。"},{"id":462,"category":"前置詞or接続詞問題・実戦問題","qnum":23,"question":"------- all technical issues associated with the new product have been resolved, the marketing plan will be finalized.","A":"Rather","B":"Once","C":"Moreover","D":"Meanwhile","answer":"B","answer_word":"Once","explanation":"カンマ前後がそれぞれ節なので、節と節をつなぐ接続詞が必要。選択肢中、接続詞として機能し文意が通るのは Once（いったん〜したらすぐに）。Moreover と Meanwhile は接続機能を持たない副詞。訳：新製品に関連した技術的問題がすべて解決されたら、マーケティング計画が最終決定される。"},{"id":463,"category":"前置詞or接続詞問題・実戦問題","qnum":24,"question":"In the hotel lobby, there are many exhibits that participants can visit ------- attending the conference.","A":"then","B":"while","C":"because","D":"near","answer":"B","answer_word":"while","explanation":"空所後は attending the conference で、while (they are) attending ... のように「主語＋be動詞」が省略された形と考える。while（〜している間に）が正解。near は場所の近さを示す前置詞で文意に合わず、because はこの省略形では使えない。訳：ホテルのロビーには、参加者が会議参加中に見に行ける展示物がたくさんある。"},{"id":464,"category":"前置詞or接続詞問題・実戦問題","qnum":25,"question":"The company has agreed to remedy the construction errors ------- of the cost.","A":"despite","B":"even though","C":"regardless","D":"now that","answer":"C","answer_word":"regardless of","explanation":"空所後の of と結びついて regardless of X（Xに関係なく）という表現を作る。despite も「〜にもかかわらず」を表す前置詞だが of を伴わず単独で用いる。even though と now that は接続詞。訳：その企業は、費用に関係なく施工ミスを修正することに同意した。"},{"id":465,"category":"前置詞or接続詞問題・実戦問題","qnum":26,"question":"------- Mr. Yaguchi retired ten years ago, companies still request his assistance in an advisory role.","A":"Although","B":"Once","C":"Despite","D":"Until","answer":"A","answer_word":"Although","explanation":"カンマ前後の節をつなぐ接続詞が必要。退職したにもかかわらず依然として助言を求められている、という逆接の関係なので Although が正解。Despite は同じ意味を表す前置詞で、後ろに名詞を伴う。訳：Yaguchi さんは10年前に退職したが、会社は未だに顧問役として彼の力添えを依頼している。"},{"id":466,"category":"前置詞or接続詞問題・実戦問題","qnum":27,"question":"Everyone in the finance division ------- staff members working on special projects is expected to attend the meeting tomorrow afternoon.","A":"apart","B":"even though","C":"also","D":"except for","answer":"D","answer_word":"except for","explanation":"Everyone ... is expected が文の骨格。空所後の staff members を伴って主語 Everyone を修飾する形容詞句を作るには、前置詞句 except for（〜を除いて）が適切。even though は接続詞。訳：特別プロジェクトに取り組んでいるスタッフを除いて、財務部の全員が明日の午後の会議に出席するよう求められている。"},{"id":467,"category":"前置詞or接続詞問題・実戦問題","qnum":28,"question":"To receive the following month's issue, subscriptions should be sent in by the 15th of each month ------- submitted electronically or by mail.","A":"whether","B":"because","C":"since","D":"therefore","answer":"A","answer_word":"whether","explanation":"空所後の or と結びついて whether X or Y（XであろうとYであろうと）の形を作る。whether (they are) submitted electronically or by mail と、主語＋be動詞が省略されている。訳：次月号を受け取るには、毎月15日までに、購読申し込みをオンラインまたは郵送で送る必要がある。"},{"id":468,"category":"前置詞or接続詞問題・実戦問題","qnum":29,"question":"Workers can leave the factory early ------- they have received permission to do so from a supervisor.","A":"otherwise","B":"except for","C":"in spite of","D":"provided that","answer":"D","answer_word":"provided that","explanation":"空所の前後がそれぞれ節なので、節同士をつなぐ接続詞が必要。provided that（〜した場合のみ、〜という条件で）が文意に合う。except for と in spite of は前置詞。訳：作業員は、上司から早退の許可を得た場合のみ、工場を早退できる。"},{"id":469,"category":"前置詞or接続詞問題・実戦問題","qnum":30,"question":"Mr. Williams usually brings gifts to his colleagues ------- he returns from an overseas business trip.","A":"which","B":"whenever","C":"whether","D":"what","answer":"B","answer_word":"whenever","explanation":"空所前後の節同士をつなぐ接続詞が必要。whenever（〜するときはいつでも）が文意に合う。which と what は関係代名詞で、主語や目的語が欠けた形が後ろに続く。訳：Williams さんは普段、海外出張から帰るといつでも同僚にお土産を持ってくる。"},{"id":470,"category":"前置詞or接続詞問題・実戦問題","qnum":31,"question":"Tanton City passed legislation requiring all drivers age 75 and older to pass a vision test ------- renewing their driver's license.","A":"although","B":"before","C":"and","D":"from","answer":"B","answer_word":"before","explanation":"空所後は renewing their driver’s license という動名詞句なので、前の節につなぐ前置詞が必要。before doing の形で「〜する前に」となる before が正解。訳：Tanton 市は、75歳以上のすべての運転者に対し、運転免許証を更新する前に視力検査に合格することを求める法律を可決した。"},{"id":471,"category":"前置詞or接続詞問題・実戦問題","qnum":32,"question":"------- the book may be understood by non-specialists, the first two chapters provide a detailed introduction.","A":"In regard to","B":"Because of","C":"However","D":"In order that","answer":"D","answer_word":"In order that","explanation":"カンマ前後の2つの節をつなぐ接続詞が必要。In order that（〜するために）が目的を表し文意に合う。In regard to と Because of は前置詞、However は接続機能のない副詞。訳：専門家でない人にも理解してもらえるよう、その本のはじめの2章は詳細な導入になっている。"},{"id":472,"category":"前置詞or接続詞問題・実戦問題","qnum":33,"question":"------- her extensive experience and past successes, Ms. Isohi is expected to be an invaluable asset to our company.","A":"So","B":"That","C":"Given","D":"Since","answer":"C","answer_word":"Given","explanation":"空所後からカンマまでは名詞句、カンマ後が節なので、名詞句を節につなぐ前置詞が必要。Given（〜を考慮すると）が文意に合う。Since は「〜以来」などで使うが、この文では自然でない。訳：豊富な経験と過去の成功を考えると、Isohi さんはわが社にとってかけがえのない財産になるだろう。"},{"id":473,"category":"前置詞or接続詞問題・実戦問題","qnum":34,"question":"The fun run will be postponed until March 23 ------- the weather clears up by Friday.","A":"unless","B":"however","C":"because of","D":"so that","answer":"A","answer_word":"unless","explanation":"前後の節をつなぐ接続詞が必要。空所後は「金曜日までに天気が回復する」という延期しないための例外条件なので、unless（〜しない限り）が正解。訳：市民マラソンは、金曜日までに天気が回復しない限り、3月23日まで延期される。"},{"id":474,"category":"前置詞or接続詞問題・実戦問題","qnum":35,"question":"Due to excessive requests for support, GeoMax Technologies has decided to remove a map application from its mobile phones, ------- the product's popularity.","A":"although","B":"notwithstanding","C":"however","D":"even","answer":"B","answer_word":"notwithstanding","explanation":"空所後は the product’s popularity という名詞句なので、前置詞が必要。notwithstanding（〜にもかかわらず）が文意に合う。although は接続詞、however と even は副詞。訳：サポートのリクエストが多すぎるため、GeoMax Technologies は、その製品の人気にもかかわらず、自社の携帯電話から地図アプリを削除することに決めた。"},{"id":475,"category":"前置詞or接続詞問題・実戦問題","qnum":36,"question":"All city residents must obtain a construction permit from the city ------- building a driveway.","A":"prior to","B":"because","C":"soon","D":"so that","answer":"A","answer_word":"prior to","explanation":"空所後は building a driveway という動名詞句なので、前置詞が必要。prior to（〜の前に）が正解。この to は不定詞ではないため、後ろには動詞の原形ではなく名詞・動名詞が続く。訳：すべての市内居住者は、私有車道を作る前に市から建設許可証を得る必要がある。"},{"id":476,"category":"前置詞or接続詞問題・実戦問題","qnum":37,"question":"The leadership workshop covers a range of topics, ------- career development, social networking, and recruiting new members.","A":"so that","B":"as of","C":"in that","D":"such as","answer":"D","answer_word":"such as","explanation":"空所後には名詞句が並んでおり、空所前の a range of topics の具体例を示している。前置詞句 such as（例えば〜など）が正解。as of は「〜以降」で後ろに時点を伴う。訳：そのリーダーシップ研修は、キャリア開発、ソーシャルネットワーキング、新メンバーの採用など、幅広いトピックを扱う。"},{"id":477,"category":"前置詞or接続詞問題・実戦問題","qnum":38,"question":"------- booking flights and making accommodation reservations, Waterfall Travel agents arrange private tours for small groups.","A":"As much as","B":"Moreover","C":"Included in","D":"In addition to","answer":"D","answer_word":"In addition to","explanation":"空所後からカンマまでは動名詞句、カンマ後が節なので、前置詞が必要。カンマ後では追加のサービス内容が述べられているため、In addition to（〜に加えて）が正解。訳：フライト予約と宿泊施設の予約に加えて、Waterfall 旅行社は少人数での個人ツアーも手配する。"},{"id":478,"category":"前置詞or接続詞問題・実戦問題","qnum":39,"question":"Ridgeway Associates agreed to pay an early completion bonus ------- construction of their new headquarters was completed by March 30.","A":"in spite of","B":"as long as","C":"since then","D":"due to","answer":"B","answer_word":"as long as","explanation":"前後の節同士をつなぐ接続詞が必要。as long as（〜する限り、〜しさえすれば）が条件を表し、「3月30日までに完成するならば」となる。in spite of と due to は前置詞、since then は副詞。訳：Ridgeway Associates 社は、新本社の建設が3月30日までに終わるならば早期完了ボーナスを支払うことに同意した。"},{"id":479,"category":"前置詞or接続詞問題・実戦問題","qnum":40,"question":"------- the difficulties he faced, Mr. Chang managed to complete his master's degree at the University of Abeno last year.","A":"Although","B":"Despite","C":"However","D":"Whereas","answer":"B","answer_word":"Despite","explanation":"空所後の the difficulties he faced は名詞句なので、それをカンマ以降の節につなぐ前置詞が必要。Despite（〜にもかかわらず）が正解。Although と Whereas は接続詞、However は副詞。訳：直面した困難にもかかわらず、Chang さんは昨年 Abeno 大学で修士課程を何とか修了した。"},{"id":480,"category":"前置詞or接続詞問題・実戦問題","qnum":41,"question":"------- Mr. Bruno contributed significantly to the success of the advertising campaign, his promotion to the manager position is well deserved.","A":"If so","B":"Rather than","C":"Owing to","D":"Given that","answer":"D","answer_word":"Given that","explanation":"カンマ前後の節と節をつなぐ接続詞が必要。Given that（〜ということを考慮すれば）が文意に合う。If so は If so, S V の形で使い、Owing to は名詞を伴う前置詞。訳：Bruno さんが広告キャンペーンの成功に大きく貢献したことを考えれば、マネージャー職への昇格にふさわしい。"},{"id":481,"category":"前置詞or接続詞問題・実戦問題","qnum":42,"question":"------- Isabella Hill has received a high rating on her evaluation, it is likely that her salary will increase next year.","A":"Besides","B":"So that","C":"As","D":"Due to","answer":"C","answer_word":"As","explanation":"カンマ前後の節をつなぐ接続詞が必要。前半が理由、後半が結論なので As（〜なので）が正解。So that は目的を表し文意に合わず、Due to は前置詞で名詞を伴う。訳：Isabella Hill は高評価を受けたので、来年の給与が上がるだろう。"},{"id":482,"category":"前置詞or接続詞問題・実戦問題","qnum":43,"question":"Mr Murphy has requested that the second seminar be held tomorrow ------- having him return next week.","A":"even though","B":"rather than","C":"as soon as","D":"so that","answer":"B","answer_word":"rather than","explanation":"空所前は節、空所後は having ... の動名詞句なので、前置詞句として働く rather than（〜ではなく）が正解。even though、as soon as、so that は接続詞で、後ろに節を伴う。訳：Murphy さんは、翌週また戻るのではなく、次のセミナーを明日開催するよう求めた。"},{"id":483,"category":"前置詞or接続詞問題・実戦問題","qnum":44,"question":"------- Ms. Contreras began working as a sales representative, she has successfully expanded our client base.","A":"Since","B":"When","C":"Before","D":"Whereas","answer":"A","answer_word":"Since","explanation":"選択肢はいずれも接続詞として使えるため、時制と文意に注目する。前半が過去形で過去の時点を表し、後半が現在完了形で現在までの実績を表しているため、Since（〜以来）が正解。訳：Contreras さんは販売員として働き始めて以来、わが社の顧客基盤を順調に拡大してきた。"},{"id":484,"category":"前置詞or接続詞問題・実戦問題","qnum":45,"question":"Please note that breakfast and dinner are included in the price of the room, ------- that lunch costs extra.","A":"either","B":"but","C":"or","D":"then","answer":"B","answer_word":"but","explanation":"空所後の that 節の前には please note が省略されていると考える。前半は「朝食と夕食は料金に含まれる」、後半は「昼食は別料金」で、逆接の but（ただし）が自然。or は文意に合わず、then は副詞。訳：朝食と夕食は部屋代に含まれていますが、昼食は別料金であることにご留意ください。"},{"id":485,"category":"前置詞or接続詞問題・実戦問題","qnum":46,"question":"Tim Rothschild has a number of important qualifications as a market researcher ------- his experience at Bridgeport Advertising.","A":"while","B":"only if","C":"moreover","D":"aside from","answer":"D","answer_word":"aside from","explanation":"空所前の節に、後ろの名詞句 his experience をつなぐ前置詞が必要。選択肢のうち前置詞として文意に合うのは aside from（〜に加えて）のみ。訳：Tim Rothschild は、Bridgeport Advertising での経験に加えて、市場調査員として重要な資格をいくつか持っている。"},{"id":486,"category":"前置詞or接続詞問題・実戦問題","qnum":47,"question":"Mr. Hasegawa decided to purchase the movie tickets early ------- he would not have to wait in line at the box office.","A":"so that","B":"in order","C":"as if","D":"even yet","answer":"A","answer_word":"so that","explanation":"空所の前後は節なので、節同士をつなぐ接続詞が必要。後半は「チケット売り場で並ばなくてすむように」という目的を表すため、so that が正解。訳：Hasegawa さんは、チケット売り場で待つ必要がないように、映画のチケットを事前に購入することに決めた。"},{"id":487,"category":"前置詞or接続詞問題・実戦問題","qnum":48,"question":"------- periodic maintenance is carried out according to the manufacturers specifications, the TD24 paper folder will continue to function for a good many years.","A":"For","B":"Therefore","C":"Providing","D":"Over","answer":"C","answer_word":"Providing","explanation":"空所の前後は節なので、節同士をつなぐ接続詞が必要。Providing（〜した場合に限り）が文意に合う。provide は動詞としても見えるが、ここでは条件を表す接続詞 provided / providing that の that が省略された形。訳：メーカーの仕様に従って定期的なメンテナンスが行われれば、TD24 ペーパーホルダーは長期間にわたって機能し続ける。"},{"id":488,"category":"前置詞or接続詞問題・実戦問題","qnum":49,"question":"Please let us know ------- you prefer to be notified by e-mail or telephone in case we have to reschedule your appointment.","A":"than","B":"whereas","C":"whether","D":"such","answer":"C","answer_word":"whether","explanation":"直前に他動詞 know があり、空所にはその目的語となる名詞節を導く接続詞が必要。whether X or Y（XかYか）を作る whether が正解。訳：予約の変更が必要な場合、メールと電話のどちらで知らせるのがよいかお知らせください。"},{"id":489,"category":"前置詞or接続詞問題・実戦問題","qnum":50,"question":"The tour group left for Osaka, ------- they had not received their complete itinerary from the travel agency.","A":"in spite of","B":"because of","C":"even though","D":"so that","answer":"C","answer_word":"even though","explanation":"カンマ前後の節と節をつなぐ接続詞が必要。「大阪に出発した」と「旅程表をまだ受け取っていない」は逆接の関係なので even though（〜であるけれども）が正解。in spite of と because of は前置詞で名詞を伴う。訳：旅行会社から完全な旅程表をまだ受け取っていなかったが、そのツアーグループは大阪へ向かった。"},{"id":490,"category":"前置詞or接続詞問題・実戦問題","qnum":51,"question":"Mr. Roy called to ask if the deadline for submission for the draft could be postponed ------- after midnight.","A":"during","B":"until","C":"since","D":"when","answer":"B","answer_word":"until","explanation":"空所後の after midnight と結びつき、「〜のあとまで」の意味を表す前置詞 until が正解。until after midnight で「真夜中過ぎまで」となる。since は過去の起点を作る語で文意に合わない。訳：Roy さんは、原稿提出の締切を真夜中過ぎまで延ばせないか尋ねるために電話をかけた。"},{"id":491,"category":"前置詞or接続詞問題・実戦問題","qnum":52,"question":"Applicants for the position will be sent an acknowledgement letter ------- the Human Resources Department has received the applications.","A":"among","B":"despite","C":"unless","D":"once","answer":"D","answer_word":"once","explanation":"空所の前後がどちらも節なので、節同士をつなぐ接続詞が必要。文意から「応募書類を受け取り次第」を表す once（いったん〜したらすぐに）が正解。訳：人事部が応募書類を受け取り次第、この職への応募者には受領通知が送られる。"},{"id":492,"category":"前置詞or接続詞問題・実戦問題","qnum":53,"question":"Administration keeps records of all vehicle registration numbers, ------- whether they are company owned or not.","A":"due to","B":"even though","C":"rather than","D":"regardless of","answer":"D","answer_word":"regardless of","explanation":"whether 節を伴い、regardless of whether ...（〜かどうかにかかわらず）を作る D が正解。due to は理由、even though は接続詞、rather than は「〜ではなく」。訳：管理部では、社用車であるかどうかにかかわらず、すべての車の登録番号を記録している。"},{"id":493,"category":"前置詞or接続詞問題・実戦問題","qnum":54,"question":"Producers of the children’s animation series Team Power shortened the program by two minutes, ------- meeting the requirements of broadcasters.","A":"thereby","B":"because","C":"whenever","D":"during","answer":"A","answer_word":"thereby","explanation":"空所がなくても文は完成しており、後ろに現在分詞 meeting が続くため、修飾語として働く副詞 thereby（それによって）が適切。because と whenever は接続詞、during は前置詞。訳：子供向けアニメシリーズ Team Power の制作陣は番組の長さを2分短縮し、それによって放映者の要求を満たした。"},{"id":494,"category":"前置詞or接続詞問題・実戦問題","qnum":55,"question":"Employees are required to book in advance ------- intending to use a company vehicle.","A":"whereas","B":"from","C":"if","D":"even","answer":"C","answer_word":"if","explanation":"空所の前後は、後ろが動名詞句のように見えるが、if (they are) intending ... のように主語＋be動詞が省略された節と考える。条件を表す if が正解。訳：従業員は、社用車を使用するつもりであれば、事前に予約することが求められる。"},{"id":495,"category":"前置詞or接続詞問題・実戦問題","qnum":56,"question":"------- retiring from Smith Computer Technologies two years ago, Bill Smith has been devoting more time to charity events.","A":"When","B":"Since","C":"Already","D":"From","answer":"B","answer_word":"Since","explanation":"空所後からカンマまでは動名詞句なので、前置詞が必要。文意から Since（〜以来）が正解。When は主語＋be 動詞を省略できる場合があるが、ここでは時制が合わず不適切。訳：2年前に Smith Computer Technologies を退職してから、Bill Smith は慈善イベントにより多くの時間を充てている。"},{"id":496,"category":"前置詞or接続詞問題・実戦問題","qnum":57,"question":"------- recent changes made to the schedule, employees are to be given an additional day off next Friday.","A":"Because","B":"As far as","C":"In light of","D":"Except for","answer":"C","answer_word":"In light of","explanation":"空所後は recent changes ... という名詞句なので、前置詞句が必要。文意から In light of（〜を考慮して）が正解。Because と As far as は接続詞、Except for は「〜を除いて」で文意に合わない。訳：スケジュールに加えられた最近の変更を考慮して、従業員は来週金曜日に追加の休みが与えられる。"},{"id":497,"category":"前置詞or接続詞問題・実戦問題","qnum":58,"question":"Members of the purchasing department should follow the current procedures for the issuing of purchase orders to vendors, unless ------- instructed by the manager.","A":"otherwise","B":"furthermore","C":"however","D":"if","answer":"A","answer_word":"otherwise","explanation":"unless と直後の過去分詞 instructed がセットで使われ、「別の方法で〜されない限り」という表現になる。unless (they are) otherwise instructed の省略形と考える。訳：購買部のメンバーは、販売会社への購入注文を出す際、マネージャーから別段の指示がない限り、現行の手順に従わなければならない。"},{"id":498,"category":"代名詞問題・トレーニング","qnum":1,"question":"If you take office stationery from the storeroom, please contact Ms. Nelson so that ------- can keep an inventory of office supplies.","A":"she","B":"her","C":"hers","D":"herself","answer":"A","answer_word":"she","explanation":"代名詞の格の問題。so that に続く節の主語が必要で、直前に出ている Ms. Nelson を受ける主格 she が正解。her は目的格または所有格、hers は所有代名詞、herself は再帰代名詞で主語には合わない。訳：倉庫から事務用品を持ち出したら、事務用品の在庫を管理できるよう Nelson さんに連絡してください。"},{"id":499,"category":"代名詞問題・トレーニング","qnum":2,"question":"Mr. Bando was told by the building’s owner that the monthly rent should be paid directly to -------.","A":"she","B":"her","C":"hers","D":"herself","answer":"B","answer_word":"her","explanation":"空所は前置詞 to の目的語なので目的格が必要。女性を指す目的格 her が正解。she は主格、hers は所有代名詞、herself は主語と目的語が同じ場合に使う再帰代名詞でここでは不適切。訳：Bando さんはビルのオーナーから、毎月の家賃を直接彼女に払うように言われた。"},{"id":500,"category":"代名詞問題・トレーニング","qnum":3,"question":"Peter Hardy guided visitors around the company ------- while his secretary prepared refreshments in the cafeteria.","A":"he","B":"his","C":"him","D":"himself","answer":"D","answer_word":"himself","explanation":"空所前で文がすでに完成しており、Peter Hardy 自身を強調する語が入る。主語と同じ人物を強調する再帰代名詞 himself が正解。訳：カフェテリアで秘書が軽食を準備している間、Peter Hardy は自ら社内を客に案内した。"},{"id":501,"category":"代名詞問題・トレーニング","qnum":4,"question":"------- attending the International Toy Fair is asked to sign in at the entrance and wear a colored wristband according to their ticket type.","A":"Everyone","B":"Whoever","C":"They","D":"Several","answer":"A","answer_word":"Everyone","explanation":"この文の主語は「------- attending the International Toy Fair」。現在分詞 attending 以下の修飾語を伴い、単数扱いで主語になれる代名詞 Everyone が正解。Whoever は直後に述語動詞を伴うため不可。They と Several は複数扱いで、述語 is asked と一致しない。訳：国際玩具見本市に参加する人は全員、入口で記帳し、チケットの種類に応じた色分けされたリストバンドを着用するよう求められる。"},{"id":502,"category":"代名詞問題・トレーニング","qnum":5,"question":"The Human Resources department has received more than 20 résumés so far, but ------- are qualified for the position.","A":"nothing","B":"few","C":"someone","D":"every","answer":"B","answer_word":"few","explanation":"空所後の述語動詞 are の主語になる複数名詞相当の代名詞が必要。few（ほとんどない人・もの）が正解。nothing と someone は単数扱い、every は単独では主語にならず名詞の単数形を修飾する。訳：人事部はこれまでに20以上の履歴書を受け取ったが、そのポストに適任な人はほとんどいない。"},{"id":503,"category":"代名詞問題・実戦問題","qnum":1,"question":"Less than 40 percent of all physicians in Wichita are employed as full-time staff by the hospitals where ------- practice.","A":"they","B":"their","C":"them","D":"themselves","answer":"A","answer_word":"they","explanation":"where 以下は「医師たちが勤務する病院」という完全な節になるため、空所には節の主語になる主格代名詞 they が入る。"},{"id":504,"category":"代名詞問題・実戦問題","qnum":2,"question":"Personnel at the manufacturing facility are required to have identification cards with ------- at all times.","A":"they","B":"their","C":"them","D":"theirs","answer":"C","answer_word":"them","explanation":"前置詞 with の目的語になる代名詞が必要。personnel を受ける目的格 them が正解。"},{"id":505,"category":"代名詞問題・実戦問題","qnum":3,"question":"As the seminar was understaffed, Ms. Tahara offered to distribute the documents ------- in order to save time.","A":"she","B":"her","C":"hers","D":"herself","answer":"D","answer_word":"herself","explanation":"文はすでに完成しており、「自分で配布する」と主語 Ms. Tahara を強調する再帰代名詞 herself が入る。"},{"id":506,"category":"代名詞問題・実戦問題","qnum":4,"question":"Steady sales of the new digital camera have been attributed to ------- high picture quality.","A":"its","B":"them","C":"itself","D":"theirs","answer":"A","answer_word":"its","explanation":"空所後に名詞 high picture quality があるため、所有格が必要。the new digital camera を受ける所有格 its が正解。"},{"id":507,"category":"代名詞問題・実戦問題","qnum":5,"question":"Instead of purchasing -------, Mr. Filbert decided to lease photocopiers for his new office.","A":"them","B":"themselves","C":"their","D":"theirs","answer":"A","answer_word":"them","explanation":"動名詞 purchasing の目的語になる代名詞が必要。photocopiers を指す目的格 them が正解。"},{"id":508,"category":"代名詞問題・実戦問題","qnum":6,"question":"As everyone else on the sales team was out of the office, Mr. Bruno had to take care of all client calls -------.","A":"he","B":"his own","C":"his","D":"himself","answer":"D","answer_word":"himself","explanation":"take care of all client calls は目的語までそろっているため、主語 Mr. Bruno を強調する再帰代名詞 himself が入る。"},{"id":509,"category":"代名詞問題・実戦問題","qnum":7,"question":"Applicants for the position must be able to lift heavy items and move ------- to and from various locations.","A":"they","B":"their","C":"them","D":"themselves","answer":"C","answer_word":"them","explanation":"動詞 move の目的語として heavy items を受ける目的格代名詞 them が必要。applicants 自身を動かす意味ではないため themselves は不適切。"},{"id":510,"category":"代名詞問題・実戦問題","qnum":8,"question":"Participants at the workshop will be served a complimentary lunch but will have to make dinner arrangements -------.","A":"itself","B":"themselves","C":"ourselves","D":"yourself","answer":"B","answer_word":"themselves","explanation":"参加者自身で夕食の手配をする、という意味。主語 Participants と同じ対象を表す再帰代名詞 themselves が正解。"},{"id":511,"category":"代名詞問題・実戦問題","qnum":9,"question":"The assembly line supervisor is working on the work schedule and will forward it to all of ------- by the end of the week.","A":"us","B":"our","C":"we","D":"ourselves","answer":"A","answer_word":"us","explanation":"前置詞 of の目的語になる代名詞が必要なので、目的格 us が正解。our は所有格、we は主格。"},{"id":512,"category":"代名詞問題・実戦問題","qnum":10,"question":"Sunflower Media will issue a formal statement this afternoon confirming ------- acquisition of the Tokyo Daily.","A":"itself","B":"its","C":"ours","D":"us","answer":"B","answer_word":"its","explanation":"空所後に名詞 acquisition があるため所有格が必要。Sunflower Media を受ける所有格 its が正解。"},{"id":513,"category":"代名詞問題・実戦問題","qnum":11,"question":"The furniture they bought was too heavy for Mr. Baker and Ms. Roberts to move by -------.","A":"their","B":"theirs","C":"themselves","D":"their own","answer":"C","answer_word":"themselves","explanation":"by oneself（自分たちだけで）の形。Mr. Baker and Ms. Roberts を受ける再帰代名詞 themselves が正解。"},{"id":514,"category":"代名詞問題・実戦問題","qnum":12,"question":"Ms. Gao requested that the department staff send ------- the final draft of the sales report before submitting it to management.","A":"she","B":"her","C":"hers","D":"herself","answer":"B","answer_word":"her","explanation":"send 人 物 の形で、空所には間接目的語が入る。Ms. Gao を受ける目的格 her が正解。"},{"id":515,"category":"代名詞問題・実戦問題","qnum":13,"question":"Before Lucia Gomez and Daniel White moved to their offices on the first floor, both of ------- had been working on the second floor.","A":"they","B":"their","C":"them","D":"theirs","answer":"C","answer_word":"them","explanation":"both of の後には目的格代名詞が入る。Lucia Gomez and Daniel White を受ける them が正解。"},{"id":516,"category":"代名詞問題・実戦問題","qnum":14,"question":"Ms. Smith's decision to resign in advance of her contract expiration next summer was ------- own rather than a request from the CEO.","A":"she","B":"her","C":"hers","D":"herself","answer":"B","answer_word":"her","explanation":"own の前には所有格を置き、her own decision（彼女自身の決定）と考える。"},{"id":517,"category":"代名詞問題・実戦問題","qnum":15,"question":"The CEO, Mr. Wozniak has shown ------- to have a polished manner, confidence as a speaker, and the ability to make a deep impression on audiences.","A":"he","B":"his","C":"him","D":"himself","answer":"D","answer_word":"himself","explanation":"show oneself to be/do の形で「自らを〜であると示す」。主語を受ける再帰代名詞 himself が正解。"},{"id":518,"category":"代名詞問題・実戦問題","qnum":16,"question":"Working for a publisher in Mumbai and later for ------- company, Tiger Books, Mr. Singh translated scores of major Indian novels into English.","A":"he","B":"him","C":"himself","D":"his own","answer":"D","answer_word":"his own","explanation":"空所後の company を修飾し、「彼自身の会社」を表す his own が正解。"},{"id":519,"category":"代名詞問題・実戦問題","qnum":17,"question":"Given ------- many years of experience in customer service, Ms. Mori is well qualified for the position.","A":"she","B":"her","C":"hers","D":"herself","answer":"B","answer_word":"her","explanation":"many years of experience を修飾する所有格が必要。Ms. Mori を受ける her が正解。"},{"id":520,"category":"代名詞問題・実戦問題","qnum":18,"question":"Richard Martinez spent over 20 years in the food service industry before deciding to open a restaurant on -------.","A":"he","B":"him","C":"himself","D":"his own","answer":"D","answer_word":"his own","explanation":"on one’s own（独力で、自分で）の慣用表現。Richard Martinez を受ける his own が正解。"},{"id":521,"category":"代名詞問題・実戦問題","qnum":19,"question":"International companies such as ------- often need to hire financial specialists because of the different regulations that exist in various countries.","A":"our","B":"itself","C":"ours","D":"we","answer":"C","answer_word":"ours","explanation":"such as の後に「私たちの会社のようなもの」を表す所有代名詞 ours が入る。our は名詞を伴う所有格なので単独では使えない。"},{"id":522,"category":"代名詞問題・実戦問題","qnum":20,"question":"The printing company provides a design service for catalogs and brochures that clients cannot fully develop -------.","A":"they","B":"their","C":"them","D":"themselves","answer":"D","answer_word":"themselves","explanation":"clients が自分たちだけでは十分に作れない、という意味。主語 clients を受ける再帰代名詞 themselves が正解。"},{"id":523,"category":"代名詞問題・実戦問題","qnum":21,"question":"For ------- interested in flower arrangement, Maya Li will be providing an introductory course in the first week of May.","A":"they","B":"their","C":"them","D":"those","answer":"D","answer_word":"those","explanation":"those interested in ... で「〜に興味がある人々」。空所後の分詞句に修飾される代名詞 those が自然。"},{"id":524,"category":"代名詞問題・実戦問題","qnum":22,"question":"The new low-cost projectors allow purchasers to enjoy movies on a big screen in the comfort of ------- homes.","A":"they","B":"their own","C":"them","D":"it","answer":"B","answer_word":"their own","explanation":"homes を修飾する所有格が必要で、「購入者自身の家で」を表す their own homes が正解。"},{"id":525,"category":"代名詞問題・実戦問題","qnum":23,"question":"You can purchase used pianos at a fraction of ------- retail value by attending a musical instrument auction in Whitehaven this weekend.","A":"its","B":"my","C":"their","D":"our","answer":"C","answer_word":"their","explanation":"used pianos の小売価格を指すため、複数名詞に対応する所有格 their が正解。"},{"id":526,"category":"代名詞問題・実戦問題","qnum":24,"question":"The new home improvement app has a free demo version so that you can gauge its value for ------- before purchasing the full package.","A":"you","B":"your","C":"yours","D":"yourself","answer":"D","answer_word":"yourself","explanation":"for yourself で「自分で、自分自身で」の意味。購入前に自分で価値を判断できる、という文意に合う。"},{"id":527,"category":"代名詞問題・実戦問題","qnum":25,"question":"In the survey, participants were asked which of the three fruit drinks ------- would like to buy.","A":"they","B":"their","C":"them","D":"themselves","answer":"A","answer_word":"they","explanation":"which 節の中で would like の主語が必要。participants を受ける主格 they が正解。"},{"id":528,"category":"代名詞問題・実戦問題","qnum":26,"question":"------- of the exhibits at the aquarium include fish commonly found along rocky Hawaiian shorelines.","A":"One","B":"Theirs","C":"Some","D":"They","answer":"C","answer_word":"Some","explanation":"of the exhibits の前に入り、複数扱いで include と一致するのは Some。One なら動詞は includes になる。"},{"id":529,"category":"代名詞問題・実戦問題","qnum":27,"question":"If you have not received an ID badge, please obtain ------- from the personnel department.","A":"one","B":"each","C":"any","D":"either","answer":"A","answer_word":"one","explanation":"前に出た an ID badge を受けて「1つ」を表す代名詞 one が正解。"},{"id":530,"category":"代名詞問題・実戦問題","qnum":28,"question":"Purchase two of Eric Schneider's popular rock 'n' roll CDs and get ------- free of charge.","A":"each other","B":"another","C":"other","D":"one another","answer":"B","answer_word":"another","explanation":"「さらにもう1枚無料で」を表す another が正解。each other / one another は相互代名詞。"},{"id":531,"category":"代名詞問題・実戦問題","qnum":29,"question":"It was a point of contention that Mr. Cox's research results were different from ------- of his colleagues.","A":"those","B":"it","C":"them","D":"theirs","answer":"A","answer_word":"those","explanation":"Mr. Cox の research results と同種の複数名詞 results を指すため those が正解。"},{"id":532,"category":"代名詞問題・実戦問題","qnum":30,"question":"------- of the customers at Philips Grill have complimented the chef for his professionalism and the wonderful gourmet experience provided.","A":"Whomever","B":"Several","C":"Someone","D":"Everybody","answer":"B","answer_word":"Several","explanation":"述語が have complimented なので複数扱いの主語が必要。Several of the customers が正解。"},{"id":533,"category":"前置詞問題・実戦問題","qnum":1,"question":"The Tokyo Eye is one of the newest landmarks in the capital, and is already ------- the most popular tourist destinations.","A":"from","B":"into","C":"among","D":"throughout","answer":"C","answer_word":"among","explanation":"among the most popular ... で「最も人気のある〜の中に入っている」という意味。"},{"id":534,"category":"前置詞問題・実戦問題","qnum":2,"question":"Just six months ------- a career with Cooper Advertising, Mr. Harlan was offered the branch manager position.","A":"into","B":"throughout","C":"since","D":"over","answer":"A","answer_word":"into","explanation":"期間 + into a career で「キャリアに入って〜後」の意味。ここでは「入社6か月で」となる。"},{"id":535,"category":"前置詞問題・実戦問題","qnum":3,"question":"On the day of the audition, entrants need to arrive at the Northern Star Playhouse ------- 7:00 A.M.","A":"early","B":"ahead","C":"before","D":"prior","answer":"C","answer_word":"before","explanation":"時刻 7:00 A.M. の前を表す前置詞 before が正解。prior は通常 prior to の形で使う。"},{"id":536,"category":"前置詞問題・実戦問題","qnum":4,"question":"Over one hundred guests have been invited to the Royal Hotel ------- the reception after the medical conference next week.","A":"on","B":"from","C":"for","D":"across","answer":"C","answer_word":"for","explanation":"目的を表す前置詞 for。reception に出席するために招待された、という意味。"},{"id":537,"category":"前置詞問題・実戦問題","qnum":5,"question":"Because it is a growing company, with sales topping $1 billion last year, Bruno Building always has a construction project ------- progress.","A":"on","B":"from","C":"during","D":"in","answer":"D","answer_word":"in","explanation":"in progress で「進行中で」という定型表現。"},{"id":538,"category":"前置詞問題・実戦問題","qnum":6,"question":"The National Business Travel Association expects corporate car rental rates to increase ------- two percent this year.","A":"in","B":"by","C":"on","D":"with","answer":"B","answer_word":"by","explanation":"差・変化の幅を表す by。increase by two percent で「2%上昇する」。"},{"id":539,"category":"前置詞問題・実戦問題","qnum":7,"question":"E-Marketing Solutions is offering a two-week program for people who want to learn more ------- digital marketing.","A":"near","B":"about","C":"beyond","D":"among","answer":"B","answer_word":"about","explanation":"learn about X で「Xについて学ぶ」という表現。"},{"id":540,"category":"前置詞問題・実戦問題","qnum":8,"question":"At today's press conference, the CEO declined to comment ------- the possibility of a merger.","A":"to","B":"on","C":"from","D":"at","answer":"B","answer_word":"on","explanation":"comment on X で「Xについてコメントする」。"},{"id":541,"category":"前置詞問題・実戦問題","qnum":9,"question":"The popular online service is gaining new subscribers ------- the rate of about one million every two months.","A":"from","B":"on","C":"into","D":"at","answer":"D","answer_word":"at","explanation":"at the rate of X で「Xの割合・速度で」。"},{"id":542,"category":"前置詞問題・実戦問題","qnum":10,"question":"All contract documents should be sent to our legal office ------- priority mail.","A":"to","B":"by","C":"against","D":"outside","answer":"B","answer_word":"by","explanation":"手段を表す by。by priority mail で「優先郵便で」。"},{"id":543,"category":"前置詞問題・実戦問題","qnum":11,"question":"Beaver Creek Resource Management is looking to hire three student interns ------- the summer to work on the Brett Gray Ranch in Colorado.","A":"for","B":"at","C":"to","D":"as","answer":"A","answer_word":"for","explanation":"期間を表す for。for the summer で「夏の間」。"},{"id":544,"category":"前置詞問題・実戦問題","qnum":12,"question":"Due to the forecast of rain, the concert will be held in Joe Louis Arena ------- the outdoor stage at Comerica Park.","A":"rather","B":"despite","C":"instead of","D":"aside from","answer":"C","answer_word":"instead of","explanation":"本来の屋外ステージではなく、別の場所で開催されるため instead of（〜の代わりに）が正解。"},{"id":545,"category":"前置詞問題・実戦問題","qnum":13,"question":"There is an extensive library of books on marketing and sales in the office which can be borrowed ------- a monthly basis.","A":"at","B":"in","C":"on","D":"with","answer":"C","answer_word":"on","explanation":"on a monthly basis で「月単位で、毎月」の定型表現。"},{"id":546,"category":"前置詞問題・実戦問題","qnum":14,"question":"As a token of appreciation ------- her 20 years of hard work, Mary Wilson was given a gold watch as a parting gift.","A":"into","B":"from","C":"above","D":"for","answer":"D","answer_word":"for","explanation":"appreciation for X で「Xに対する感謝」。"},{"id":547,"category":"前置詞問題・実戦問題","qnum":15,"question":"Miles Smith used a projector set up ------- the conference room to deliver his report on the company's sales performance.","A":"on","B":"to","C":"in","D":"for","answer":"C","answer_word":"in","explanation":"場所を表す in。in the conference room で「会議室で」。"},{"id":548,"category":"前置詞問題・実戦問題","qnum":16,"question":"------- a typical Saturday night, the restaurant serves as many as 800 patrons between the hours of 6 P.M. and 10 P.M.","A":"At","B":"On","C":"In","D":"Over","answer":"B","answer_word":"On","explanation":"特定の曜日・夜を表す場合は on。on a typical Saturday night が正解。"},{"id":549,"category":"前置詞問題・実戦問題","qnum":17,"question":"A snowstorm in New York caused flight delays that prevented Ms. Jimenez ------- arriving until yesterday.","A":"from","B":"on","C":"into","D":"at","answer":"A","answer_word":"from","explanation":"prevent X from doing で「Xが〜するのを妨げる」。"},{"id":550,"category":"前置詞問題・実戦問題","qnum":18,"question":"In addition to signing up for our free daily newsletter, be sure to visit our TechInfo blog for updates ------- the day.","A":"throughout","B":"over","C":"at","D":"within","answer":"A","answer_word":"throughout","explanation":"throughout the day で「一日を通して」。"},{"id":551,"category":"前置詞問題・実戦問題","qnum":19,"question":"The real-estate developer has decided to construct a large shopping mall ------- the city museum.","A":"throughout","B":"near","C":"into","D":"upon","answer":"B","answer_word":"near","explanation":"場所の近接を表す near。city museum の近くに建設するという意味。"},{"id":552,"category":"前置詞問題・実戦問題","qnum":20,"question":"Advance Telecommunications announced that the cause of yesterday's network disruption is still ------- investigation.","A":"over","B":"wi ,"A":"final","B":"finally","C":"finalizing","D":"finals","answer":"B","answer_word":"finally","explanation":"be ready の形容詞 ready を修飾する副詞が必要。finally「ついに」が正解。"},{"id":811,"category":"文法模試セット10","qnum":9,"question":"Please forward any ------- additions to the agenda by noon on Monday before the meeting.","A":"suggest","B":"suggests","C":"suggested","D":"suggestions","answer":"C","answer_word":"suggested","explanation":"additions を前から修飾する過去分詞が必要。「提案された追加事項」となる suggested が正解。"},{"id":812,"category":"文法模試セット10","qnum":10,"question":"Items in the canned food section should be stacked with ------- to avoid any damage from accidental bumps and scrapes.","A":"care","B":"careful","C":"carefully","D":"cared","answer":"A","answer_word":"care","explanation":"with の目的語になる名詞が必要。with care で「注意して、丁寧に」の意味。"},{"id":813,"category":"文法模試セット10","qnum":11,"question":"Mr. Park will be posted to the customer service department ------- he has been trained for three weeks under Ms. Williams.","A":"after","B":"while","C":"then","D":"that","answer":"A","answer_word":"after","explanation":"配属される時点が、研修を終えた後であることを示す接続詞 after が正解。"},{"id":814,"category":"文法模試セット10","qnum":12,"question":"Barriers have been placed at certain points around the building to restrict people ------- entering areas under construction.","A":"of","B":"out","C":"from","D":"than","answer":"C","answer_word":"from","explanation":"restrict A from doing で「Aが〜するのを制限する」という表現。from が正解。"},{"id":815,"category":"文法模試セット10","qnum":13,"question":"Factory supervisors are responsible for ------- that all employees are updated on safety regulations.","A":"ensure","B":"ensuring","C":"ensures","D":"ensured","answer":"B","answer_word":"ensuring","explanation":"be responsible for doing で「〜する責任がある」。前置詞 for の後なので動名詞 ensuring が正解。"},{"id":816,"category":"文法模試セット10","qnum":14,"question":"The cap on the gas tank should be ------- tightened before starting the engine.","A":"firm","B":"firmer","C":"firmness","D":"firmly","answer":"D","answer_word":"firmly","explanation":"be tightened の動詞部分を修飾する副詞が必要。firmly「しっかりと」が正解。"},{"id":817,"category":"文法模試セット10","qnum":15,"question":"While Sophia Gonzalez’s promotion to the director position took place a month ago, her previous position is ------- to be filled.","A":"even","B":"recent","C":"like","D":"yet","answer":"D","answer_word":"yet","explanation":"be yet to do で「まだ〜していない」という表現。空所には副詞 yet が入る。"},{"id":818,"category":"文法模試セット10","qnum":16,"question":"The administrative assistant was required by her supervisor to restock the shelves with office -------.","A":"supply","B":"supplied","C":"supplier","D":"supplies","answer":"D","answer_word":"supplies","explanation":"office supplies で「事務用品」という複合名詞。用品は通常複数形で supplies が正解。"},{"id":819,"category":"文法模試セット10","qnum":17,"question":"Joe Oliver, the British celebrity chef, has made it his mission in recent years to break people’s ------- on fast food.","A":"dependent","B":"depends","C":"dependence","D":"dependently","answer":"C","answer_word":"dependence","explanation":"people’s の後には名詞が必要。dependence on X で「Xへの依存」を表すため dependence が正解。"},{"id":820,"category":"文法模試セット10","qnum":18,"question":"Participants will receive copies of all materials used ------- the workshop sessions and will be encouraged to use them at their workplaces.","A":"during","B":"while","C":"when","D":"once","answer":"A","answer_word":"during","explanation":"the workshop sessions は名詞句なので、前置詞 during「〜の間に」で used を修飾する。"},{"id":821,"category":"文法模試セット10","qnum":19,"question":"Senior sales representatives can obtain ------- access to their team’s sales figures using one of the computers in the administration office.","A":"secure","B":"securely","C":"secures","D":"securing","answer":"A","answer_word":"secure","explanation":"access を前から修飾する形容詞が必要。secure access で「安全なアクセス権」の意味。"},{"id":822,"category":"文法模試セット10","qnum":20,"question":"The company director ------- that she would be out of town when the decision was made about the location of the new offices.","A":"assured","B ,"explanation":"either X or Y「XかYのどちらか」の表現。either と対応する接続詞は or。"},{"id":835,"category":"文法模試セット11","qnum":3,"question":"A spokesperson for City Metro Radio said it planned to run a Sunday schedule on national holidays, ------- its regular weekday service.","A":"provided that","B":"in the event of","C":"instead of","D":"as much as","answer":"C","answer_word":"instead of","explanation":"後ろの名詞句 its regular weekday service をつなぎ、「通常の平日サービスの代わりに」の意味になる instead of が正解。"},{"id":836,"category":"文法模試セット11","qnum":4,"question":"The detailed terms and conditions of your employment are set forth in the ------- employment agreement.","A":"enclose","B":"enclosed","C":"enclosing","D":"encloses","answer":"B","answer_word":"enclosed","explanation":"後ろの名詞 employment agreement を修飾し、「同封された雇用契約書」とする過去分詞 enclosed が正解。"},{"id":837,"category":"文法模試セット11","qnum":5,"question":"The CEO said a suburban location would be more convenient and less expensive ------- the current corporate headquarters in downtown New York.","A":"than","B":"and","C":"but","D":"while","answer":"A","answer_word":"than","explanation":"more convenient and less expensive と比較級があるため、比較対象を示す than が入る。"},{"id":838,"category":"文法模試セット11","qnum":6,"question":"Meridian Town was already participating in Bigmart’s same-day ------- program, which began in select markets last fall.","A":"deliver","B":"delivered","C":"delivers","D":"delivery","answer":"D","answer_word":"delivery","explanation":"same-day delivery program「即日配送プログラム」という複合名詞にするため、名詞 delivery が正解。"},{"id":839,"category":"文法模試セット11","qnum":7,"question":"The Drover’s Bookshop carries a large ------- of books signed by their authors, in addition to rare first editions and hard-to-find books.","A":"stock","B":"stocks","C":"stocked","D":"stocking","answer":"A","answer_word":"stock","explanation":"a large stock of books で「大量の蔵書・在庫」の意味。不定冠詞 a に続く単数名詞 stock が正解。"},{"id":840,"category":"文法模試セット11","qnum":8,"question":"Tourist information and brochures can be found ------- the fron
