ause of the ______ of the rooms and its convenient ocation.","A":"clean","B":"cleanly","C":"cleanliness","D":"cleans","answer":"C","answer_word":"cleanliness","explanation":"前置詞) の空所に入るのは名詞なので、選択肢から、名詞の語尾 -ness の付い た (C) cleanliness (清潔さ) を選ぶ。(A) は形容詞 「きれいな」 か、動詞 「-つをきれいにする」、 または副詞「すっかり」。(B) 「きれいに」 は副詞。(D) は動詞の三人称単数現在形。 訳：調査を受けたビジネス旅行者の多くは、部屋の清潔さと立地のよさから、Starlight ホテルを高く評 価した。 | 」rate : O~=M MTS"},{"id":118,"category":"品詞問題・実戦問題 基本編","qnum":86,"question":"Venture capital firms are considering contests that offer i) competing entrepreneurs multimillion-dollar prizes if they come up with ______ technologies.","A":"innovate","B":"innovative","C":"innovates","D":"innovatively","answer":"B","answer_word":"innovative","explanation":"前置詞 ------- Bi) の空所に入るのは、直後の名詞 technologies (技術) を修飾する形容 詞の(B) innovative(革新的な)。 (A)「-を革新する」は動詞。 (C) はその三人称単数現在形。 (D) 第 「革新的に」 は副詞。 派生語として名詞の innovation (革新) も押さえよう。 訳：ベンチャー投資企業は、競い合う起業家たちに、革新的な技術を考え出せば数百万ドルの賞金を与 章 えるコンテストを検討している。 competing: @RAFS [| ]entrepreneur : @起業家 come up with X : X を思いつく"},{"id":119,"category":"品詞問題・実戦問題 基本編","qnum":87,"question":"The company’s recent rise in ______ can be attributed to the managerial acumen of the newly appointed CEO, Leonie Wagner.","A":"profitability","B":"profitable","C":"profited","D":"to profit","answer":"A","answer_word":"profitability","explanation":"文頭から空所までが主語になるカタマリで、空所には、直前の前置詞 in の目的語が必要。 目的語になるのは名詞なので、名詞の語尾 -ty が付いた (A) profitability (利益性) を選ぶ。 (B) 「利益になる」 は形容詞。(C) は動詞 profit (に利益を与える) の過去形・過去分詞。 (D) は不定詞。 訳：その企業の最近の利益性の向上は、新しく最高経営責任者に任命された Leonie Wagner の経営判断 力によるものだと考えられる。 (Jattribute Xto Y : OX は Y に起因すると考える [managerial : P@FZLO [| acumen : 洞察力、判断カ"},{"id":120,"category":"品詞問題・実戦問題 基本編","qnum":88,"question":"Smile Fitness Center, an exclusive fitness club in Seoul, is ______ seeking full-time personal trainers.","A":"urgent","B":"most urgent","C":"urgency","D":"urgently","answer":"D","answer_word":"urgently","explanation":"空所を除いても現在進行形の文が成立しているので、空所に入るのは修飾語。前後の動詞 部分 iS seeking (〜を求めている) を修飾するのは副詞の (D) urgently (Alc). (A) 「想 急の」 は形容詞。(B) はその最上級。(C) 「緊急性」 は名詞。 be 動詞と分詞の間は副詞が入る 頻出パターンの 1 つ。 訳：ソウルの高級フィットネスクラブ、Smile Fitness Center は常勤の個人トレーナーを急募している。"},{"id":121,"category":"品詞問題・実戦問題 基本編","qnum":89,"question":"______ of your order will be sent within 24 hours to the e-mail address you have provided.","A":"Confirmation","B":"Confirms","C":"Confirmed","D":"Confirming","answer":"A","answer_word":"Confirmation","explanation":"空所には文の主語が必要なので、名詞の (A) Confirmation (確認) が正解。(B) は動詞 confirm(一を確認する)の三人称単数現在形。(C) はその過去形・過去分詞。 (D) は現在分詞・ 動名詞。 動名詞は主語になり得るが、Confirming your order is .のように目的語が必要。 訳：ご注文の確認は、お知らせいただいたメールアドレスに、24 時間以内にお送りします。"},{"id":122,"category":"品詞問題・実戦問題 基本編","qnum":90,"question":"Smokey Joe’s café has three ______ in Tokyo, including one recently opened in Aoyama.","A":"locate","B":"locates","C":"located","D":"locations","answer":"D","answer_word":"locations","explanation":"「S は東京に 3 つの ______ を持っている」と考えると、述語動詞 has の目的語が欠けている。目的語になるのは名詞なので、名詞の語尾 -tion の付いた (D) locations（店舗）が正解。(A) locate は動詞、(B) locates は三人称単数現在形、(C) located は形容詞または過去分詞。訳：Smokey Joe’s café は、最近青山にオープンしたものを含め、東京に 3 店舗ある。"},{"id":123,"category":"品詞問題・実戦問題 基本編","qnum":91,"question":"During the probationary period, all newly hired engineers of Thunder Engineering work very ______ with their supervisors.","A":"close","B":"closely","C":"closer","D":"closest","answer":"B","answer_word":"closely","explanation":"述語動詞 work を修飾する副詞が空所に必要なので、(B) closely（密接に）が正解。副詞 very は closely を修飾する。(A) close にも副詞用法はあるが、I work close to home. のように「近くで」の意味で使う。(C) は比較級、(D) は最上級。訳：試用期間中、Thunder Engineering に新しく採用されたすべての技術者は、上司と密に仕事をする。"},{"id":124,"category":"品詞問題・実戦問題 基本編","qnum":92,"question":"The company’s annual strategy meeting was held at the headquarters on Tuesday to discuss steps to enhance ______ among the different departments.","A":"cooperate","B":"cooperated","C":"cooperative","D":"cooperation","answer":"D","answer_word":"cooperation","explanation":"直前の他動詞 enhance（〜を高める）の目的語が欠けている。目的語になるのは名詞なので、(D) cooperation（連携）が正解。(A) cooperate は動詞、(B) cooperated は過去形・過去分詞、(C) cooperative は形容詞または名詞だが文意に合わない。訳：異なる部門の連携を強化する手段について話し合うため、火曜日に会社の年次戦略会議が本社で開かれた。"},{"id":125,"category":"品詞問題・実戦問題 基本編","qnum":93,"question":"The strategic partnership agreement with a leading Canadian business publisher will enable Bear Publishing to reach a ______ group of readers.","A":"diverse","B":"diversity","C":"diversely","D":"diversify","answer":"A","answer_word":"diverse","explanation":"空所前が冠詞、後ろが名詞なので、名詞を修飾する形容詞の (A) diverse（多様な）が正解。副詞の (C) diversely から -ly を取ったものが形容詞なので、つづりからも品詞を判断できる。(B) diversity は名詞、(D) diversify は動詞。訳：カナダの一流ビジネス出版社との戦略的パートナーシップ契約により、Bear Publishing は多様な読者層に認知されるようになるだろう。"},{"id":126,"category":"品詞問題・実戦問題 基本編","qnum":94,"question":"Situated in the center of Budapest, Royal Sky Hotel is easily ______ to business travelers using public transport.","A":"access","B":"accesses","C":"accessible","D":"accessibility","answer":"C","answer_word":"accessible","explanation":"be 動詞 + 副詞の後ろには補語となる形容詞が必要なので、形容詞の語尾 -ble が付いた (C) accessible（アクセスできる）が正解。(A) access は名詞または動詞、(B) accesses は三人称単数現在形、(D) accessibility は名詞。訳：Royal Sky Hotel はブダペストの中心部に位置しており、公共交通機関を利用するビジネス客にとってアクセスしやすい。"},{"id":127,"category":"品詞問題・実戦問題 基本編","qnum":95,"question":"Please show ______ for other guests by refraining from conversing during the performance.","A":"consider","B":"considerate","C":"consideration","D":"considerably","answer":"C","answer_word":"consideration","explanation":"述語動詞 show の目的語となる名詞が必要なので、(C) consideration（配慮）が正解。(A) consider は動詞、(B) considerate は形容詞、(D) considerably は副詞。show consideration for ... で「...に配慮を示す」。訳：演奏中の会話を控え、ほかの来場者への配慮を示してください。"},{"id":128,"category":"品詞問題・実戦問題 基本編","qnum":96,"question":"Ms. Carter’s presentation included a ______ explanation of the hiring practices leading companies use to find suitable candidates.","A":"length","B":"lengthy","C":"lengthily","D":"lengthen","answer":"B","answer_word":"lengthy","explanation":"空所に入るのは、直後の名詞 explanation（説明）を修飾する形容詞なので、(B) lengthy（長い）が正解。(A) length は名詞、(C) lengthily は副詞、(D) lengthen は動詞。語尾 -th は名詞、-ly は副詞、-en は動詞の手がかりになる。訳：Carter さんのプレゼンテーションには、一流企業が適した候補者を探すのに使う採用方法についての長い説明が盛り込まれていた。"},{"id":129,"category":"品詞問題・実戦問題 基本編","qnum":97,"question":"Sales figures from the Shinjuku, Shibuya, and Yokohama stores showed a ______ rise in the volume of winter clothing sold during September and October.","A":"notice","B":"noticing","C":"noticeable","D":"noticeably","answer":"C","answer_word":"noticeable","explanation":"空所に入るのは、直後の名詞 rise（上昇）を修飾する形容詞なので、(C) noticeable（著しい）が正解。(A) notice は動詞または名詞、(B) noticing は現在分詞・動名詞、(D) noticeably は副詞。訳：新宿、渋谷、横浜店の売上高は、9 月と 10 月の冬物衣料の販売量が著しく増加したことを示した。"},{"id":130,"category":"品詞問題・実戦問題 基本編","qnum":98,"question":"Mr. Ali ______ threw away the copies of his itinerary for his trip to Mumbai, so he had to have new ones printed.","A":"mistake","B":"mistakenly","C":"mistakes","D":"mistook","answer":"B","answer_word":"mistakenly","explanation":"空所に入るのは、直後の述語動詞 threw away (捨てた) を修飾する副詞の (B) mistakenly (誤って)。(A) は名詞 「誤り」か、動詞 「を誤解する」。(C) は名詞の複数形か動詞の三人称単数現在形。(D) は動詞の過去形。 訳：Ali さんは、ムンバイ旅行の旅程表を誤って捨ててしまったので、新しいものを印刷してもらわなけ ればならなかった。 (Jitinerary : 人@旅行計画、旅程 GR)"},{"id":131,"category":"品詞問題・実戦問題 基本編","qnum":99,"question":"Repairs on Highway 12 are likely to cause ______ in the delivery of supplies to local restaurants.","A":"delays","B":"delayed","C":"to delay","D":"be delayed","answer":"A","answer_word":"delays","explanation":"空所前の他動詞 cause (〜を引き起こす) の目的語が空所に必要。目的語になるのは名詞な ので、選択肢から複数形の名詞 (A) delays (遅れ) を選ぶ。delay は 「〜を遅らせる」 の意味 の動詞でも頻出。(B) は動詞の過去形・過去分詞。(C) は不定詞。(D) lS (be 動詞+ 過去分詞〉 の受動態の形。 訳：幹線道路 12 号線の修復工事は、地域のレストランへの物資配送の遅れを引き起こす可能性がある。"},{"id":132,"category":"品詞問題・実戦問題 基本編","qnum":100,"question":"The ______ in the produce section of the Freshone Supermarket will feature exotic fruit from Australia.","A":"display","B":"displaying","C":"displayed","D":"displayable","answer":"A","answer_word":"display","explanation":"空所に入るのは名詞なので、(A) display (展示) が正解。(B) は動詞 display (〜を展示する) の現在分詞か動名詞。動名詞は displaying fruit のように目的語を 伴う。(C) は動詞の過去形・過去分詞。(D) 「表示可能な」 は形容詞。 訳：Freshone スーパーの青果コーナーの陳列は、オーストラリア産の珍しい果物を特徴としている。 [| produce : 人@農産物、青果物"},{"id":133,"category":"品詞問題・実戦問題 応用編","qnum":1,"question":"The company picnic will be held on a beach, but the weather ______ is predicting heavy rain.","A":"forecast","B":"forecasts","C":"will forecast","D":"to forecast","answer":"A","answer_word":"forecast","explanation":"空所には述語動詞 is の主語になる単数名詞が必要。weather forecast（天気予報）という複合名詞になる。したがって、(A) forecast が正解。"},{"id":134,"category":"品詞問題・実戦問題 応用編","qnum":2,"question":"The board conducted a second round of ______ with the four selected candidates for the position on Tuesday.","A":"interview","B":"interviews","C":"interviewed","D":"interviewer","answer":"B","answer_word":"interviews","explanation":"a second round of の後には名詞が必要で、「複数回の面接」という意味になるため複数名詞が合う。したがって、(B) interviews が正解。"},{"id":135,"category":"品詞問題・実戦問題 応用編","qnum":3,"question":"More than half of the respondents said television was more ______ than any other form of advertising.","A":"memory","B":"memorize","C":"memorable","D":"memorably","answer":"C","answer_word":"memorable","explanation":"be 動詞 was の補語として、more とともに比較級表現を作る形容詞が必要。したがって、(C) memorable が正解。"},{"id":136,"category":"品詞問題・実戦問題 応用編","qnum":4,"question":"All students who wish to be considered for financial aid for the fall semester should file their ______ by May 30.","A":"applications","B":"applicants","C":"applicability","D":"applies","answer":"A","answer_word":"applications","explanation":"所有格 their の後には名詞が必要で、file（提出する）の目的語として「申請書」が自然。したがって、(A) applications が正解。"},{"id":137,"category":"品詞問題・実戦問題 応用編","qnum":5,"question":"Texas Carbide is looking for three marketing professionals who have work experience in the textile ______.","A":"industry","B":"industrialize","C":"industrial","D":"industrialist","answer":"A","answer_word":"industry","explanation":"textile industry（繊維産業）という複合名詞を作る名詞が必要。したがって、(A) industry が正解。"},{"id":138,"category":"品詞問題・実戦問題 応用編","qnum":6,"question":"The company performed well this year and ______ surpassed last year's profits.","A":"neared","B":"nearly","C":"nearest","D":"nearness","answer":"B","answer_word":"nearly","explanation":"動詞 surpassed を修飾する副詞が必要。したがって、(B) nearly が正解。"},{"id":139,"category":"品詞問題・実戦問題 応用編","qnum":7,"question":"After the six-month probationary period, new employees may be eligible for an ______ in salary.","A":"increase","B":"increasing","C":"increasingly","D":"increased","answer":"A","answer_word":"increase","explanation":"冠詞 an の後に置かれ、in salary とつながる名詞が必要。したがって、(A) increase が正解。"},{"id":140,"category":"品詞問題・実戦問題 応用編","qnum":8,"question":"It took several days for the managers to decide on which applicant was the most ______ for the position.","A":"qualify","B":"qualified","C":"qualification","D":"qualifies","answer":"B","answer_word":"qualified","explanation":"be 動詞 was の補語として、the most とともに最上級表現を作る形容詞が必要。したがって、(B) qualified が正解。"},{"id":141,"category":"品詞問題・実戦問題 応用編","qnum":9,"question":"In December, toy stores usually receive lots of shipments and prices remain ______ until after the holidays.","A":"compete","B":"competitive","C":"competitively","D":"competition","answer":"B","answer_word":"competitive","explanation":"remain は補語を伴う動詞なので、prices を説明する形容詞が必要。したがって、(B) competitive が正解。"},{"id":142,"category":"品詞問題・実戦問題 応用編","qnum":10,"question":"Because of its cool climate, the eastern region of Hokkaido is ______ for dairy farming.","A":"ideal","B":"idea","C":"ideally","D":"idealistic","answer":"A","answer_word":"ideal","explanation":"be 動詞 is の補語として形容詞が必要。ideal for ... で「〜に理想的な」。したがって、(A) ideal が正解。"},{"id":143,"category":"品詞問題・実戦問題 応用編","qnum":11,"question":"Seth Greene agreed to undertake the ______ task of redesigning the mining equipment.","A":"challenge","B":"challenges","C":"challenged","D":"challenging","answer":"D","answer_word":"challenging","explanation":"task を修飾する形容詞が必要で、「やりがいのある仕事」という意味になる。したがって、(D) challenging が正解。"},{"id":144,"category":"品詞問題・実戦問題 応用編","qnum":12,"question":"Mr. Song was recently awarded a prestigious research grant, which should come as no surprise to anyone ______ with his work.","A":"familiar","B":"familiarize","C":"familiarizing","D":"familiarity","answer":"A","answer_word":"familiar","explanation":"anyone を後ろから説明する形容詞句 familiar with ... が必要。したがって、(A) familiar が正解。"},{"id":145,"category":"品詞問題・実戦問題 応用編","qnum":13,"question":"A week has been set aside in February for new and current staff to undergo employee ______.","A":"train","B":"trainer","C":"trainable","D":"training","answer":"D","answer_word":"training","explanation":"undergo の目的語として名詞が必要。employee training で「従業員研修」。したがって、(D) training が正解。"},{"id":146,"category":"品詞問題・実戦問題 応用編","qnum":14,"question":"Members of the finance ______ have been in deliberations since 10 A.M., discussing the proposed budget cuts.","A":"committed","B":"committing","C":"commitment","D":"committee","answer":"D","answer_word":"committee","explanation":"finance committee（財政委員会）という複合名詞を作る名詞が必要。したがって、(D) committee が正解。"},{"id":147,"category":"品詞問題・実戦問題 応用編","qnum":15,"question":"Fujiyama Restaurant offers a variety of dishes made from fresh seasonal and ______ grown vegetables.","A":"local","B":"locally","C":"locality","D":"localize","answer":"B","answer_word":"locally","explanation":"grown を修飾して「地元で栽培された」とする副詞が必要。したがって、(B) locally が正解。"},{"id":148,"category":"品詞問題・実戦問題 応用編","qnum":16,"question":"The tables at the banquet were prepared in a style that was ______ yet elegant.","A":"simple","B":"simply","C":"simplify","D":"simplification","answer":"A","answer_word":"simple","explanation":"was の補語として、yet elegant と並列になる形容詞が必要。したがって、(A) simple が正解。"},{"id":149,"category":"品詞問題・実戦問題 応用編","qnum":17,"question":"Conference organizers made arrangements for all ______ guests to be presented with an information package.","A":"arrive","B":"arrives","C":"arrival","D":"arriving","answer":"D","answer_word":"arriving","explanation":"guests を修飾して「到着する客」を表す現在分詞が必要。したがって、(D) arriving が正解。"},{"id":150,"category":"品詞問題・実戦問題 応用編","qnum":18,"question":"The number of orders for the month of May was estimated extremely ______ resulting in a substantial reduction in waste.","A":"accurate","B":"accurately","C":"accuracy","D":"accuracies","answer":"B","answer_word":"accurately","explanation":"estimated を修飾する副詞が必要。したがって、(B) accurately が正解。"},{"id":151,"category":"品詞問題・実戦問題 応用編","qnum":19,"question":"The store display attracted a lot of attention from customers with its ______ colored packages and entertaining animated mannequins.","A":"brighten","B":"brightly","C":"brightened","D":"brightness","answer":"B","answer_word":"brightly","explanation":"colored を修飾して「明るく色づけされた」とする副詞が必要。したがって、(B) brightly が正解。"},{"id":152,"category":"品詞問題・実戦問題 応用編","qnum":20,"question":"As one of the fastest ______ distributors in the country, Falcon Supply Inc., is known for its commitment to quality.","A":"grow","B":"grew","C":"growing","D":"growth","answer":"C","answer_word":"growing","explanation":"distributors を修飾して「急成長している」とする現在分詞が必要。したがって、(C) growing が正解。"},{"id":153,"category":"品詞問題・実戦問題 応用編","qnum":21,"question":"Crown Corporation has been the leading ______ of innovative fabrics for over 25 years.","A":"produce","B":"produced","C":"production","D":"producer","answer":"D","answer_word":"producer","explanation":"the leading の後には「主要な生産者」という人・会社を表す名詞が必要。したがって、(D) producer が正解。"},{"id":154,"category":"品詞問題・実戦問題 応用編","qnum":22,"question":"If all single rooms are already booked, guests will be offered a double room for single use at a ______ higher rate.","A":"correspond","B":"corresponding","C":"correspondingly","D":"correspondence","answer":"C","answer_word":"correspondingly","explanation":"higher を修飾して「それに応じてより高い」とする副詞が必要。したがって、(C) correspondingly が正解。"},{"id":155,"category":"品詞問題・実戦問題 応用編","qnum":23,"question":"Dylan Clarke has been promoted to the position of marketing manager because he organized a national campaign ______.","A":"commend","B":"commendable","C":"commendably","D":"commended","answer":"C","answer_word":"commendably","explanation":"organized を修飾して「見事に実施した」とする副詞が必要。したがって、(C) commendably が正解。"},{"id":156,"category":"品詞問題・実戦問題 応用編","qnum":24,"question":"Although construction has already been approved, the city is still looking for an ______ to coordinate the project.","A":"architect","B":"architecture","C":"architectural","D":"architecturally","answer":"A","answer_word":"architect","explanation":"coordinate the project の主体になる人を表す名詞が必要。したがって、(A) architect が正解。"},{"id":157,"category":"品詞問題・実戦問題 応用編","qnum":25,"question":"Since his appointment as CEO, Nathan Lee has been running the company much ______ than his predecessor.","A":"efficient","B":"efficiently","C":"more efficient","D":"more efficiently","answer":"D","answer_word":"more efficiently","explanation":"running を修飾し、than とともに比較級を作る副詞句が必要。したがって、(D) more efficiently が正解。"},{"id":158,"category":"品詞問題・実戦問題 応用編","qnum":26,"question":"The Independent School Association has welcomed some of the ______ lecturers, authors, and performing artists in California.","A":"more prominent","B":"most prominent","C":"more prominently","D":"most prominently","answer":"B","answer_word":"most prominent","explanation":"some of the の後で、lecturers などを修飾する最上級の形容詞が必要。したがって、(B) most prominent が正解。"},{"id":159,"category":"品詞問題・実戦問題 応用編","qnum":27,"question":"The City University offers masters programs in civil engineering, construction, project ______, and information technology.","A":"manage","B":"managed","C":"manageable","D":"management","answer":"D","answer_word":"management","explanation":"project management（プロジェクト管理）という複合名詞を作る名詞が必要。したがって、(D) management が正解。"},{"id":160,"category":"品詞問題・実戦問題 応用編","qnum":28,"question":"Some contractors use special ______ tools to help pinpoint the source of common home problems.","A":"diagnose","B":"diagnosed","C":"diagnostic","D":"diagnostically","answer":"C","answer_word":"diagnostic","explanation":"tools を修飾して「診断用の」を表す形容詞が必要。したがって、(C) diagnostic が正解。"},{"id":161,"category":"品詞問題・実戦問題 応用編","qnum":29,"question":"The policy that late fees are charged for books returned after the due date is stated quite ______ in the agreement.","A":"clear","B":"clearly","C":"clarity","D":"clearer","answer":"B","answer_word":"clearly","explanation":"stated を修飾する副詞が必要。したがって、(B) clearly が正解。"},{"id":162,"category":"品詞問題・実戦問題 応用編","qnum":30,"question":"Tullox Shoes are constructed in South East Asia according to the ______ standards for durability and comfort.","A":"strictly","B":"more strictly","C":"strictest","D":"strictness","answer":"C","answer_word":"strictest","explanation":"the と standards の間に入り、耐久性と快適性について「最も厳しい基準」を表す最上級形容詞が必要。したがって、(C) strictest が正解。"},{"id":163,"category":"品詞問題・実戦問題 応用編","qnum":31,"question":"The highly anticipated second album of William Roy is ______ from the first but no less remarkable.","A":"distinct","B":"distinguish","C":"distinction","D":"distinctly","answer":"A","answer_word":"distinct","explanation":"be 動詞 is の補語として形容詞が必要。distinct from ... で「〜とは異なる」。したがって、(A) distinct が正解。"},{"id":164,"category":"品詞問題・実戦問題 応用編","qnum":32,"question":"The mission of the university store is to provide a wide range of ______ priced merchandise to students and faculty members.","A":"compete","B":"competitive","C":"competitively","D":"competition","answer":"C","answer_word":"competitively","explanation":"priced を修飾して「競争力のある価格で」を表す副詞が必要。したがって、(C) competitively が正解。"},{"id":165,"category":"品詞問題・実戦問題 応用編","qnum":33,"question":"Easy to handle, light, maneuverable, and powerful, the lawnmower is perfectly ______ to small lawns of up to 2,000 square feet.","A":"suit","B":"suited","C":"suiting","D":"suits","answer":"B","answer_word":"suited","explanation":"be suited to ... で「〜に適している」という受動表現になる。したがって、(B) suited が正解。"},{"id":166,"category":"品詞問題・実戦問題 応用編","qnum":34,"question":"Japanese cuisine has received a lot of attention in the last 10 years, and ______ has gained popularity all over the world.","A":"consequent","B":"consequently","C":"consequence","D":"consequences","answer":"B","answer_word":"consequently","explanation":"前文を受けて結果を示す副詞が必要。したがって、(B) consequently が正解。"},{"id":167,"category":"品詞問題・実戦問題 応用編","qnum":35,"question":"Should you require ______ with your selection of tools, please talk to one of our experienced advisors.","A":"assist","B":"assisted","C":"assistance","D":"assists","answer":"C","answer_word":"assistance","explanation":"require の目的語として名詞が必要。assistance with ... で「〜に関する支援」。したがって、(C) assistance が正解。"},{"id":168,"category":"品詞問題・実戦問題 応用編","qnum":36,"question":"Not only does the new sedan have an ______ design, but it also offers its passengers more luggage room.","A":"appeal","B":"appealed","C":"appealing","D":"appealingly","answer":"C","answer_word":"appealing","explanation":"design を修飾する形容詞が必要。appealing design で「魅力的なデザイン」。したがって、(C) appealing が正解。"},{"id":169,"category":"品詞問題・実戦問題 応用編","qnum":37,"question":"______ scheduling vacation leave of one full week or more must obtain permission from their supervisors in advance.","A":"Employs","B":"Employed","C":"Employment","D":"Employees","answer":"D","answer_word":"Employees","explanation":"文の主語として人を表す複数名詞が必要。したがって、(D) Employees が正解。"},{"id":170,"category":"品詞問題・実戦問題 応用編","qnum":38,"question":"New ______ are eligible for a 30 day free trial period and will receive one free song download upon signing up.","A":"subscribe","B":"subscriptions","C":"subscribed","D":"subscribers","answer":"D","answer_word":"subscribers","explanation":"New の後には人を表す複数名詞が必要。subscribers で「加入者」。したがって、(D) subscribers が正解。"},{"id":171,"category":"品詞問題・実戦問題 応用編","qnum":39,"question":"Rubber ______ are working hard to fill orders from the automobile industry which is expecting to sell record numbers of vehicles this year.","A":"produce","B":"produces","C":"productions","D":"producers","answer":"D","answer_word":"producers","explanation":"Rubber producers で「ゴム生産業者」という複合名詞になる。したがって、(D) producers が正解。"},{"id":172,"category":"品詞問題・実戦問題 応用編","qnum":40,"question":"Fast & Falls is a Dallas-based interior design firm, known for ______ service and a sophisticated style.","A":"personalized","B":"personalize","C":"personalizes","D":"personalizing","answer":"A","answer_word":"personalized","explanation":"service を修飾して「個別対応の」を表す形容詞が必要。したがって、(A) personalized が正解。"},{"id":173,"category":"品詞問題・実戦問題 応用編","qnum":41,"question":"This ______ should only be taken as directed by a qualified physician.","A":"medication","B":"medically","C":"medicated","D":"medications","answer":"A","answer_word":"medication","explanation":"This の後で主語になる単数名詞が必要。したがって、(A) medication が正解。"},{"id":174,"category":"品詞問題・実戦問題 応用編","qnum":42,"question":"The jewelry box is covered in a thin layer of hand-stitched black leather stretched ______ around the frame.","A":"tightening","B":"tightly","C":"tighten","D":"tightness","answer":"B","answer_word":"tightly","explanation":"stretched を修飾して「ぴったりと張られた」とする副詞が必要。したがって、(B) tightly が正解。"},{"id":175,"category":"品詞問題・実戦問題 応用編","qnum":43,"question":"Fun Toys is pleased to announce two shipments of the popular game will arrive this month, the first of which should come ______.","A":"shortly","B":"shorten","C":"short","D":"shortness","answer":"A","answer_word":"shortly","explanation":"come を修飾して「まもなく到着する」とする副詞が必要。したがって、(A) shortly が正解。"},{"id":176,"category":"品詞問題・実戦問題 応用編","qnum":44,"question":"Ms. Watanabe's new coffee tumbler, which cost over 30 dollars, is stylish as well as ______.","A":"function","B":"functioned","C":"functional","D":"functionally","answer":"C","answer_word":"functional","explanation":"as well as の前後で stylish と並ぶ形容詞が必要。したがって、(C) functional が正解。"},{"id":177,"category":"品詞問題・実戦問題 応用編","qnum":45,"question":"When placing an order during holiday seasons, please note that it will take ______ five to seven days for the delivery.","A":"approximate","B":"approximately","C":"approximation","D":"approximates","answer":"B","answer_word":"approximately","explanation":"five to seven days を修飾して「およそ」を表す副詞が必要。したがって、(B) approximately が正解。"},{"id":178,"category":"品詞問題・実戦問題 応用編","qnum":46,"question":"Justin Moore's ______ jazz album from Spark Records combines modern rhythms with traditional elements.","A":"newer","B":"newly","C":"newest","D":"newness","answer":"C","answer_word":"newest","explanation":"jazz album を修飾し、文脈上「最新の」を表す最上級形容詞が必要。したがって、(C) newest が正解。"},{"id":179,"category":"品詞問題・実戦問題 応用編","qnum":47,"question":"The Darren Theater opened on Oct. 5, 1987, ______ eight years before Ms. Gonzalez was hired.","A":"precise","B":"precision","C":"precisely","D":"preciseness","answer":"C","answer_word":"precisely","explanation":"eight years を修飾して「ちょうど8年」を表す副詞が必要。したがって、(C) precisely が正解。"},{"id":180,"category":"品詞問題・実戦問題 応用編","qnum":48,"question":"Mr. McConnell studied Japanese business culture and practices ______ before transferring to the Sendai branch.","A":"exhaustive","B":"exhaustion","C":"exhausting","D":"exhaustively","answer":"D","answer_word":"exhaustively","explanation":"studied を修飾して「徹底的に学んだ」とする副詞が必要。したがって、(D) exhaustively が正解。"},{"id":181,"category":"品詞問題・実戦問題 応用編","qnum":49,"question":"Located near the Dallas Convention Center, Hotel Camel is the perfect choice for convention ______ who want accommodations close to the venue.","A":"attendance","B":"attendees","C":"attend","D":"attended","answer":"B","answer_word":"attendees","explanation":"who 以下の関係詞節を受ける、人を表す複数名詞が必要。したがって、(B) attendees が正解。"},{"id":182,"category":"品詞問題・実戦問題 応用編","qnum":50,"question":"Mr. Larsen's name, which appeared in the original movie, was mistakenly removed from the ______ version.","A":"edit","B":"edited","C":"editing","D":"edits","answer":"B","answer_word":"edited","explanation":"version を修飾し、「編集された版」という受動の意味を表す過去分詞が必要。したがって、(B) edited が正解。"},{"id":183,"category":"品詞問題・実戦問題 応用編","qnum":51,"question":"Only one year after its ______, Denton Publishing was awarded the Prize for Exceptional Creativity at an international competition in Vienna.","A":"found","B":"foundations","C":"founded","D":"foundation","answer":"D","answer_word":"foundation","explanation":"after its の後には所有物を表す名詞が必要。foundation で「創設」。したがって、(D) foundation が正解。"},{"id":184,"category":"品詞問題・実戦問題 応用編","qnum":52,"question":"Grape Computers is known for running ______ commercials to promote its innovative electronic devices.","A":"imaginative","B":"imagination","C":"imagine","D":"imaginary","answer":"A","answer_word":"imaginative","explanation":"commercials を修飾して「想像力に富んだ」を表す形容詞が必要。したがって、(A) imaginative が正解。"},{"id":185,"category":"品詞問題・実戦問題 応用編","qnum":53,"question":"Original copies of Pirate Island are ______ rare, with only 18 copies in existence, of which 12 are in private hands.","A":"excessive","B":"exceed","C":"excess","D":"exceedingly","answer":"D","answer_word":"exceedingly","explanation":"rare を強調する副詞が必要。exceedingly rare で「非常に珍しい」。したがって、(D) exceedingly が正解。"},{"id":186,"category":"品詞問題・実戦問題 応用編","qnum":54,"question":"Most users agree that the new smartphone has a ______ better picture and sound quality.","A":"notice","B":"noticeable","C":"noticeably","D":"noticing","answer":"C","answer_word":"noticeably","explanation":"better を修飾して「著しく良い」を表す副詞が必要。したがって、(C) noticeably が正解。"},{"id":187,"category":"品詞問題・実戦問題 応用編","qnum":55,"question":"While Fire Art's new video games have already been launched in Asia, they will not be available ______ anytime soon.","A":"globe","B":"global","C":"globally","D":"globalization","answer":"C","answer_word":"globally","explanation":"available を修飾して「世界的に利用可能な」を表す副詞が必要。したがって、(C) globally が正解。"},{"id":188,"category":"品詞問題・実戦問題 応用編","qnum":56,"question":"Presented by Whole Family Foods, the event will feature cooking ______ and activities for kids.","A":"demonstrations","B":"demonstrates","C":"demonstrator","D":"demonstrated","answer":"A","answer_word":"demonstrations","explanation":"feature の目的語として複数名詞が必要。cooking demonstrations で「料理実演」。したがって、(A) demonstrations が正解。"},{"id":189,"category":"品詞問題・実戦問題 応用編","qnum":57,"question":"Paul Tanaka, the founder of Wheaton Technology, will come to the Seattle headquarters to participate in ______ and interact with employees.","A":"lecture","B":"lectured","C":"lectures","D":"lecturer","answer":"C","answer_word":"lectures","explanation":"participate in の目的語として複数名詞が必要。したがって、(C) lectures が正解。"},{"id":190,"category":"品詞問題・実戦問題 応用編","qnum":58,"question":"All staff members of Premium Promotion have extensive experience in ______ or a related field.","A":"advertising","B":"advertiser","C":"advertised","D":"advertises","answer":"A","answer_word":"advertising","explanation":"in の目的語として名詞・動名詞が必要。advertising で「広告業務」。したがって、(A) advertising が正解。"},{"id":191,"category":"品詞問題・実戦問題 応用編","qnum":59,"question":"The award ceremony would not have been possible without ______ from several members, notably Mal Benjamin, who chairs the award committee.","A":"contribute","B":"contributed","C":"contributions","D":"contributor","answer":"C","answer_word":"contributions","explanation":"without の目的語として名詞が必要で、several members からの「貢献」を表す。したがって、(C) contributions が正解。"},{"id":192,"category":"品詞問題・実戦問題 応用編","qnum":60,"question":"Since the benefits seemed evident, Mr. Tucker was ______ that his proposal would be accepted by the board of directors.","A":"confident","B":"confidential","C":"confidently","D":"confidence","answer":"A","answer_word":"confident","explanation":"was の補語として形容詞が必要。be confident that ... で「〜と確信している」。したがって、(A) confident が正解。"},{"id":193,"category":"品詞問題・実戦問題 応用編","qnum":61,"question":"All requests for personal time off must be submitted for ______ using the appropriate request form.","A":"approve","B":"approved","C":"approval","D":"approvingly","answer":"C","answer_word":"approval","explanation":"for の目的語として名詞が必要。for approval で「承認のために」。したがって、(C) approval が正解。"},{"id":194,"category":"品詞問題・実戦問題 応用編","qnum":62,"question":"The assistant office manager, Ms. Reed, will explain the ______ paper recycling policy at the next weekly meeting.","A":"revise","B":"revised","C":"revising","D":"revision","answer":"B","answer_word":"revised","explanation":"policy を修飾し、「改訂された」を表す過去分詞が必要。したがって、(B) revised が正解。"},{"id":195,"category":"品詞問題・実戦問題 応用編","qnum":63,"question":"Pacific Home Designs has been a reliable ______ of home furnishings for more than 30 years.","A":"manufacture","B":"manufactures","C":"manufacturing","D":"manufacturer","answer":"D","answer_word":"manufacturer","explanation":"a reliable の後に、人・会社を表す単数名詞が必要。manufacturer で「製造業者」。したがって、(D) manufacturer が正解。"},{"id":196,"category":"品詞問題・実戦問題 応用編","qnum":64,"question":"Mr. Li should be available to meet with the newly hired employees this week as he has no ______ travel plans.","A":"schedule","B":"scheduled","C":"scheduling","D":"scheduler","answer":"B","answer_word":"scheduled","explanation":"travel plans を修飾し、「予定された」を表す過去分詞が必要。したがって、(B) scheduled が正解。"},{"id":197,"category":"品詞問題・実戦問題 応用編","qnum":65,"question":"To spread the workload more ______ within the organization, the project team has decided to assign roles to specific individuals.","A":"even","B":"evens","C":"evening","D":"evenly","answer":"D","answer_word":"evenly","explanation":"spread を修飾して「より均等に」を表す副詞が必要。したがって、(D) evenly が正解。"},{"id":198,"category":"品詞問題・実戦問題 応用編","qnum":66,"question":"______ are nearly complete for the product demonstration at the press conference on Friday next week.","A":"Preparations","B":"Prepare","C":"Prepares","D":"Preparers","answer":"A","answer_word":"Preparations","explanation":"文の主語として複数名詞が必要。preparations are complete の形になる。したがって、(A) Preparations が正解。"},{"id":199,"category":"品詞問題・実戦問題 応用編","qnum":67,"question":"An ______ large number of our customers now make reservations online rather than by phone.","A":"increase","B":"increases","C":"increasing","D":"increasingly","answer":"D","answer_word":"increasingly","explanation":"large を修飾して「ますます多い」を表す副詞が必要。したがって、(D) increasingly が正解。"},{"id":200,"category":"品詞問題・実戦問題 応用編","qnum":68,"question":"News of Felix Schneider's retirement spread quickly as he had made many friends and ______ during his 20 years on the job.","A":"acquaint","B":"acquainted","C":"acquaintance","D":"acquaintances","answer":"D","answer_word":"acquaintances","explanation":"friends and acquaintances で「友人や知人」となる複数名詞が必要。したがって、(D) acquaintances が正解。"},{"id":201,"category":"品詞問題・実戦問題 応用編","qnum":69,"question":"The advertising campaigns Mr. Weyden had developed before he left were ______ implemented by his colleagues.","A":"subsequent","B":"most subsequent","C":"subsequently","D":"subsequence","answer":"C","answer_word":"subsequently","explanation":"implemented を修飾し、時間の順序を表す副詞が必要。したがって、(C) subsequently が正解。"},{"id":202,"category":"品詞問題・実戦問題 応用編","qnum":70,"question":"Under ______ and CEO Jack Thompson, Thompson Legal has become a successful law firm within a relatively short span of time.","A":"foundation","B":"founder","C":"found","D":"founded","answer":"B","answer_word":"founder","explanation":"Under founder and CEO ... で「創業者兼CEOの下で」という意味になる名詞が必要。したがって、(B) founder が正解。"},{"id":203,"category":"品詞問題・実戦問題 応用編","qnum":71,"question":"Mr. Aiden Roy, an award-winning ______ at Calgary Daily Press, has agreed to chair an ad hoc committee on the newspaper's 75th anniversary.","A":"journal","B":"journalism","C":"journalist","D":"journalistic","answer":"C","answer_word":"journalist","explanation":"an award-winning の後には人を表す単数名詞が必要。したがって、(C) journalist が正解。"},{"id":204,"category":"品詞問題・実戦問題 応用編","qnum":72,"question":"The award will promote workplace values within the company by giving recognition to successful managers who demonstrate ______ for subordinates.","A":"respect","B":"respected","C":"respecting","D":"respectable","answer":"A","answer_word":"respect","explanation":"demonstrate の目的語として名詞が必要。respect for ... で「〜への敬意」。したがって、(A) respect が正解。"},{"id":205,"category":"品詞問題・実戦問題 応用編","qnum":73,"question":"Small manufacturers operating using a limited workforce with ______ skills have recently been on the rise.","A":"specialize","B":"specialized","C":"specializing","D":"specialization","answer":"B","answer_word":"specialized","explanation":"skills を修飾して「専門的な」を表す形容詞が必要。したがって、(B) specialized が正解。"},{"id":206,"category":"品詞問題・実戦問題 応用編","qnum":74,"question":"Happy Wholesale is the main ______ of Wonder Toys' products including toys, video games, and kids' PCs.","A":"distributor","B":"distributing","C":"distribute","D":"distribution","answer":"A","answer_word":"distributor","explanation":"the main の後に販売業者を表す単数名詞が必要。したがって、(A) distributor が正解。"},{"id":207,"category":"品詞問題・実戦問題 応用編","qnum":75,"question":"Current plant workers will be given hiring preference for the newly ______ jobs at the company's production facility in Kawasaki.","A":"creates","B":"creating","C":"created","D":"creation","answer":"C","answer_word":"created","explanation":"jobs を修飾し、「新たに作られた」を表す過去分詞が必要。したがって、(C) created が正解。"},{"id":208,"category":"品詞問題・実戦問題 応用編","qnum":76,"question":"As of February 1, the no-smoking policy at the Mountain Tower apartments will be more ______ enforced.","A":"strict","B":"strictly","C":"stricter","D":"strictness","answer":"B","answer_word":"strictly","explanation":"enforced を修飾する副詞が必要。したがって、(B) strictly が正解。"},{"id":209,"category":"品詞問題・実戦問題 応用編","qnum":77,"question":"In the last decade, there has been a ______ rapid increase in the number of public locations for wireless Internet usage.","A":"remark","B":"remarks","C":"remarking","D":"remarkably","answer":"D","answer_word":"remarkably","explanation":"rapid を修飾して「著しく急速な」を表す副詞が必要。したがって、(D) remarkably が正解。"},{"id":210,"category":"品詞問題・実戦問題 応用編","qnum":78,"question":"All products made by Trust Computers come with a user's manual that contains ______ for installation as well as operating procedures.","A":"explain","B":"explanatory","C":"explanations","D":"explaining","answer":"C","answer_word":"explanations","explanation":"contains の目的語として複数名詞が必要。explanations for ... で「〜の説明」。したがって、(C) explanations が正解。"},{"id":211,"category":"品詞問題・実戦問題 応用編","qnum":79,"question":"During the workshop, small business owners will learn how to develop ______ business relationships with their clients.","A":"prosper","B":"prosperity","C":"prosperous","D":"prospered","answer":"C","answer_word":"prosperous","explanation":"business relationships を修飾して「繁栄した・良好な」を表す形容詞が必要。したがって、(C) prosperous が正解。"},{"id":212,"category":"品詞問題・実戦問題 応用編","qnum":80,"question":"Green Net Corporation reported a net profit of 40 million dollars for the third quarter, ______ exceeding analysts' forecasts.","A":"easy","B":"easing","C":"ease","D":"easily","answer":"D","answer_word":"easily","explanation":"exceeding を修飾して「容易に上回って」を表す副詞が必要。したがって、(D) easily が正解。"},{"id":213,"category":"品詞問題・実戦問題 応用編","qnum":81,"question":"Tiger Motors intentionally cut back on fleet sales, which are less ______ than sales to individual customers.","A":"profit","B":"profitable","C":"profitably","D":"profits","answer":"B","answer_word":"profitable","explanation":"less と than の間で比較級表現を作る形容詞が必要。したがって、(B) profitable が正解。"},{"id":214,"category":"品詞問題・実戦問題 応用編","qnum":82,"question":"Newly hired staff members are required to attend a three-day training course on airport ______.","A":"secure","B":"secured","C":"security","D":"securely","answer":"C","answer_word":"security","explanation":"airport security で「空港保安」という複合名詞を作る名詞が必要。したがって、(C) security が正解。"},{"id":215,"category":"品詞問題・実戦問題 応用編","qnum":83,"question":"Diego Martinez is going to appear on a prime-time news program as a ______ for the anchor, David Lee.","A":"substitute","B":"substitutive","C":"substitutions","D":"substitutes","answer":"A","answer_word":"substitute","explanation":"as a の後に人・役割を表す単数名詞が必要。したがって、(A) substitute が正解。"},{"id":216,"category":"品詞問題・実戦問題 応用編","qnum":84,"question":"Charlie Evans starts his day with a cup of coffee at Turner's Café ______ every morning.","A":"practical","B":"practically","C":"practice","D":"practicing","answer":"B","answer_word":"practically","explanation":"every morning を修飾し、「ほとんど毎朝」を表す副詞が必要。したがって、(B) practically が正解。"},{"id":217,"category":"品詞問題・実戦問題 応用編","qnum":85,"question":"If you wi D":"more attentively","answer":"D","answer_word":"more attentively","explanation":"空所を除いても文が成立しているため、動詞 examine を修飾する副詞の比較級 (D) more attentively（より注意深く）が正解。(A) は形容詞、(B) は名詞、(C) は形容詞の最上級。訳：Lucas Janssen は、販促キャンペーンを始めるときはマーケティング部がトレンドをより注意深く分析するよう要請した。"},{"id":328,"category":"品詞問題・実戦問題 発展編","qnum":96,"question":"Each ______ is asked to fill out an evaluation form to provide comments and suggestions for improving the workshop.","A":"individual","B":"individuals","C":"individualistic","D":"individualism","answer":"A","answer_word":"individual","explanation":"主語になる単数形の名詞が必要。文意が通るのは (A) individual（個人）。(D) individualism は「個人主義」で文意が通らず不可算名詞。(B) は複数形なので主述が合わない。(C) は形容詞。訳：各参加者はワークショップ改善のため、コメントや提案を記入する評価用紙への記入を求められる。"},{"id":329,"category":"品詞問題・実戦問題 発展編","qnum":97,"question":"The acknowledgements section of a book usually appears on the page ______ the table of contents.","A":"follow","B":"following","C":"follows","D":"follower","answer":"B","answer_word":"following","explanation":"空所前の名詞 page と the table of contents をつなぐ前置詞の (B) following（〜の次に）が正解。(A) は動詞、(C) は三人称単数現在形、(D) は名詞。訳：本の謝辞欄は通常、目次の次のページにある。"},{"id":330,"category":"品詞問題・実戦問題 発展編","qnum":98,"question":"Philips Pharmaceuticals announced to ______ that its sales revenue in the fourth quarter is likely to exceed expectations.","A":"invest","B":"investments","C":"investors","D":"investing","answer":"C","answer_word":"investors","explanation":"announce to + 人 + that ... の形なので、to の目的語として人を表す複数名詞 (C) investors（投資家）が正解。announce は不定詞を伴わないため (A) は不可。(B) は名詞「投資」、(D) は現在分詞・動名詞。訳：Philips Pharmaceuticals は投資家に対し、第4四半期の総売上高が予想を上回りそうだと発表した。"},{"id":331,"category":"品詞問題・実戦問題 発展編","qnum":99,"question":"Of all the ______ in the museum, the landscape painting by Susan Owen is by far the most famous.","A":"work","B":"works","C":"working","D":"worked","answer":"B","answer_word":"works","explanation":"空所に入るのは名詞。主語 landscape painting が含まれるグループを示す複数名詞 (B) works（作品）が正解。all は可算名詞の複数形を修飾するので、単数形 (A) は形が合わない。(C) は形容詞、(D) は過去形・過去分詞。訳：美術館の全作品の中で、Susan Owen の風景画は群を抜いて最も有名だ。"},{"id":332,"category":"品詞問題・実戦問題 発展編","qnum":100,"question":"Please ensure that your submissions are ______ with the requirements of the Jules Mann Art Prize as outlined in the rulebook.","A":"complied","B":"compliance","C":"comply","D":"compliant","answer":"D","answer_word":"compliant","explanation":"形容詞の (D) compliant を入れると、be compliant with ...（〜を順守している）という表現が完成する。動詞 comply は自動詞なので (A) は不適切。名詞 (B) は be in compliance with ... の形で使う。訳：応募は必ず、規則集に書かれている Jules Mann Art Prize の要件を順守してください。"},{"id":333,"category":"動詞問題・トレーニング","qnum":1,"question":"Seaside Hotel is now ______ a manager for their newly opened branch in Urayasu.","A":"recruit","B":"recruits","C":"recruiting","D":"recruitment","answer":"C","answer_word":"recruiting","explanation":"空所前の is と結び付き、現在進行形の文を作るのが現在分詞の (C) recruiting。動詞の原形・現在形は be 動詞と共に用いることができず、(D) recruitment は名詞。訳：Seaside Hotel は現在、浦安に新しくオープンした支店の支配人を募集している。"},{"id":334,"category":"動詞問題・トレーニング","qnum":2,"question":"The new city regulation ______ only to companies with 100 or more employees.","A":"pertinent","B":"pertains","C":"pertaining","D":"pertain","answer":"B","answer_word":"pertains","explanation":"主語 The new city regulation は単数で、空所には述語動詞が必要。三単現の s が付いた (B) pertains が正解。pertain to で「〜に関係する」。訳：新しい市の条例は、100人以上の従業員がいる企業にのみ関係する。"},{"id":335,"category":"動詞問題・トレーニング","qnum":3,"question":"Fountain Investment could possibly ______ the goal of a 30 percent reduction in operational costs for the year.","A":"achieve","B":"achieving","C":"achieves","D":"achievable","answer":"A","answer_word":"achieve","explanation":"助動詞 could の後なので、原形動詞の (A) achieve が正解。助動詞＋副詞＋動詞原形の形。訳：Fountain Investment は、今年の運用コスト30%削減という目標を達成できるかもしれない。"},{"id":336,"category":"動詞問題・トレーニング","qnum":4,"question":"For a short time, Greg Smith lived in the Village of Caronport before ______ to Vancouver Island at the age of eighteen.","A":"move","B":"moves","C":"moving","D":"movement","answer":"C","answer_word":"moving","explanation":"前置詞 before の後ろには名詞または動名詞が続くため、動名詞の (C) moving が正解。訳：Greg Smith は18歳のころ、Vancouver Island へ引っ越す前に少しの間 Caronport 村に住んでいた。"},{"id":337,"category":"動詞問題・トレーニング","qnum":5,"question":"Gary Anderson was honored by family and friends at a party ______ his retirement after nearly 35 years of service.","A":"celebrate","B":"celebrating","C":"celebrated","D":"celebration","answer":"B","answer_word":"celebrating","explanation":"空所以降は party を修飾する要素。直後に his retirement という目的語があるので、現在分詞の (B) celebrating が正解。訳：Gary Anderson は、35年近い勤務を終えた退職を祝うパーティーで、家族や友人から表彰された。"},{"id":338,"category":"動詞問題・トレーニング","qnum":6,"question":"To apply for a patent, several countries still require that all documents ______ into their own languages.","A":"translate","B":"are translating","C":"translated","D":"be translated","answer":"D","answer_word":"be translated","explanation":"require that S V の that 節では原形を用いる。all documents と translate は受動関係なので、受動態の (D) be translated が正解。訳：特許を出願するにあたり、いくつかの国ではすべての書類を自国語に翻訳するよう求めている。"},{"id":339,"category":"動詞問題・トレーニング","qnum":7,"question":"Future Software is a company that produces language learning materials for which it ______ numerous awards over the past ten years.","A":"receives","B":"has received","C":"is receiving","D":"would receive","answer":"B","answer_word":"has received","explanation":"over the past ten years は過去から現在までの期間を表すため、現在完了形の (B) has received が正解。訳：Future Software は、この10年間に多数の賞を受賞した語学教材を作っている会社だ。"},{"id":340,"category":"動詞問題・トレーニング","qnum":8,"question":"The lounges on the third floor ______ for business and first-class passengers with a same-day return ticket.","A":"reserved","B":"have been reserving","C":"reserving","D":"are reserved","answer":"D","answer_word":"are reserved","explanation":"主語 The lounges と reserve は受動関係なので、受動態の (D) are reserved が正解。訳：3階のラウンジは、日帰りチケットを持つビジネスおよびファーストクラスの乗客のために確保されている。"},{"id":341,"category":"動詞問題・トレーニング","qnum":9,"question":"______ more than 1,000 people, Sunshine Manufacturing is one of the most important businesses in the town of Bicol.","A":"Employ","B":"Employed","C":"Employing","D":"Employment","answer":"C","answer_word":"Employing","explanation":"分詞構文。省略された主語 Sunshine Manufacturing と employ は能動関係なので、現在分詞の (C) Employing が正解。訳：Sunshine Manufacturing は1000人以上を雇用し、Bicol 町で最も重要な企業の1つである。"},{"id":342,"category":"動詞問題・実戦問題 基本編","qnum":1,"question":"Before submitting a request, please ______ to the vacation policy printed in the employee manual.","A":"refer","B":"referred","C":"referring","D":"to refer","answer":"A","answer_word":"refer","explanation":"please の後ろでは動詞が原形 (命令文) になるので、(A) refer (ごを参照する) AEM. (RIE を押さえておけば正解できる。 補足： 試験では please のない命令文の文頭や助動詞のあとの空所に原形動詞を選ぶ問 Hew. 訳：申請書を提出する前に、就業規則に記された休暇に関する方針を参照してください。 5"},{"id":343,"category":"動詞問題・実戦問題 基本編","qnum":2,"question":"As Ms. Smith has already received a permit from the city, she looks forward to ______ construction of her driveway soon.","A":"begin","B":"began","C":"begins","D":"beginning","answer":"D","answer_word":"beginning","explanation":"空所前の looks forward to の to は前置詞で、後ろに動名詞や名詞が続く。よって、正解 は動名詞の(D) beginning. to 不定詞と判断して原形動詞の (A) を選ばないのがポイント。⑥) は過去形、(C) は三人称単数現在形。同タイプの問題は Part 6 でも出題例がある。 訳：Smith さんはすでに市から許可証を得ており、私有車の工事がすぐに始まることを楽しみにして いる。"},{"id":344,"category":"動詞問題・実戦問題 基本編","qnum":3,"question":"Apple Airways announced that it will temporarily ______ the number of weekly flights to Bangkok from June 1.","A":"reduce","B":"reduces","C":"reduced","D":"reducing","answer":"A","answer_word":"reduce","explanation":"空所の前に助動詞 will があるので、空所には原形動詞が入る。(A) reduce (ごを減らす) が 正解。(B) は三人称単数現在形、(C) は過去形・過去分詞、(D) は現在分詞・動名詞で、いず れも助動詞の後ろに置くことはできない。 問のように、助動詞の直後ではなく、間に修飾 語の恒詞を反んでから空所が続くパターンは頻出。 訳：Apple 航空は、6 月 1 日からパンコク行きの週の定期便の数を一時9に減らすと発表した。"},{"id":345,"category":"動詞問題・実戦問題 基本編","qnum":4,"question":"The Tokyo Tribune ______ 50 percent off home delivery for new readers when they sign up for a year’s subscription.","A":"offer","B":"is offering","C":"offering","D":"have offered","answer":"B","answer_word":"is offering","explanation":"主語の The Tokyo Tribune は単数扱いで、空所にはその述語動詞が必要。 選択肢中、単 数形の主語に対応する述語動詞は現在進行形の (B) is offering のみ。(A) は offers と三単 現の s が必要。(C) は現在分詞・動名詞。(D) の現在完了形は has offered であれば正解。 訳：The Tokyo Tribune 紙は、年間購読を申し込んだ新しい読者に宅配料金の 50% 割引を提供している。"},{"id":346,"category":"動詞問題・実戦問題 基本編","qnum":5,"question":"A passenger criticized the travel agency for ______ to respond quickly to her request for discount tickets.","A":"failing","B":"was failing","C":"has failed","D":"fails","answer":"A","answer_word":"failing","explanation":"空所前の前置詞 for の後ろには目的語となる名詞や動名詞が必要。動記は動名詞に変えれ ばよいので、(D) failing が正解。fail to do で 「てしそこなう」 という意味。(B)(C)(D) はいず れも述語動詞の形なので前置詞の目的語にならない。(D) には名詞「不合格」 (複数形) の用 法もあるが、それだと文意が通らない。 訳：ある乗容は、割引チケットの依頼にすばやく対応できなかったとして、えの旅行代理店を批判した。 criticize: 人⑳ を批判する"},{"id":347,"category":"動詞問題・実戦問題 基本編","qnum":6,"question":"Mail carriers ______ to wear comfortable shoes as their work involves considerable walking.","A":"encourage","B":"encouraging","C":"are encouraged","D":"have encouraged","answer":"C","answer_word":"are encouraged","explanation":"空所後に to wear が続いているため、be encouraged to do（〜するよう奨励される）の形を作る are encouraged が正解。主語 Mail carriers は「奨励される」側なので受動態になる。訳：郵便配達員は、仕事でかなり歩くため、履き心地のよい靴を履くよう奨励されている。"},{"id":348,"category":"動詞問題・実戦問題 基本編","qnum":7,"question":"The DroidPhone 9000 is built for durability and should ______ being dropped from heights of up to seven meters.","A":"withstand","B":"withstood","C":"withstanding","D":"withstands","answer":"A","answer_word":"withstand","explanation":"主語の「郵便配達員」 は、to 以下の行為を「勧められる」 側なので、受動態の (C) are encou ged が正解。他動詞 encou ge の目的語となる名詞が空所後にかいことも受動態 を選ぶ裏付けになる。問題文は encou ge [O to do の O (目的語) が主語の位置に出た形。 訳：郵便配達上は業務で相当な距離を歩くことが求められるので、履き心地のよい靴を着用することを 推奨されている。 carrier : 配達員 conside ble : 償かなりの、相当な 四半 7 re 第 直前に助動詞 should があるので、原形動詞の (A) withstand (に持ちこたえる) が正 2 解。withstand はPart 5 の語菓問題としての出題例もある重要語。(B) は過去形・過去 x 分詞。空所後の being dropped (落とされること) は 動名詞+ 過去分詞〉 の形の名詞句で withstand の目的語となっている。 [訳：DroidPhone 9000 は耐久性のある設計がされており、7 メートルの高さからの落下にも耐えられる。 withstand : 働 に持ちこたえる"},{"id":349,"category":"動詞問題・実戦問題 基本編","qnum":8,"question":"The manager hired additional employees ______ in the store during the busy summer months.","A":"assist","B":"assisted","C":"assists","D":"to assist","answer":"D","answer_word":"to assist","explanation":"The manager... hired 。 additional employees 。と空所の前で文が完成している。空所に 不定詞の (D) to assist を補えば、「手伝うっ追加の従業員」 と直前の名詞に補足情報を加え ることができる。(B) を過去分詞と考えて空所に入れると 「手伝われた従業員」 となり、意味 をなさない。 訳：繁忙期の夏の数カカ月間、マネージャーは店を手伝う追加の従業員を雇った。"},{"id":350,"category":"動詞問題・実戦問題 基本編","qnum":9,"question":"Beyond the dwindling supply, the multinational oil giant is facing a growing number of risks that could ______ its future.","A":"jeopardize","B":"jeopardized","C":"jeopardizing","D":"will jeopardize","answer":"A","answer_word":"jeopardize","explanation":"空所前に助動詞 could があるので、空所に入るのは原形動詞。よって、(A) jeopardize (~ を危うくする) が正解。 助動詞を重ねて用いることはできないので、(D) は不可。 6s} (HBB) Td. jeopardize DE SICMBLOB UWB LiF LSC ADT = いるが、落ち着いて文法の基 に従って解くことが大切。 監匠減少する供給以上に、その多国籍巨大石油会社は、将来を危うくするかもしれない増大する数々の リスクに直面している。 dwindling: ろ減少している [jeopardize : ⑳を危険にさらす"},{"id":351,"category":"動詞問題・実戦問題 基本編","qnum":10,"question":"To help us assist your business further, please ______ a customer satisfaction survey.","A":"complete","B":"completed","C":"completion","D":"completely","answer":"A","answer_word":"complete","explanation":"空所前に please があるので、原形動詞の(A) complete (を完成させる) が正解。 complete は「完全な」という意味の形容詞としても頻出。(B) は過去形・過去分詞。(C)「完成」 は名詞。(D) は 「完全に」 という意味の副詞。ことのように品調問題と動詞問題がミックスされ たタイプの問題も出題される。 訳：御社のビジネスのサポートをより充実させるため、願客満足度調査にご記入ください。"},{"id":352,"category":"動詞問題・実戦問題 基本編","qnum":11,"question":"Premium Luxury Products experienced another year of strong growth, ______ its leadership in the cosmetics industry.","A":"confirms","B":"confirmed","C":"confirming","D":"confirmation","answer":"C","answer_word":"confirming","explanation":"動詞 experienced がすでにあるので、空所に入るのは分詞の (B) か (C)。直後の名詞 its leadership を目的語に取る現在分詞 (C) confirming を空所に補えば分詞構文が完成す る。過去分詞の (B) は受動の意味を表し、目的語を伴わない。(A) の三人称単数現在形は述 語動詞の形。 [訳：Premium Luxur
